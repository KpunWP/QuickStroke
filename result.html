<!DOCTYPE html>
<html lang="th">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
  <title>
   QuickStroke · ผลการคัดกรอง
  </title>
  <link href="/manifest.webmanifest" rel="manifest"/>
  <meta content="#176FD1" name="theme-color"/>
  <meta content="QuickStroke" name="apple-mobile-web-app-title"/>
  <link href="/icons/icon-192.png" rel="apple-touch-icon"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
   :root {
     --paper: #F3F6FA;
     --surface: #fff;
     --ink: #142235;
     --ink-soft: #526377;
     --muted: #76869A;
     --blue: #176FD1;
     --blue-deep: #0B55AD;
     --blue-soft: #EAF3FE;
     --green: #137F6D;
     --green-soft: #E9F7F3;
     --amber: #9A5C09;
     --amber-soft: #FFF3DD;
     --red: #C93D38;
     --red-soft: #FDEDEC;
     --neutral-soft: #EEF2F6;
     --line: #D7E0E9;
     --shadow: 0 10px 28px rgba(20, 34, 53, .08);
     --r: 24px;
   }

   * {
     box-sizing: border-box;
     margin: 0;
     padding: 0;
     -webkit-tap-highlight-color: transparent
   }

   html {
     min-height: 100%;
     background: #E7EDF4
   }

   body {
     min-height: 100dvh;
     background: var(--paper);
     color: var(--ink);
     font-family: 'IBM Plex Sans Thai', 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
     line-height: 1.45;
     overflow-x: hidden
   }

   button {
     font: inherit
   }

   button:focus-visible,
   summary:focus-visible {
     outline: 3px solid rgba(23, 111, 209, .28);
     outline-offset: 3px
   }

   header {
     position: sticky;
     top: 0;
     z-index: 20;
     min-height: 62px;
     padding: 9px 16px;
     display: flex;
     align-items: center;
     justify-content: space-between;
     gap: 12px;
     background: rgba(243, 246, 250, .97);
     border-bottom: 1px solid var(--line);
     backdrop-filter: blur(12px);
     -webkit-backdrop-filter: blur(12px)
   }

   .brand {
     display: flex;
     align-items: center;
     gap: 9px
   }

   .brand-mark {
     width: 40px;
     height: 40px;
     border-radius: 14px;
     display: flex;
     align-items: center;
     justify-content: center;
     background: linear-gradient(180deg, #2388FF, var(--blue-deep));
     box-shadow: 0 8px 20px rgba(23, 111, 209, .20)
   }

   .brand-mark svg {
     width: 22px;
     height: 22px;
     fill: none;
     stroke: #fff;
     stroke-width: 2.3;
     stroke-linecap: round;
     stroke-linejoin: round
   }

   .brand-text {
     font-family: 'Manrope';
     font-size: 18px;
     font-weight: 800;
     letter-spacing: -.2px
   }

   .brand-text strong {
     color: var(--blue)
   }

   .lang-seg {
     display: flex;
     gap: 3px;
     padding: 4px;
     border-radius: 16px;
     background: #fff;
     border: 1px solid var(--line)
   }

   .lang-seg button {
     height: 38px;
     min-width: 42px;
     padding: 0 8px;
     border: 0;
     border-radius: 12px;
     background: transparent;
     color: var(--muted);
     font-family: 'Manrope';
     font-size: 14px;
     font-weight: 800;
     cursor: pointer
   }

   .lang-seg button.active {
     background: var(--blue);
     color: #fff
   }

   .lang-seg button:active {
     transform: scale(.97)
   }

   main {
     width: 100%;
     max-width: 480px;
     margin: 0 auto;
     padding: 14px 14px 24px
   }

   .summary-card {
     position: relative;
     overflow: hidden;
     background: #fff;
     border: 1.5px solid var(--line);
     border-radius: 26px;
     box-shadow: var(--shadow)
   }

   .summary-accent {
     height: 6px;
     background: var(--blue)
   }

   .summary-body {
     padding: 18px
   }

   .summary-main {
     display: grid;
     grid-template-columns: 108px minmax(0, 1fr);
     gap: 16px;
     align-items: center
   }

   .metric {
     min-height: 108px;
     border-radius: 22px;
     display: flex;
     flex-direction: column;
     align-items: center;
     justify-content: center;
     background: var(--blue-soft);
     color: var(--blue-deep);
     text-align: center;
     padding: 9px
   }

   .metric-value {
     font-family: 'Manrope';
     font-size: 43px;
     font-weight: 800;
     line-height: 1;
     letter-spacing: -1.7px
   }

   .metric-label {
     font-size: 15px;
     font-weight: 800;
     line-height: 1.2;
     margin-top: 7px
   }

   .summary-kicker {
     font-size: 14px;
     font-weight: 800;
     color: var(--muted);
     margin-bottom: 4px
   }

   .summary-title {
     font-size: clamp(25px, 6.7vw, 30px);
     font-weight: 800;
     line-height: 1.15;
     letter-spacing: -.4px
   }

   .summary-desc {
     font-size: 16.5px;
     font-weight: 650;
     color: var(--ink-soft);
     line-height: 1.4;
     margin-top: 7px
   }

   .completion {
     font-size: 15.5px;
     font-weight: 800;
     color: var(--blue-deep);
     margin-top: 7px
   }

   .summary-card.ok .summary-accent {
     background: var(--green)
   }

   .summary-card.ok .metric {
     background: var(--green-soft);
     color: var(--green)
   }

   .summary-card.review .summary-accent {
     background: var(--amber)
   }

   .summary-card.review .metric {
     background: var(--amber-soft);
     color: var(--amber)
   }

   .summary-card.urgent .summary-accent {
     background: var(--red)
   }

   .summary-card.urgent .metric {
     background: var(--red-soft);
     color: var(--red)
   }

   .summary-card.incomplete .summary-accent,
   .summary-card.noData .summary-accent {
     background: var(--blue)
   }

   .emergency-action {
     margin-top: 15px
   }

   .emergency-call {
     width: 100%;
     min-height: 58px;
     border: 0;
     border-radius: 18px;
     padding: 11px 16px;
     display: flex;
     align-items: center;
     justify-content: center;
     gap: 10px;
     background: var(--red);
     color: #fff;
     font-size: 20px;
     font-weight: 800;
     cursor: pointer;
     box-shadow: 0 9px 20px rgba(201, 61, 56, .20)
   }

   .emergency-call svg {
     width: 23px;
     height: 23px;
     fill: none;
     stroke: #fff;
     stroke-width: 2.2;
     stroke-linecap: round;
     stroke-linejoin: round
   }

   .emergency-call:active {
     transform: scale(.985)
   }

   .emergency-local {
     min-height: 58px;
     border-radius: 18px;
     padding: 12px 15px;
     display: flex;
     align-items: center;
     justify-content: center;
     background: var(--red);
     color: #fff;
     font-size: 18px;
     font-weight: 800;
     text-align: center
   }

   .module-grid {
     display: grid;
     grid-template-columns: repeat(3, minmax(0, 1fr));
     gap: 8px;
     margin-top: 12px
   }

   .module-tile {
     min-height: 124px;
     padding: 12px 7px 10px;
     border-radius: 20px;
     border: 1.5px solid var(--line);
     background: #fff;
     text-align: center;
     color: var(--ink);
     display: flex;
     flex-direction: column;
     align-items: center;
     justify-content: flex-start
   }

   .module-tile.current {
     border-color: var(--blue);
     box-shadow: 0 0 0 3px rgba(23, 111, 209, .12)
   }

   .module-tile[role="button"] {
     cursor: pointer
   }

   .module-tile[role="button"]:active {
     transform: scale(.98)
   }

   .module-icon {
     width: 43px;
     height: 43px;
     border-radius: 15px;
     display: flex;
     align-items: center;
     justify-content: center;
     background: var(--neutral-soft);
     color: #5B6C7F
   }

   .module-icon svg {
     width: 24px;
     height: 24px;
     fill: none;
     stroke: currentColor;
     stroke-width: 2.2;
     stroke-linecap: round;
     stroke-linejoin: round
   }

   .module-name {
     font-size: 17px;
     font-weight: 800;
     line-height: 1.2;
     margin-top: 8px
   }

   .module-status {
     font-size: 14px;
     font-weight: 750;
     line-height: 1.25;
     color: var(--ink-soft);
     margin-top: 4px
   }

   .module-action {
     font-size: 13.5px;
     font-weight: 800;
     color: var(--blue);
     margin-top: 4px
   }

   .module-tile.ok {
     border-color: #B6DED2
   }

   .module-tile.ok .module-icon {
     background: var(--green-soft);
     color: var(--green)
   }

   .module-tile.ok .module-status {
     color: var(--green)
   }

   .module-tile.warn {
     border-color: #E8CE9A
   }

   .module-tile.warn .module-icon {
     background: var(--amber-soft);
     color: var(--amber)
   }

   .module-tile.warn .module-status {
     color: var(--amber)
   }

   .module-tile.bad {
     border-color: #E8ADAA
   }

   .module-tile.bad .module-icon {
     background: var(--red-soft);
     color: var(--red)
   }

   .module-tile.bad .module-status {
     color: var(--red)
   }

   .next-step {
     margin-top: 12px;
     padding: 12px 14px;
     border: 1.5px solid var(--line);
     border-radius: 18px;
     background: #fff;
     font-size: 16.5px;
     font-weight: 750;
     color: var(--ink-soft);
     line-height: 1.4;
     text-align: center
   }

   .next-step.review {
     background: var(--amber-soft);
     border-color: #E7C88B;
     color: #744606
   }

   .next-step.urgent {
     background: var(--red-soft);
     border-color: #E7A39F;
     color: #912D29
   }

   .emergency-reminder {
     margin-top: 10px;
     padding: 10px 12px 10px 14px;
     border-radius: 15px;
     border: 1px solid var(--line);
     border-left: 5px solid var(--red);
     background: #fff;
     display: flex;
     align-items: center;
     justify-content: space-between;
     gap: 10px;
     font-size: 15.5px;
     font-weight: 750;
     color: var(--ink-soft)
   }

   .emergency-reminder button {
     border: 0;
     background: transparent;
     color: var(--red);
     font-size: 16px;
     font-weight: 800;
     cursor: pointer;
     white-space: nowrap
   }

   .emergency-reminder button:active {
     transform: scale(.97)
   }

   .research-panel {
     margin-top: 12px
   }

   .research-panel details {
     border: 1.5px dashed #9AABBC;
     border-radius: 18px;
     background: #fff;
     padding: 0 15px
   }

   .research-panel summary {
     min-height: 54px;
     display: flex;
     align-items: center;
     cursor: pointer;
     font-size: 16.5px;
     font-weight: 800;
     color: var(--ink-soft)
   }

   .research-content {
     padding: 0 0 16px
   }

   .research-warning {
     font-size: 15px;
     font-weight: 700;
     color: var(--red);
     line-height: 1.45;
     margin-bottom: 11px
   }

   .technical-grid {
     display: grid;
     grid-template-columns: 1fr auto;
     gap: 8px 12px;
     font-size: 15px
   }

   .technical-grid dt {
     color: var(--ink-soft);
     font-weight: 700
   }

   .technical-grid dd {
     font-family: 'Manrope';
     font-weight: 800;
     text-align: right
   }

   .actions {
     margin-top: 13px;
     display: flex;
     flex-direction: column;
     gap: 8px
   }

   .btn-primary,
   .btn-secondary {
     width: 100%;
     min-height: 56px;
     border-radius: 19px;
     padding: 10px 16px;
     font-size: 19px;
     font-weight: 800;
     cursor: pointer
   }

   .btn-primary {
     border: 0;
     background: var(--blue);
     color: #fff;
     box-shadow: 0 9px 22px rgba(23, 111, 209, .19)
   }

   .btn-secondary {
     border: 1.5px solid #AFC0D1;
     background: #fff;
     color: var(--ink)
   }

   .btn-primary:active,
   .btn-secondary:active {
     transform: scale(.985)
   }

   .btn-text {
     min-height: 40px;
     border: 0;
     background: transparent;
     color: var(--ink-soft);
     font-size: 15.5px;
     font-weight: 750;
     cursor: pointer;
     text-decoration: underline;
     text-underline-offset: 4px
   }

   .legal-note {
     font-size: 14px;
     font-weight: 650;
     color: var(--muted);
     text-align: center;
     margin-top: 9px
   }

   [hidden] {
     display: none !important
   }

   @media(min-width:520px) {
     body {
       max-width: 500px;
       margin: 0 auto;
       box-shadow: 0 0 0 1px rgba(20, 34, 53, .05), 0 20px 64px rgba(20, 34, 53, .14)
     }
   }

   @media(max-width:355px) {
     header {
       padding-left: 12px;
       padding-right: 12px
     }

     .brand-text {
       font-size: 17px
     }

     .lang-seg button {
       min-width: 38px;
       padding: 0 6px
     }

     main {
       padding-left: 10px;
       padding-right: 10px
     }

     .summary-main {
       grid-template-columns: 92px minmax(0, 1fr);
       gap: 12px
     }

     .metric {
       min-height: 98px
     }

     .metric-value {
       font-size: 37px
     }

     .summary-title {
       font-size: 24px
     }

     .module-grid {
       gap: 6px
     }

     .module-tile {
       padding-left: 5px;
       padding-right: 5px
     }

     .module-name {
       font-size: 16px
     }

     .module-status {
       font-size: 13px
     }

     .module-action {
       font-size: 12.5px
     }
   }

   @media(max-height:700px) {
     main {
       padding-top: 10px
     }

     .summary-body {
       padding: 15px
     }

     .summary-main {
       grid-template-columns: 96px minmax(0, 1fr)
     }

     .metric {
       min-height: 96px
     }

     .metric-value {
       font-size: 39px
     }

     .module-tile {
       min-height: 112px
     }

     .next-step {
       padding-top: 10px;
       padding-bottom: 10px
     }

     .actions {
       margin-top: 10px
     }
   }

   @media(prefers-reduced-motion:reduce) {
     * {
       transition: none !important;
       animation: none !important;
       scroll-behavior: auto !important
     }
   }
  </style>
  <script src="config.js">
  </script>
  <script src="./js/languages.js?v=20260717-lang-v1"></script>
  <script src="./js/i18n.js">
  </script>
 </head>
 <body>
  <header>
   <div aria-label="QuickStroke" class="brand">
    <div aria-hidden="true" class="brand-mark">
     <svg viewbox="0 0 24 24">
      <path d="M3 13h3.4l1.7-4.8 3.1 10.2 2.3-7.8 1.7 2.4H21">
      </path>
     </svg>
    </div>
    <div class="brand-text">
     Quick
     <strong>
      Stroke
     </strong>
    </div>
   </div>
   <div aria-label="Language selection" class="lang-seg" data-language-picker data-language-variant="compact" data-language-handler="resultSwitchLang" data-id-prefix="lang-" data-active-class="active"></div>
   <script>QuickStrokeLanguages.renderPicker(document.currentScript.previousElementSibling);</script>
  </header>
  <main>
   <section aria-live="polite" class="summary-card noData" id="summary-card">
    <div class="summary-accent">
    </div>
    <div class="summary-body">
     <div class="summary-main">
      <div class="metric">
       <div class="metric-value" id="metric-value">
        0/3
       </div>
       <div class="metric-label" id="metric-label">
       </div>
      </div>
      <div>
       <div class="summary-kicker" id="summary-kicker">
       </div>
       <h1 class="summary-title" id="summary-title">
        กำลังเตรียมผล…
       </h1>
       <p class="summary-desc" id="summary-desc">
       </p>
       <p class="completion" hidden="" id="completion">
       </p>
      </div>
     </div>
     <div class="emergency-action" hidden="" id="emergency-action">
     </div>
    </div>
   </section>
   <section aria-label="Module results" class="module-grid" id="module-grid">
   </section>
   <section class="next-step" id="next-step">
   </section>
   <section class="emergency-reminder" id="emergency-reminder">
   </section>
   <section class="research-panel" hidden="" id="research-panel">
    <details>
     <summary id="technical-title">
     </summary>
     <div class="research-content">
      <p class="research-warning" id="technical-disclaimer">
      </p>
      <dl class="technical-grid" id="technical-grid">
      </dl>
     </div>
    </details>
   </section>
   <div class="actions">
    <button class="btn-primary" id="primary-action" type="button">
    </button>
    <button class="btn-secondary" id="secondary-action" type="button">
    </button>
    <button class="btn-text" hidden="" id="retry-all" type="button">
    </button>
   </div>
   <p class="legal-note" id="legal-note">
   </p>
  </main>
  <script>
   'use strict';
   const RESULT_LOCALE_MAP = window.QuickStrokeLanguages?.localeMap || Object.freeze({
     th: 'th-TH',
     en: 'en-US',
     ja: 'ja-JP'
   });
   const MODULES = Object.freeze(['face', 'arm', 'speech']);
   const RESULT_CFG = window.QS_CONFIG?.scoring || {};
   const WEIGHTS = Object.freeze({
     face: RESULT_CFG.faceWeight ?? .40,
     arm: RESULT_CFG.armWeight ?? .40,
     speech: RESULT_CFG.speechWeight ?? .20
   });
   const SINGLE_POSITIVE_OVERRIDE = RESULT_CFG.singlePositiveOverride ?? true;
   const RESEARCH_MODE = new URLSearchParams(location.search).get('research') === '1' || window
     .QS_CONFIG?.researchMode === true;
   const REQUIRED = Object.freeze([
     'pageTitle',
     'summaryKicker',
     'individualKicker',
     'individualResultTitle',
     'individualNoDataDesc',
     'individualInvalidDesc',
     'individualOkDesc',
     'individualReviewDesc',
     'individualUrgentDesc',
     'individualNotCombined',
     'face',
     'arm',
     'speech',
     'moduleOk',
     'moduleReview',
     'moduleBad',
     'notTested',
     'invalidStatus',
     'stateNoDataTitle',
     'stateNoDataDesc',
     'stateIncompleteTitle',
     'stateIncompleteDesc',
     'stateOkTitle',
     'stateOkDesc',
     'stateReviewTitle',
     'stateReviewDesc',
     'stateUrgentTitle',
     'stateUrgentDesc',
     'metricTested',
     'metricDetected',
     'metricUnable',
     'completionShort',
     'nextNoData',
     'nextIncomplete',
     'nextOk',
     'nextReview',
     'nextUrgent',
     'safetyNote',
     'startTests',
     'continueTests',
     'checkRemaining',
     'home',
     'retryAll',
     'retryConfirm',
     'startModule',
     'retryModule',
     'retryCurrent',
     'emergencyThailand',
     'emergencyLocal',
     'emergencyReminderThailand',
     'emergencyReminderLocal',
     'technicalTitle',
     'technicalDisclaimer',
     'moduleScore',
     'internalWeightedScore',
     'basedOn',
     'languageUnavailable'
   ]);
   const ICONS = Object.freeze({
     face: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/></svg>',
     arm: '<svg viewBox="0 0 24 24"><path d="M7 20v-8a2 2 0 0 1 4 0v1-5a2 2 0 0 1 4 0v5-3a2 2 0 0 1 4 0v5c0 4-2.5 6-6 6h-1c-2.8 0-5-2.2-5-5z"/></svg>',
     speech: '<svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v3"/></svg>'
   });
   let T = null,
     LANG = 'th',
     requestId = 0,
     CURRENT = null;

   function validate(m, l) {
     if (!m || typeof m !== 'object') throw new Error(`Missing result translations for ${l}`);
     const missing = REQUIRED.filter(k => m[k] === undefined);
     if (missing.length) throw new Error(
       `Incomplete result translations for ${l}: ${missing.join(', ')}`)
   }

   function savedLang() {
     return String(sessionStorage.getItem('fast_lang') || 'th').split('-')[0].toLowerCase()
   }

   function setLangButtons(code) {
     window.QuickStrokeLanguages?.setActive(
       document.querySelector('header .lang-seg'),
       code,
       'active'
     )
   }
   async function readLocale(locale, persist) {
     if (!window.QuickStrokeI18n) throw new Error('QuickStrokeI18n unavailable');
     await window.QuickStrokeI18n.setLocale(locale, {
       persist,
       apply: false
     });
     const m = window.QuickStrokeI18n.getMessages()?.result;
     validate(m, locale);
     return m
   }
   async function loadResultLanguage(code, {
     persist = true
   } = {}) {
     code = String(code || 'th').split('-')[0].toLowerCase();
     let locale = RESULT_LOCALE_MAP[code];
     if (!locale) {
       code = 'th';
       locale = RESULT_LOCALE_MAP.th
     }
     const id = ++requestId;
     let m;
     try {
       m = await readLocale(locale, persist)
     } catch (e) {
       console.error(e);
       if (code === 'en') return false;
       code = 'en';
       locale = RESULT_LOCALE_MAP.en;
       try {
         m = await readLocale(locale, false)
       } catch (e2) {
         console.error(e2);
         return false
       }
     }
     if (id !== requestId) return false;
     T = m;
     LANG = code;
     if (persist) sessionStorage.setItem('fast_lang', code);
     document.documentElement.lang = locale;
     document.title = T.pageTitle;
     setLangButtons(code);
     buildResult();
     return true
   }

   function readModule(name) {
     const raw = sessionStorage.getItem(`fast_${name}`);
     if (!raw) return null;
     try {
       const d = JSON.parse(raw);
       return d && typeof d === 'object' ? d : null
     } catch (e) {
       console.warn(e);
       return {
         riskLevel: 'invalid'
       }
     }
   }

   function riskClass(score) {
     if (score >= 70) return 'ok';
     if (score >= 45) return 'warn';
     return 'bad'
   }

   function moduleClass(d) {
     if (!d || d.riskLevel === 'invalid' || d.score === undefined || d.score === null) return 'na';
     if (['ok', 'warn', 'bad'].includes(d.riskLevel)) return d.riskLevel;
     return riskClass(Number(d.score))
   }

   function requestedResultSource(data) {
     const querySource = new URLSearchParams(location.search).get('module');
     const storedSource = sessionStorage.getItem('fast_result_source');
     const explicitSource = MODULES.includes(querySource)
       ? querySource
       : MODULES.includes(storedSource)
         ? storedSource
         : null;

     if (explicitSource) {
       return explicitSource;
     }

     const mode = sessionStorage.getItem('fast_mode');
     const attempted = MODULES.filter(name => data[name]);

     if (mode === 'individual' && attempted.length === 1) {
       return attempted[0];
     }

     return null;
   }

   function calculate() {
     const data = Object.fromEntries(
       MODULES.map(name => [name, readModule(name)])
     );
     const valid = MODULES.filter(name => moduleClass(data[name]) !== 'na');
     const invalid = MODULES.filter(name => data[name]?.riskLevel === 'invalid');
     const missing = MODULES.filter(name => !data[name]);
     const bad = valid.filter(name => moduleClass(data[name]) === 'bad');
     const warn = valid.filter(name => moduleClass(data[name]) === 'warn');

     let totalWeight = 0;
     let weightedSum = 0;

     valid.forEach(name => {
       totalWeight += WEIGHTS[name];
       weightedSum += Number(data[name].score) * WEIGHTS[name];
     });

     const weighted = totalWeight > 0
       ? Math.round(weightedSum / totalWeight)
       : null;

     const mode = sessionStorage.getItem('fast_mode') || 'full';
     const source = requestedResultSource(data);
     const scope = mode === 'individual' && source
       ? 'individual'
       : 'combined';

     let state;

     if (scope === 'individual') {
       const sourceData = data[source];
       const sourceClass = moduleClass(sourceData);

       if (!sourceData) {
         state = 'noData';
       } else if (sourceClass === 'na') {
         state = 'incomplete';
       } else if (sourceClass === 'bad') {
         state = 'urgent';
       } else if (sourceClass === 'warn') {
         state = 'review';
       } else {
         state = 'ok';
       }
     } else if (SINGLE_POSITIVE_OVERRIDE && bad.length) {
       state = 'urgent';
     } else if (!valid.length) {
       state = 'noData';
     } else if (valid.length < 3) {
       state = 'incomplete';
     } else if (warn.length || riskClass(weighted) === 'warn') {
       state = 'review';
     } else if (riskClass(weighted) === 'bad') {
       state = 'urgent';
     } else {
       state = 'ok';
     }

     return {
       data,
       valid,
       invalid,
       missing,
       bad,
       warn,
       weighted,
       mode,
       scope,
       source,
       state,
       attention: [...bad, ...warn].length
     };
   }

   function emergencyPhone() {
     const configured = window.QS_CONFIG?.emergency?.phone || window.QS_CONFIG?.emergencyPhone;
     if (configured) return String(configured).replace(/[^+\d]/g, '');
     return LANG === 'th' ? '1669' : ''
   }

   function stateCopy(s) {
     return {
       noData: [T.stateNoDataTitle, T.stateNoDataDesc],
       incomplete: [T.stateIncompleteTitle, T.stateIncompleteDesc],
       ok: [T.stateOkTitle, T.stateOkDesc],
       review: [T.stateReviewTitle, T.stateReviewDesc],
       urgent: [T.stateUrgentTitle, T.stateUrgentDesc]
     } [s]
   }

   function individualSummaryCopy(r) {
     const moduleName = T[r.source];
     const title = T.individualResultTitle.replace('{module}', moduleName);
     const sourceData = r.data[r.source];
     const sourceClass = moduleClass(sourceData);

     let desc;

     if (!sourceData) {
       desc = T.individualNoDataDesc;
     } else if (sourceClass === 'na') {
       desc = T.individualInvalidDesc;
     } else if (sourceClass === 'ok') {
       desc = T.individualOkDesc;
     } else if (sourceClass === 'warn') {
       desc = T.individualReviewDesc;
     } else {
       desc = T.individualUrgentDesc;
     }

     return {
       title,
       desc,
       sourceClass,
       sourceData
     };
   }

   function renderSummary(r) {
     const card = document.getElementById('summary-card');
     card.className = `summary-card ${r.state}`;

     const kicker = document.getElementById('summary-kicker');
     const titleElement = document.getElementById('summary-title');
     const descElement = document.getElementById('summary-desc');
     const value = document.getElementById('metric-value');
     const label = document.getElementById('metric-label');
     const completion = document.getElementById('completion');

     if (r.scope === 'individual') {
       const copy = individualSummaryCopy(r);

       kicker.textContent = T.individualKicker;
       titleElement.textContent = copy.title;
       descElement.textContent = copy.desc;
       completion.hidden = true;

       if (!copy.sourceData) {
         value.textContent = '0/1';
         label.textContent = T.metricTested;
       } else if (copy.sourceClass === 'na') {
         value.textContent = '—';
         label.textContent = T.metricUnable;
       } else {
         value.textContent = copy.sourceClass === 'ok' ? '0/1' : '1/1';
         label.textContent = T.metricDetected;
       }
     } else {
       kicker.textContent = T.summaryKicker;

       const [title, desc] = stateCopy(r.state);
       titleElement.textContent = title;
       descElement.textContent = desc;

       const complete = r.valid.length === 3;
       const urgentPartial = r.state === 'urgent' && !complete;

       if (r.state === 'noData' || r.state === 'incomplete') {
         value.textContent = `${r.valid.length}/3`;
         label.textContent = T.metricTested;
         completion.hidden = true;
       } else {
         value.textContent = urgentPartial
           ? String(r.attention)
           : `${r.attention}/3`;
         label.textContent = T.metricDetected;
         completion.hidden = !urgentPartial;
         completion.textContent = T.completionShort.replace('{n}', r.valid.length);
       }
     }

     const emergency = document.getElementById('emergency-action');
     emergency.innerHTML = '';
     emergency.hidden = r.state !== 'urgent';

     if (r.state === 'urgent') {
       const phone = emergencyPhone();

       if (phone) {
         const button = document.createElement('button');
         button.type = 'button';
         button.className = 'emergency-call';
         button.innerHTML =
           '<svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2.1z"/></svg><span></span>';
         button.querySelector('span').textContent = T.emergencyThailand;
         button.onclick = () => {
           location.href = `tel:${phone}`;
         };
         emergency.appendChild(button);
       } else {
         const message = document.createElement('div');
         message.className = 'emergency-local';
         message.textContent = T.emergencyLocal;
         emergency.appendChild(message);
       }
     }
   }

   function moduleStatus(name, d) {
     if (!d) return {
       cls: 'na',
       text: T.notTested,
       action: T.startModule,
       actionable: true
     };
     if (d.riskLevel === 'invalid' || d.score === undefined || d.score === null) return {
       cls: 'na',
       text: T.invalidStatus,
       action: T.retryModule,
       actionable: true
     };
     const cls = moduleClass(d);
     return {
       cls,
       text: cls === 'ok' ? T.moduleOk : cls === 'warn' ? T.moduleReview : T.moduleBad,
       action: '',
       actionable: false
     }
   }

   function renderModules(r) {
     const grid = document.getElementById('module-grid');
     grid.innerHTML = '';
     MODULES.forEach(name => {
       const s = moduleStatus(name, r.data[name]);
       const el = document.createElement('div');
       const currentClass = r.scope === 'individual' && r.source === name
         ? ' current'
         : '';
       el.className = `module-tile ${s.cls}${currentClass}`;
       el.innerHTML =
         `<div class="module-icon">${ICONS[name]}</div><div class="module-name"></div><div class="module-status"></div><div class="module-action"></div>`;
       el.querySelector('.module-name').textContent = T[name];
       el.querySelector('.module-status').textContent = s.text;
       if (s.actionable && r.state !== 'urgent') {
         el.setAttribute('role', 'button');
         el.tabIndex = 0;
         el.querySelector('.module-action').textContent = s.action;
         const go = () => retryModule(name);
         el.onclick = go;
         el.onkeydown = e => {
           if (e.key === 'Enter' || e.key === ' ') {
             e.preventDefault();
             go()
           }
         };
         el.setAttribute('aria-label', `${T[name]} · ${s.text} · ${s.action}`)
       }
       grid.appendChild(el)
     })
   }

   function renderNext(r) {
     const element = document.getElementById('next-step');

     if (r.scope === 'individual') {
       element.textContent = T.individualNotCombined;
     } else {
       const messages = {
         noData: T.nextNoData,
         incomplete: T.nextIncomplete,
         ok: T.nextOk,
         review: T.nextReview,
         urgent: T.nextUrgent
       };
       element.textContent = messages[r.state];
     }

     element.className = `next-step ${
       r.state === 'urgent'
         ? 'urgent'
         : r.state === 'review'
           ? 'review'
           : ''
     }`.trim();
   }

   function renderReminder(r) {
     const el = document.getElementById('emergency-reminder');
     if (r.state === 'urgent') {
       el.hidden = true;
       return
     }
     el.hidden = false;
     el.innerHTML = '';
     const span = document.createElement('span');
     span.textContent = LANG === 'th' ? T.emergencyReminderThailand : T.emergencyReminderLocal;
     el.appendChild(span);
     const phone = emergencyPhone();
     if (phone) {
       const b = document.createElement('button');
       b.type = 'button';
       b.textContent = '1669';
       b.onclick = () => location.href = `tel:${phone}`;
       el.appendChild(b)
     }
   }

   function renderResearch(r) {
     const panel = document.getElementById('research-panel');
     panel.hidden = !RESEARCH_MODE;
     if (!RESEARCH_MODE) return;
     document.getElementById('technical-title').textContent = T.technicalTitle;
     document.getElementById('technical-disclaimer').textContent = T.technicalDisclaimer;
     const grid = document.getElementById('technical-grid');
     grid.innerHTML = '';
     MODULES.forEach(name => {
       const d = r.data[name],
         valid = moduleClass(d) !== 'na',
         dt = document.createElement('dt'),
         dd = document.createElement('dd');
       dt.textContent = T.moduleScore.replace('{module}', T[name]);
       dd.textContent = valid ? String(d.score) : '—';
       grid.append(dt, dd)
     });
     const dt = document.createElement('dt'),
       dd = document.createElement('dd');
     dt.textContent = T.internalWeightedScore;
     dd.textContent = r.weighted === null ? '—' :
       `${r.weighted} · ${T.basedOn.replace('{n}',r.valid.length)}`;
     grid.append(dt, dd)
   }

   function action(button, label, handler, hidden = false) {
     button.hidden = hidden;
     button.textContent = label;
     button.onclick = hidden ? null : handler
   }

   function renderActions(r) {
     const primary = document.getElementById('primary-action');
     const secondary = document.getElementById('secondary-action');
     const retry = document.getElementById('retry-all');

     if (r.scope === 'individual') {
       const sourceData = r.data[r.source];
       const sourceClass = moduleClass(sourceData);
       const hasRemaining = r.invalid.length > 0 || r.missing.length > 0;

       if (!sourceData || sourceClass === 'na') {
         action(primary, T.retryCurrent, () => retryModule(r.source));
         action(secondary, T.home, goHome);
         action(retry, '', null, true);
       } else if (r.state === 'urgent') {
         action(primary, T.home, goHome);
         action(secondary, '', null, true);
         action(retry, '', null, true);
       } else if (hasRemaining) {
         action(primary, T.checkRemaining, continueTests);
         action(secondary, T.home, goHome);
         action(retry, T.retryCurrent, () => retryModule(r.source), false);
       } else {
         action(primary, T.home, goHome);
         action(secondary, T.retryCurrent, () => retryModule(r.source));
         action(retry, '', null, true);
       }
     } else if (r.state === 'noData') {
       action(primary, T.startTests, continueTests);
       action(secondary, T.home, goHome);
       action(retry, '', null, true);
     } else if (r.state === 'incomplete') {
       action(primary, T.continueTests, continueTests);
       action(secondary, T.home, goHome);
       action(retry, T.retryAll, retryAll, false);
     } else if (r.state === 'urgent') {
       action(primary, T.home, goHome);
       action(secondary, '', null, true);
       action(retry, '', null, true);
     } else {
       action(primary, T.home, goHome);
       action(secondary, T.retryAll, retryAll);
       action(retry, '', null, true);
     }

     document.getElementById('legal-note').textContent = T.safetyNote;
   }

   function buildResult() {
     if (!T) return;
     CURRENT = calculate();
     renderSummary(CURRENT);
     renderModules(CURRENT);
     renderNext(CURRENT);
     renderReminder(CURRENT);
     renderResearch(CURRENT);
     renderActions(CURRENT)
   }

   function retryModule(name) {
     sessionStorage.removeItem(`fast_${name}`);
     sessionStorage.setItem('fast_mode', 'individual');
     sessionStorage.setItem('fast_result_source', name);
     sessionStorage.setItem('fast_lang', LANG);
     location.href = `${name}-test.html`;
   }

   function nextModule() {
     return CURRENT?.invalid[0] || CURRENT?.missing[0] || 'face';
   }

   function continueTests() {
     sessionStorage.setItem('fast_mode', 'full');
     sessionStorage.removeItem('fast_result_source');
     sessionStorage.setItem('fast_lang', LANG);
     location.href = `${nextModule()}-test.html`;
   }

   function retryAll() {
     if (!T || !confirm(T.retryConfirm)) {
       return;
     }

     [
       'fast_face',
       'fast_arm',
       'fast_speech',
       'fast_mode',
       'fast_result_source'
     ].forEach(key => {
       sessionStorage.removeItem(key);
     });

     sessionStorage.setItem('fast_lang', LANG);
     location.href = 'index.html';
   }

   function goHome() {
     sessionStorage.removeItem('fast_result_source');
     location.href = 'index.html';
   }

   async function resultSwitchLang(c) {
     await loadResultLanguage(c, {
       persist: true
     })
   }
   window.resultSwitchLang = resultSwitchLang;
   (async () => {
     const s = savedLang(),
       c = RESULT_LOCALE_MAP[s] ? s : 'th';
     if (!await loadResultLanguage(c, {
         persist: false
       })) throw new Error('Result language initialization failed')
   })().catch(e => {
     console.error(e);
     document.getElementById('summary-title').textContent = 'Language unavailable'
   });
  </script>
  <script>
   if ('serviceWorker' in navigator) {
     addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js').catch(e =>
       console.error(e)))
   }
  </script>

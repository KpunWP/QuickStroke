<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QuickStroke</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0F6FFF">
<meta name="apple-mobile-web-app-title" content="QuickStroke">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  :root {
    --paper:#F4F7FA;
    --surface:rgba(255,255,255,.86);
    --surface-solid:#FFFFFF;
    --surface-alt:#F8FAFC;
    --ink:#172536;
    --ink-soft:#5A6B7B;
    --ink-faint:#94A3B2;
    --clinical:#2B7DE9;
    --clinical-deep:#0D58B8;
    --clinical-soft:#EAF2FD;
    --mint:#1FA98F;
    --mint-soft:#E6F6F2;
    --amber:#E89B3C;
    --amber-soft:#FCF3E6;
    --coral:#E5544E;
    --coral-soft:#FCEBEA;
    --line:rgba(27,42,58,.10);
    --line-soft:rgba(27,42,58,.07);
    --glass-border:rgba(255,255,255,.70);
    --shadow:0 10px 28px rgba(27,42,58,.08);
    --shadow-lg:0 18px 46px rgba(27,42,58,.13);
    --blue-glow:0 0 24px rgba(43,125,233,.22),0 16px 40px rgba(27,42,58,.10);
    --r:24px;
    --r-sm:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:#E8EEF5;min-height:100dvh}
  html,body{-webkit-overflow-scrolling:touch}
  body{
    min-height:100dvh;
    background:
      radial-gradient(circle at 50% -6%, rgba(43,125,233,.22), transparent 34%),
      radial-gradient(circle at 100% 18%, rgba(31,169,143,.10), transparent 26%),
      var(--paper);
    font-family:'IBM Plex Sans Thai','Manrope',-apple-system,sans-serif;
    color:var(--ink);
    display:flex;flex-direction:column;
    overflow-x:hidden;line-height:1.5;
  }
  .num{font-family:'Manrope',sans-serif;font-variant-numeric:tabular-nums}

  header{
    position:sticky;top:0;z-index:50;
    min-height:70px;padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(244,247,250,.78);
    border-bottom:1px solid rgba(255,255,255,.72);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    box-shadow:0 8px 28px rgba(27,42,58,.05);
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand-mark{
    width:42px;height:42px;border-radius:21px;
    background:linear-gradient(180deg,#2388ff,var(--clinical-deep));
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 0 18px rgba(43,125,233,.35),0 10px 26px rgba(27,42,58,.14);
  }
  .brand-mark svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.25}
  .brand-mark svg .pulse-line{stroke-linecap:round;stroke-linejoin:round}
  .brand-mark svg .bolt{fill:#fff;stroke:none}
  .brand-text{
    font-family:'Manrope';font-weight:800;font-size:18px;letter-spacing:.2px;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .brand-text span{color:var(--clinical)}
  .header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .back-btn{
    height:42px;border:1px solid var(--glass-border);background:rgba(255,255,255,.72);border-radius:16px;
    color:var(--ink-soft);font-family:'IBM Plex Sans Thai';font-size:13px;font-weight:800;
    padding:0 13px;cursor:pointer;display:flex;align-items:center;gap:5px;
    box-shadow:0 8px 22px rgba(27,42,58,.06);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    transition:transform .12s,background .15s,color .15s;
  }
  .back-btn:active{transform:scale(.96)}
  .back-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.2}
  #lang-sw-fixed{
    display:flex;gap:3px;padding:4px;border-radius:18px;
    background:rgba(255,255,255,.72);border:1px solid var(--glass-border);
    box-shadow:0 8px 22px rgba(27,42,58,.06);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .lsf-btn{
    height:34px;min-width:38px;border:none;background:transparent;
    font-family:'Manrope';font-weight:800;font-size:12px;color:var(--ink-faint);
    padding:0 8px;border-radius:14px;cursor:pointer;transition:transform .12s,background .15s,color .15s,box-shadow .15s;
  }
  .lsf-btn:active{transform:scale(.96)}
  .lsf-btn.active{
    color:#fff;background:linear-gradient(180deg,#2388ff,var(--clinical-deep));
    box-shadow:0 0 0 1px rgba(73,158,255,.45),0 0 18px rgba(43,125,233,.32);
  }

  /* ── Score hero ── */
  .score-hero{padding:28px 22px 18px;text-align:center}
  .score-eyebrow{
    font-family:'Manrope';font-size:11px;font-weight:800;letter-spacing:1.5px;
    color:var(--ink-faint);text-transform:uppercase;margin-bottom:14px;
  }
  .score-ring{
    width:186px;height:186px;margin:0 auto 18px;position:relative;
    border-radius:38px;background:var(--surface);
    border:1px solid var(--glass-border);box-shadow:var(--blue-glow);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    display:flex;align-items:center;justify-content:center;
  }
  .score-ring svg{transform:rotate(-90deg);filter:drop-shadow(0 8px 18px rgba(27,42,58,.08))}
  .ring-track{fill:none;stroke:rgba(27,42,58,.07);stroke-width:12}
  .ring-fill{fill:none;stroke-width:12;stroke-linecap:round;
    stroke-dasharray:376;stroke-dashoffset:376;transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)}
  .score-center{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center}
  .score-num{font-family:'Manrope';font-size:56px;font-weight:800;line-height:1;letter-spacing:-2px}
  .score-denom{font-family:'Manrope';font-size:14px;font-weight:700;color:var(--ink-faint);margin-top:2px}

  .risk-badge{
    display:inline-flex;align-items:center;gap:7px;padding:9px 20px;
    border-radius:24px;font-size:16px;font-weight:800;margin-bottom:12px;
    border:1px solid rgba(255,255,255,.65);box-shadow:0 8px 22px rgba(27,42,58,.06);
  }
  .risk-badge svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5}
  .risk-badge.ok{background:rgba(230,246,242,.86);color:var(--mint)}
  .risk-badge.warn{background:rgba(252,243,230,.88);color:var(--amber)}
  .risk-badge.bad{background:rgba(252,235,234,.88);color:var(--coral)}
  .risk-desc{font-size:15px;color:var(--ink-soft);line-height:1.6;max-width:330px;margin:0 auto;font-weight:700}

  /* ── Module breakdown ── */
  .section{padding:8px 22px 0}
  .section-eyebrow{
    font-family:'Manrope';font-size:11px;font-weight:800;letter-spacing:1.5px;
    color:var(--ink-faint);text-transform:uppercase;margin-bottom:13px;padding-left:2px;
  }
  #module-cards{display:flex;flex-direction:column;gap:10px}
  .mcard{
    background:var(--surface);border:1px solid var(--glass-border);border-radius:24px;
    padding:18px;box-shadow:var(--shadow);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  }
  .mcard.ok{border-color:rgba(31,169,143,.24);background:rgba(230,246,242,.72)}
  .mcard.warn{border-color:rgba(232,155,60,.25);background:rgba(252,243,230,.74)}
  .mcard.bad{border-color:rgba(229,84,78,.24);background:rgba(252,235,234,.74)}
  .mcard.na{border-color:rgba(27,42,58,.12);background:rgba(248,250,252,.82)}
  .mcard.na .mcard-status{color:var(--ink-faint)}
  .mcard.na .mcard-icon svg{stroke:var(--ink-faint)}
  .partial-note{text-align:center;font-size:12.5px;color:var(--ink-faint);font-weight:700;margin-top:8px}
  .mcard-top{display:flex;align-items:center;gap:13px;margin-bottom:13px}
  .mcard-icon{
    width:52px;height:52px;border-radius:21px;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;background:rgba(248,250,252,.95);
    box-shadow:inset 0 0 0 1px rgba(27,42,58,.05);
  }
  .mcard-icon svg{width:27px;height:27px;stroke:var(--ink-soft);fill:none;stroke-width:2.1}
  .mcard.ok .mcard-icon,.mcard.warn .mcard-icon,.mcard.bad .mcard-icon{background:#fff}
  .mcard.ok .mcard-icon svg{stroke:var(--mint)}
  .mcard.warn .mcard-icon svg{stroke:var(--amber)}
  .mcard.bad .mcard-icon svg{stroke:var(--coral)}
  .mcard-name{font-size:17px;font-weight:800;color:var(--ink)}
  .mcard-status{font-size:13.5px;font-weight:800;margin-top:1px;color:var(--ink-faint)}
  .mcard.ok .mcard-status{color:var(--mint)}
  .mcard.warn .mcard-status{color:var(--amber)}
  .mcard.bad .mcard-status{color:var(--coral)}
  .mcard-score-row{display:flex;align-items:center;gap:12px}
  .mcard-bar-track{flex:1;height:8px;background:rgba(27,42,58,.07);border-radius:8px;overflow:hidden}
  .mcard-bar-fill{height:100%;border-radius:8px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
  .mcard.ok .mcard-bar-fill{background:var(--mint)}
  .mcard.warn .mcard-bar-fill{background:var(--amber)}
  .mcard.bad .mcard-bar-fill{background:var(--coral)}
  .mcard-score-num{font-family:'Manrope';font-size:20px;font-weight:800;
    color:var(--ink);width:62px;text-align:right;flex-shrink:0}

  /* ── Emergency box ── */
  .emergency-box{
    margin:20px 22px 0;background:rgba(252,235,234,.78);
    border:1px solid rgba(229,84,78,.18);border-radius:24px;padding:18px;
    display:none;text-align:center;box-shadow:0 10px 28px rgba(229,84,78,.07);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .emergency-box.visible{display:block}
  .emg-icon{width:48px;height:48px;margin:0 auto 10px;border-radius:18px;
    background:var(--coral);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(229,84,78,.22)}
  .emg-icon svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.2}
  .emg-title{font-size:18px;font-weight:800;color:var(--coral);margin-bottom:14px}
  .emg-call{display:flex;align-items:center;justify-content:center;gap:9px;
    background:var(--coral);color:#fff;border:none;border-radius:20px;padding:15px;
    font-family:'IBM Plex Sans Thai';font-size:18px;font-weight:800;cursor:pointer;width:100%;
    transition:transform .12s;box-shadow:0 10px 24px rgba(229,84,78,.20)}
  .emg-call:active{transform:scale(.97)}
  .emg-call svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2.2}

  /* ── Suggestions ── */
  .suggest-box{margin:20px 22px 0;background:var(--surface);
    border:1px solid var(--glass-border);border-radius:24px;padding:18px;box-shadow:var(--shadow);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
  .suggest-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--ink)}
  .suggest-title svg{width:18px;height:18px;stroke:var(--clinical);fill:none;stroke-width:2.2}
  #suggest-list{list-style:none;display:flex;flex-direction:column;gap:11px}
  #suggest-list li{font-size:14.5px;color:var(--ink-soft);line-height:1.5;
    padding-left:24px;position:relative;font-weight:700}
  #suggest-list li::before{
    content:'';position:absolute;left:4px;top:8px;width:8px;height:8px;
    border-radius:50%;background:var(--clinical);box-shadow:0 0 10px rgba(43,125,233,.24);
  }

  /* ── Actions ── */
  .actions{padding:24px 22px 32px;margin-top:auto;display:flex;flex-direction:column;gap:11px}
  .btn-primary{
    min-height:62px;border-radius:24px;border:none;
    background:linear-gradient(180deg,#2388ff,var(--clinical-deep));
    color:#fff;font-family:'IBM Plex Sans Thai';font-size:18px;font-weight:800;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:var(--blue-glow);transition:transform .12s;
  }
  .btn-primary:active{transform:scale(.985)}
  .btn-primary svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2.2}
  .btn-secondary{
    min-height:52px;border-radius:20px;border:1px solid var(--glass-border);
    background:rgba(255,255,255,.72);color:var(--ink-soft);font-family:'IBM Plex Sans Thai';
    font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s;
    box-shadow:0 8px 22px rgba(27,42,58,.06);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .btn-secondary:active{transform:scale(.98)}

  @media (min-width:520px){
    body{max-width:430px;margin:0 auto;box-shadow:0 0 0 1px rgba(27,42,58,.06),0 24px 70px rgba(27,42,58,.16)}
  }
  @media (max-width:390px){
    .brand-text{font-size:16px}.back-btn span{display:none}.back-btn{width:42px;padding:0;justify-content:center}.lsf-btn{min-width:34px;padding:0 7px}
  }
  @media (max-height:760px){
    header{min-height:62px;padding:10px 14px}.brand-mark{width:38px;height:38px}.brand-text{font-size:16px}
    .lsf-btn{height:32px;min-width:36px;font-size:12px}.back-btn{height:40px}
    .score-hero{padding:20px 20px 12px}.score-ring{width:168px;height:168px;border-radius:32px;margin-bottom:12px}
    .score-num{font-size:50px}.section{padding-left:20px;padding-right:20px}.actions{padding-bottom:20px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

</style>
<script src="config.js"></script>
<script src="./js/i18n.js"></script>

  <div class="brand">

    <svg viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>

<script>
'use strict';

// อ่านภาษาปัจจุบันจาก sessionStorage และ normalize เป็น th / en / ja
function getLang() {
  return String(sessionStorage.getItem('fast_lang') || 'th')
    .split('-')[0]
    .toLowerCase();
}

const RESULT_LOCALE_MAP = Object.freeze({
  th: 'th-TH',
  en: 'en-US',
  ja: 'ja-JP'
});

const RESULT_REQUIRED_KEYS = Object.freeze([
  'pageTitle', 'face', 'arm', 'speech',
  'ok', 'warn', 'bad',
  'riskOk', 'riskWarn', 'riskBad',
  'descOk', 'descWarn', 'descBad',
  'suggestOk', 'suggestWarn', 'suggestBad',
  'retryAll', 'back', 'home', 'call', 'seeDoc',
  'eyebrow', 'breakdown', 'suggest', 'notTested',
  'invalidStatus', 'partialNote', 'noValidNote',
  'overrideNote', 'languageUnavailable'
]);

let RESULT_T = null;
let resultLanguageRequestId = 0;

function validateResultMessages(messages, locale) {
  if (!messages || typeof messages !== 'object') {
    throw new Error(`Missing result translations for ${locale}`);
  }

  const missing = RESULT_REQUIRED_KEYS.filter(key => messages[key] === undefined);
  if (missing.length) {
    throw new Error(`Incomplete result translations for ${locale}: ${missing.join(', ')}`);
  }

  ['suggestOk', 'suggestWarn', 'suggestBad'].forEach(key => {
    if (!Array.isArray(messages[key]) || messages[key].length === 0) {
      throw new Error(`Invalid result suggestion list ${key} for ${locale}`);
    }
  });
}

function setResultLanguageButtons(code) {
  ['th','en','ja'].forEach(c => {
    const button = document.getElementById('lsf-' + c);
    if (!button) return;

    const active = c === code;
    button.classList.toggle('active', active);
    button.setAttribute('aria-pressed', String(active));
  });
}

async function readResultLocale(locale, persist) {
  if (!window.QuickStrokeI18n) {
    throw new Error('QuickStrokeI18n is not available');
  }

  await window.QuickStrokeI18n.setLocale(locale, {
    persist,
    apply: false
  });

  const messages = window.QuickStrokeI18n.getMessages();
  const resultMessages = messages?.result;
  validateResultMessages(resultMessages, locale);
  return resultMessages;
}

async function loadResultLanguage(requestedCode, { persist = true } = {}) {
  let code = String(requestedCode || 'th').split('-')[0].toLowerCase();
  let locale = RESULT_LOCALE_MAP[code];

  if (!locale) {
    console.warn(`Unsupported result language: ${requestedCode}`);
    code = 'th';
    locale = RESULT_LOCALE_MAP.th;
  }

  const requestId = ++resultLanguageRequestId;
  let messages;

  try {
    messages = await readResultLocale(locale, persist);
  } catch (error) {
    console.error(`Could not load result locale ${locale}.`, error);

    if (code === 'en') return false;

    try {
      code = 'en';
      locale = RESULT_LOCALE_MAP.en;
      messages = await readResultLocale(locale, false);
    } catch (fallbackError) {
      console.error('Could not load the English result fallback.', fallbackError);
      return false;
    }
  }

  if (requestId !== resultLanguageRequestId) return false;

  RESULT_T = messages;
  if (persist) sessionStorage.setItem('fast_lang', code);
  document.documentElement.lang = locale;
  document.title = RESULT_T.pageTitle;
  setResultLanguageButtons(code);
  buildResult();
  return true;
}

// น้ำหนักตามงานวิจัย: face และ arm เป็นตัวทำนาย stroke อิสระ (Santa Clara, n=359)
const RESULT_CFG = window.QS_CONFIG?.scoring || {};

const WEIGHTS = {
  face: RESULT_CFG.faceWeight ?? 0.40,
  arm: RESULT_CFG.armWeight ?? 0.40,
  speech: RESULT_CFG.speechWeight ?? 0.20
};

const SINGLE_POSITIVE_OVERRIDE = RESULT_CFG.singlePositiveOverride ?? true;

// SVG icons แทน emoji
const ICONS = {
  face:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/></svg>',
  arm:'<svg viewBox="0 0 24 24"><path d="M6 19V9a3 3 0 0 1 6 0v1m0-1a3 3 0 0 1 6 0v10"/></svg>',
  speech:'<svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v3"/></svg>',
};

function getRiskClass(score) {
  if (score >= 70) return 'ok';
  if (score >= 45) return 'warn';
  return 'bad';
}

function applyStaticLabels(T) {
  document.getElementById('eyebrow').textContent = T.eyebrow;
  document.getElementById('breakdown-title').textContent = T.breakdown;
  document.getElementById('suggest-title').textContent = T.suggest;
  document.getElementById('back-label').textContent = T.back;
  document.getElementById('call-label').textContent = T.call;
  document.getElementById('emg-sub').textContent = T.seeDoc;
  document.getElementById('home-btn').textContent = T.home;
}

function buildResult() {
  const T = RESULT_T;
  if (!T) return;
  applyStaticLabels(T);

  const data = {
    face:   JSON.parse(sessionStorage.getItem('fast_face')   || 'null'),
    arm:    JSON.parse(sessionStorage.getItem('fast_arm')    || 'null'),
    speech: JSON.parse(sessionStorage.getItem('fast_speech') || 'null'),
  };

  // ── แยกประเภทผลก่อนคำนวณ ──
  // 'invalid' = ตรวจไม่สำเร็จทางเทคนิค (เช่น กล้องมองปากไม่เห็น) ไม่ใช่ผลผิดปกติ
  // เดิม: score 0 ของ invalid ถูกนับเป็น bad → ยิง single-positive override
  //       → ขึ้น "เสี่ยงสูง โทร 1669" ทั้งที่แค่วัดไม่ได้ = false alarm ร้ายแรง
  // ใหม่: invalid ถูกตัดออกจาก weighted score และ override โดยสิ้นเชิง
  const isValid = (m) => data[m] && data[m].score !== undefined && data[m].riskLevel !== 'invalid';

  // weighted FAST score (เฉพาะโมดูลที่ประเมินได้จริง)
  let totalWeight = 0, weightedSum = 0, validCount = 0;
  ['face','arm','speech'].forEach(m => {
    if (isValid(m)) {
      weightedSum += data[m].score * WEIGHTS[m];
      totalWeight += WEIGHTS[m];
      validCount++;
    }
  });
  const fastScore = totalWeight > 0 ? Math.round(weightedSum / totalWeight) : 0;

  // single-positive override (หลัก CPSS) — เฉพาะผลที่ valid เท่านั้น
  let anyBad = false, badModules = [];
  ['face','arm','speech'].forEach(m => {
    if (isValid(m) && getRiskClass(data[m].score) === 'bad') {
      anyBad = true; badModules.push(m);
    }
  });
  const noValidData = (validCount === 0);
  const riskClass = noValidData ? 'warn'
    : (SINGLE_POSITIVE_OVERRIDE && anyBad) ? 'bad'
    : getRiskClass(fastScore);

  // score ring
  const circumference = 376;
  const offset = circumference - (fastScore / 100) * circumference;
  const ringColors = { ok:'#1FA98F', warn:'#E89B3C', bad:'#E5544E' };
  const fill = document.getElementById('ring-fill');
  fill.style.stroke = ringColors[riskClass];
  setTimeout(() => { fill.style.strokeDashoffset = offset; }, 100);
  document.getElementById('total-score').textContent = noValidData ? '—' : fastScore;
  document.getElementById('total-score').style.color = ringColors[riskClass];

  // #4: บอกชัดเมื่อคะแนนมาจากผลไม่ครบ 3 โมดูล
  let pn = document.getElementById('partial-note');
  if (!pn){
    pn = document.createElement('div');
    pn.id = 'partial-note'; pn.className = 'partial-note';
    document.getElementById('risk-desc').insertAdjacentElement('afterend', pn);
  }
  pn.textContent = noValidData ? '' : (validCount < 3 ? T.partialNote.replace('{n}', validCount) : '');

  // risk badge
  const checkIcon = '<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';
  const warnIcon = '<svg viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>';
  const badge = document.getElementById('risk-badge');
  badge.className = 'risk-badge ' + riskClass;
  const badgeIcon = riskClass === 'ok' ? checkIcon : warnIcon;
  const badgeText = { ok:T.riskOk, warn:T.riskWarn, bad:T.riskBad }[riskClass];
  badge.innerHTML = badgeIcon + '<span>' + badgeText + '</span>';

  document.getElementById('risk-desc').textContent = noValidData
    ? T.noValidNote
    : T['desc' + riskClass.charAt(0).toUpperCase() + riskClass.slice(1)];
  if (SINGLE_POSITIVE_OVERRIDE && anyBad && fastScore >= 45) {
    const names = badModules.map(m => T[m]).join(', ');
    document.getElementById('risk-desc').textContent = T.overrideNote.replace('{modules}', names);
  }

  // module cards
  const container = document.getElementById('module-cards');
  container.innerHTML = '';
  ['face','arm','speech'].forEach(m => {
    const d = data[m];
    const invalid = d && d.riskLevel === 'invalid';
    const score = (d && !invalid) ? (d.score ?? null) : null;
    // ยังไม่เช็ค / ตรวจไม่สำเร็จ → สีเทากลาง (เดิมใช้ warn สีส้ม สื่อผิดว่ามีความเสี่ยง)
    const cls = score !== null ? getRiskClass(score) : 'na';
    const statusText = invalid ? T.invalidStatus
      : (score !== null ? { ok:T.ok, warn:T.warn, bad:T.bad }[cls] : T.notTested);
    const card = document.createElement('div');
    card.className = 'mcard ' + cls;
    if (invalid){
      // แตะการ์ดเพื่อกลับไปทดสอบโมดูลนั้นใหม่ได้ทันที
      card.style.cursor = 'pointer';
      card.onclick = () => { window.location.href = m + '-test.html'; };
    }
    card.innerHTML = `
      <div class="mcard-top">
        <div class="mcard-icon">${ICONS[m]}</div>
        <div><div class="mcard-name">${T[m]}</div><div class="mcard-status">${statusText}</div></div>
      </div>
      <div class="mcard-score-row">
        <div class="mcard-bar-track"><div class="mcard-bar-fill" style="width:0%" data-target="${score ?? 0}"></div></div>
        <div class="mcard-score-num">${score !== null ? score : '—'}</div>
      </div>`;
    container.appendChild(card);
  });
  setTimeout(() => {
    document.querySelectorAll('.mcard-bar-fill').forEach(el => { el.style.width = el.dataset.target + '%'; });
  }, 200);

  // emergency
  document.getElementById('emergency-box').classList.toggle('visible', riskClass === 'bad');

  // suggestions
  const suggestions = T['suggest' + riskClass.charAt(0).toUpperCase() + riskClass.slice(1)];
  document.getElementById('suggest-list').innerHTML = suggestions.map(s => `<li>${s}</li>`).join('');

  // retry button
  document.getElementById('retry-btn').textContent = T.retryAll;
}

function retryAll() {
  ['fast_face','fast_arm','fast_speech','fast_mode'].forEach(k => sessionStorage.removeItem(k));
  window.location.href = 'index.html';
}

async function resultSwitchLang(code) {
  await loadResultLanguage(code, { persist: true });
}

window.resultSwitchLang = resultSwitchLang;

(async function initResultLanguage() {
  const savedLang = getLang();
  const code = RESULT_LOCALE_MAP[savedLang] ? savedLang : 'th';
  const ready = await loadResultLanguage(code, { persist: false });

  if (!ready) {
    throw new Error('Result language initialization failed');
  }
})().catch(error => {
  console.error('Result page initialization failed.', error);

  const badge = document.getElementById('risk-badge');
  if (badge) {
    badge.className = 'risk-badge warn';
    badge.textContent = 'Language unavailable';
  }
});
</script>

        .then(() => {
          console.log("QuickStroke service worker registered");
        })
        .catch((err) => {
          console.error("Service worker registration failed:", err);
        });
    });
  }
</script>

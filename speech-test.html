<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FAST · Speech Test (Retry Release Fix)</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0F6FFF">
<meta name="apple-mobile-web-app-title" content="QuickStroke">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root {
    --bg:#F4F6F8; --surface:#FFFFFF; --surface-alt:#FAFBFC; --border:#D4DEE8;
    --blue:#2B7DE9; --green:#1FA98F; --red:#E5544E; --amber:#E89B3C;
    --text:#1B2A3A; --muted:#5A6B7B; --muted2:#94A3B2;
    --shadow:0 2px 4px rgba(27,42,58,0.06), 0 8px 24px rgba(27,42,58,0.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);font-family:'IBM Plex Sans Thai','Manrope',-apple-system,sans-serif;color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-overflow-scrolling:touch}
  .num{font-family:'Manrope';font-variant-numeric:tabular-nums}

  #lang-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px 28px}
  .title-lbl{font-size:12px;font-weight:600;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
  .main-title{font-size:26px;font-weight:600;text-align:center}
  .lang-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
  .lang-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;color:var(--text);box-shadow:var(--shadow);transition:transform 0.12s}
  .lang-btn:active{transform:scale(0.98)}
  .lang-btn:active{border-color:var(--blue);background:rgba(59,130,246,.1)}
  .lang-flag{font-size:26px}.lang-text{font-size:15px;font-weight:600}

  #test-screen{flex:1;display:none;flex-direction:column;height:100%;overflow:hidden}
  #top-bar{padding:16px 22px 0;display:flex;align-items:center;justify-content:space-between}
  .nav-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:8px}
  #mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px 24px;gap:14px;overflow-y:scroll;-webkit-overflow-scrolling:touch;width:100%}

  .mic-box{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mic-circle{width:100px;height:100px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;transition:all 0.3s}
  .mic-circle.calibrating{border-color:var(--amber);background:rgba(245,158,11,0.08)}
  .mic-circle.recording{border-color:var(--red);background:rgba(239,68,68,0.08);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .mic-icon{font-size:38px}
  #freq-canvas{position:absolute;inset:0;width:120px;height:120px;border-radius:50%;pointer-events:none;transform:rotate(-90deg)}

  .word-display{font-size:36px;font-weight:800;text-align:center;letter-spacing:-0.5px;color:var(--text)}
  .hint-lbl{font-size:15px;color:var(--muted);text-align:center;max-width:290px;line-height:1.6;font-weight:500}
  #transcript-box{font-family:'Manrope',monospace;font-size:13px;color:var(--amber);background:rgba(255,255,255,0.03);padding:8px 16px;border-radius:10px;display:none;text-align:center;width:100%;max-width:280px}

  #metrics-box{width:100%;max-width:280px;display:none;flex-direction:column;gap:10px}
  .metric-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .metric-val{font-family:'Manrope',monospace;font-size:14px;font-weight:700;color:var(--text)}
  .bar-track{height:8px;background:var(--surface-alt);border:1px solid var(--border);border-radius:5px;overflow:hidden}
  .bar-fill{height:100%;width:0%;border-radius:4px;transition:width 0.3s}

  #result-banner{display:none;width:100%;max-width:280px;border-radius:14px;padding:14px 16px;flex-direction:column;gap:4px}
  #result-banner.ok{background:rgba(16,185,129,.1);border:1.5px solid rgba(16,185,129,.3)}
  #result-banner.warn{background:rgba(245,158,11,.1);border:1.5px solid rgba(245,158,11,.3)}
  #result-banner.bad{background:rgba(239,68,68,.1);border:1.5px solid rgba(239,68,68,.3)}
  .rb-title{font-size:18px;font-weight:700}
  .rb-score{font-family:'Manrope',monospace;font-size:42px;font-weight:800;text-align:center;margin:6px 0;letter-spacing:-1px}
  .rb-sub{font-size:11px;color:var(--muted);line-height:1.5}

  #debug-box{display:none;width:calc(100% - 44px);margin:0 22px 10px;background:#1B2A3A;border-radius:10px;padding:12px 14px;font-family:monospace;font-size:12px;color:#A8F5C3;line-height:2;flex-shrink:0}

  #action-btn{width:calc(100% - 44px);margin:0 22px 28px;min-height:60px;border-radius:15px;border:none;font-family:'IBM Plex Sans Thai';font-size:17px;font-weight:600;cursor:pointer;color:#fff;background:var(--blue);flex-shrink:0;box-shadow:0 6px 18px rgba(43,125,233,0.28);transition:transform 0.12s}
  #action-btn:active{transform:scale(0.97)}
  #action-btn:active{opacity:.85;transform:scale(.98)}
  #action-btn.red{background:var(--red)}
  #action-btn.green{background:var(--green)}

  /* ── ปุ่มภาษา fixed มุมบนขวา ── */
  #lang-sw-fixed {
    position: fixed; top: 10px; right: 10px; z-index: 200;
    display: none; gap: 4px;
  }
  #lang-sw-fixed.show { display: flex; }
  .lsf-btn {
    background: rgba(27,42,58,0.08);
    border: 1px solid rgba(27,42,58,0.18);
    color: var(--text); border-radius: 8px;
    padding: 5px 9px; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: 'Manrope', sans-serif;
    transition: background 0.15s;
  }
  .lsf-btn:active, .lsf-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }


  /* ─────────────────────────────────────────────
     FINAL SPEECH UI — aligned with arm-test dark glass HUD
     Logic unchanged: UI/CSS + small navigation/status helpers only
     ───────────────────────────────────────────── */
  :root {
    --col-blue-glass:   rgba(15, 32, 67, 0.55);
    --col-orange-glass: rgba(214, 116, 17, 0.65);
    --col-green-glass:  rgba(20, 108, 81, 0.60);
    --col-red-glass:    rgba(186, 38, 38, 0.65);
    --col-bg:#0E1620;
    --bg:var(--col-bg);
    --surface:rgba(14,22,32,0.72);
    --surface-alt:rgba(8,12,16,0.55);
    --border:rgba(255,255,255,0.16);
    --text:#FFFFFF;
    --muted:rgba(255,255,255,0.68);
    --muted2:rgba(255,255,255,0.45);
    --shadow:0 16px 40px rgba(0,0,0,0.45);
  }
  html{background:#10141d;display:flex;justify-content:center;align-items:center;min-height:100dvh;}
  body{
    background:radial-gradient(circle at 50% 8%, rgba(43,125,233,.24), transparent 32%), #050910;
    width:390px;max-width:100vw;height:844px;max-height:100dvh;position:relative;
    box-shadow:0 0 0 1px rgba(255,255,255,.08),0 24px 60px rgba(0,0,0,.60);
  }
  @media (min-width:500px){body{border-radius:40px;height:min(844px,100dvh);}}

  #lang-screen{display:none !important;background:rgba(14,22,32,.95);color:#fff;}
  #test-screen{display:flex !important;position:relative;overflow:hidden;}

  #speech-home-btn{
    position:absolute;top:18px;left:18px;z-index:120;width:44px;height:44px;border-radius:22px;
    border:1px solid rgba(255,255,255,.20);background:rgba(255,255,255,.08);color:#fff;
    font-size:24px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,.32);
  }
  #top-bar{position:absolute;top:18px;left:78px;right:18px;height:48px;z-index:125;padding:0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;}
  .top-spacer{display:block;}
  .top-label{grid-column:2;background:transparent;border:none;padding:0;color:#fff;font-size:22px;font-weight:800;letter-spacing:.2px;text-transform:none;text-shadow:0 4px 18px rgba(0,0,0,.65);}
  .top-right{grid-column:3;display:flex;justify-content:flex-end;align-items:center;gap:5px;}
  .nav-btn{display:none!important;}

  #lang-sw-fixed{position:static;z-index:1;display:none;gap:5px;background:rgba(8,12,16,.56);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:4px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  #lang-sw-fixed.show{display:flex;}
  .lsf-btn{height:38px;min-width:46px;border-radius:15px;background:transparent;border:none;color:#fff;font-size:16px;font-weight:700;padding:0 8px;letter-spacing:.2px;}
  .lsf-btn.active{background:linear-gradient(180deg,#2388ff,#0d58b8);box-shadow:0 0 0 1px rgba(73,158,255,.60),0 0 18px rgba(43,125,233,.55);}

  #speech-status-row{position:absolute;top:88px;left:18px;right:18px;z-index:106;height:72px;border-radius:22px;padding:10px 14px;background:rgba(12,18,28,.62);border:1px solid rgba(255,255,255,.12);display:flex;gap:0;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 14px 35px rgba(0,0,0,.32);}
  #speech-status-row:after{content:"";position:absolute;left:50%;top:16px;bottom:16px;width:1px;background:rgba(255,255,255,.16);}
  .s-card{flex:1;display:grid;grid-template-columns:44px 1fr;grid-template-rows:1fr 1fr;column-gap:10px;align-items:center;padding:0 8px;opacity:.86;}
  .s-card-icon{grid-row:1/3;width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);font-size:22px;}
  .s-card-main{font-size:17px;line-height:1;font-weight:800;color:#fff;align-self:end;}
  .s-card-sub{font-size:13px;line-height:1.15;font-weight:700;color:rgba(255,255,255,.76);align-self:start;}
  .s-card.active .s-card-icon{background:rgba(43,125,233,.18);box-shadow:0 0 18px rgba(43,125,233,.55);}
  .s-card.pass .s-card-icon{background:rgba(31,169,143,.20);box-shadow:0 0 18px rgba(31,169,143,.40);}
  .s-card.fail .s-card-icon{background:rgba(229,84,78,.22);box-shadow:0 0 18px rgba(229,84,78,.40);}

  #mid{padding:174px 14px 96px;justify-content:flex-start;gap:10px;overflow:hidden;}
  .mic-box{width:142px;height:142px;margin-top:0;}
  .mic-circle{width:118px;height:118px;background:rgba(14,22,32,.70);border-color:rgba(255,255,255,.18);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 14px 35px rgba(0,0,0,.35), inset 0 0 30px rgba(43,125,233,.05);}
  .mic-circle.calibrating{border-color:rgba(232,155,60,.65);background:rgba(214,116,17,.18);}
  .mic-circle.recording{border-color:rgba(229,84,78,.68);background:rgba(186,38,38,.24);box-shadow:0 0 26px rgba(229,84,78,.35),0 14px 35px rgba(0,0,0,.35);}
  .mic-icon{font-size:48px;}
  #freq-canvas{width:142px;height:142px;inset:0;}

  .hint-lbl{font-size:18px;color:#2D8CFF;max-width:100%;font-weight:800;line-height:1.35;text-shadow:0 0 14px rgba(45,140,255,.24);}
  .word-display{font-size:34px;line-height:1.15;font-weight:800;color:#fff;max-width:100%;text-shadow:0 3px 14px rgba(0,0,0,.45);}
  #transcript-box{background:rgba(8,12,16,.50);border:1px solid rgba(255,255,255,.12);color:#FFB84D;border-radius:16px;max-width:340px;padding:10px 14px;font-size:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}

  #metrics-box{width:100%;max-width:none;background:rgba(10,16,25,.52);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:14px;gap:12px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 12px 30px rgba(0,0,0,.28);}
  .metric-row{font-size:14px;text-transform:none;letter-spacing:0;color:#fff;font-weight:800;}
  .metric-val{font-size:17px;color:#fff;}
  .bar-track{height:9px;background:rgba(255,255,255,.16);border:none;border-radius:999px;}

  #result-banner{max-width:none;background:rgba(8,12,16,.52)!important;border:1px solid rgba(255,255,255,.16)!important;border-radius:22px;padding:16px;text-align:center;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 14px 35px rgba(0,0,0,.34);}
  .rb-title{font-size:22px;font-weight:800;}
  .rb-score{font-size:44px;}
  .rb-sub{font-size:15px;color:rgba(255,255,255,.72);}

  #debug-toggle{position:absolute;left:18px;right:18px;bottom:84px;z-index:111;width:auto!important;margin:0!important;background:rgba(8,12,16,.52)!important;border:1px solid rgba(255,255,255,.16)!important;color:rgba(255,255,255,.78)!important;border-radius:18px!important;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
  #debug-box{position:absolute;left:18px;right:18px;bottom:144px;z-index:112;width:auto!important;max-height:210px;overflow:auto;margin:0!important;background:rgba(8,12,16,.86);border:1px solid rgba(255,255,255,.16);border-radius:18px;color:#A8F5C3;box-shadow:0 16px 40px rgba(0,0,0,.45);}

  #action-btn{position:absolute;bottom:12px;left:12px;right:12px;z-index:110;width:auto;margin:0;min-height:64px;border-radius:24px;background:linear-gradient(180deg,#2388ff,#0d58b8);font-size:24px;font-weight:800;border:1px solid rgba(83,170,255,.60);box-shadow:0 0 24px rgba(43,125,233,.38),0 16px 40px rgba(0,0,0,.45);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);}
  #action-btn.green{background:linear-gradient(180deg,#22b99d,#126852);border-color:rgba(48,214,181,.52);}
  #action-btn.red{background:linear-gradient(180deg,#ff5a52,#aa2525);border-color:rgba(255,111,105,.52);}

  #fast-nav-btn{
    display:none;
    position:absolute;bottom:84px;left:12px;right:12px;z-index:140;
    width:auto;margin:0;min-height:58px;border-radius:22px;
    border:1px solid rgba(83,170,255,.60);
    background:linear-gradient(180deg,#2388ff,#0d58b8);
    color:#fff;font-family:'IBM Plex Sans Thai','Manrope',sans-serif;
    font-size:18px;font-weight:800;cursor:pointer;
    box-shadow:0 0 22px rgba(43,125,233,.32),0 10px 28px rgba(0,0,0,.38);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  }
  #fast-nav-btn.show{display:block!important;}
  #fast-nav-btn.green{
    background:linear-gradient(180deg,#22b99d,#126852);
    border-color:rgba(48,214,181,.52);
  }
  #fast-nav-btn:active{transform:scale(.98);}

  #noise-overlay{background:rgba(5,9,16,.78)!important;z-index:300!important;}
  #noise-overlay>div{background:rgba(12,18,28,.92)!important;border:1px solid rgba(255,255,255,.16);box-shadow:0 16px 44px rgba(0,0,0,.46)!important;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
  #noise-title{color:#fff!important;}

  /* RESULT MODE FIX: ผลลัพธ์เลื่อนได้ แต่ปุ่มหลักคงอยู่ด้านล่างเสมอ */
  #test-screen.done{
    overflow:hidden !important;
  }

  #test-screen.done #mid{
    flex:1 1 auto;
    overflow-y:auto !important;
    -webkit-overflow-scrolling:touch;
    padding-bottom:176px !important;
    scroll-padding-bottom:176px;
  }

  #test-screen.done #fast-nav-btn{
    position:absolute !important;
    left:12px !important;
    right:12px !important;
    bottom:84px !important;
    width:auto !important;
    margin:0 !important;
  }

  #test-screen.done #action-btn{
    position:absolute !important;
    left:12px !important;
    right:12px !important;
    bottom:12px !important;
    width:auto !important;
    margin:0 !important;
  }

  #test-screen.done #debug-toggle,
  #test-screen.done #debug-box{
    display:none !important;
  }

  #test-screen.done .rb-score{
    font-size:38px;
  }

  #noise-desc{color:rgba(255,255,255,.70)!important;}
  #noise-go-btn{background:rgba(255,255,255,.08)!important;color:#fff!important;border-color:rgba(255,255,255,.18)!important;}

  @media (max-height:760px){
    #mid{padding-top:158px;gap:8px;}
    .mic-box{width:116px;height:116px;}
    .mic-circle{width:100px;height:100px;}.mic-icon{font-size:40px;}
    #freq-canvas{width:116px;height:116px;}
    .word-display{font-size:28px;}.hint-lbl{font-size:15px;}
    #metrics-box{padding:11px;gap:8px;}
    #action-btn{min-height:56px;font-size:21px;}
    #fast-nav-btn{bottom:76px;min-height:52px;font-size:17px;}
    #test-screen.done #fast-nav-btn{bottom:76px !important;}
    #test-screen.done #mid{padding-bottom:156px !important;scroll-padding-bottom:156px;}
    .top-label{font-size:19px;}
    #speech-status-row{height:64px;top:82px;}
  }

</style>
<script src="config.js"></script>
<script src="fast-permissions.js"></script>  
</head>
<body>

<div id="lang-screen">
  <span class="title-lbl">🗣️ FAST · Speech Test</span>
  <div class="main-title">Select Language</div>
  <div class="lang-btns">
    <button class="lang-btn" onclick="selectLang('th')"><span class="lang-flag">🇹🇭</span><span class="lang-text">ภาษาไทย</span></button>
    <button class="lang-btn" onclick="selectLang('en')"><span class="lang-flag">🇬🇧</span><span class="lang-text">English</span></button>
    <button class="lang-btn" onclick="selectLang('ja')"><span class="lang-flag">🇯🇵</span><span class="lang-text">日本語</span></button>
  </div>
</div>

<div id="test-screen">
  <button aria-label="Home" id="speech-home-btn" onclick="goSpeechHome()" type="button">⌂</button>
  <div id="top-bar">
    <span aria-hidden="true" class="top-spacer"></span>
    <span class="top-label" id="top-lbl">FAST · Speech Screening</span>
    <div class="top-right">
      <div id="lang-sw-fixed">
        <button class="lsf-btn" id="lsf-th" onclick="speechSwitchLang('th')">TH</button>
        <button class="lsf-btn" id="lsf-en" onclick="speechSwitchLang('en')">EN</button>
        <button class="lsf-btn" id="lsf-ja" onclick="speechSwitchLang('ja')">JA</button>
      </div>
    </div>
  </div>
  <div id="speech-status-row" aria-label="Speech test status">
    <div class="s-card active" id="speech-card-word"><span class="s-card-icon" id="speech-ico-word">🗣️</span><span class="s-card-main" id="speech-main-word">Accuracy</span><span class="s-card-sub" id="speech-sub-word">Ready</span></div>
    <div class="s-card" id="speech-card-rate"><span class="s-card-icon" id="speech-ico-rate">⏱️</span><span class="s-card-main" id="speech-main-rate">Rate</span><span class="s-card-sub" id="speech-sub-rate">Pending</span></div>
  </div>
  <div id="mid">
    <div class="mic-box">
      <canvas id="freq-canvas" width="120" height="120"></canvas>
      <div class="mic-circle" id="mic-circle"><span class="mic-icon" id="mic-icon">🎤</span></div>
    </div>
    <p class="hint-lbl" id="hint-text"></p>
    <h1 class="word-display" id="word-target"></h1>
    <div id="transcript-box"></div>
    <div id="metrics-box">
      <div>
        <div class="metric-row"><span id="lbl-word-accuracy">Word Accuracy</span><span class="metric-val" id="val-word">—</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar-word"></div></div>
        <div style="text-align:right;font-family:monospace;font-size:11px;color:var(--muted);margin-top:2px" id="score-word"></div>
      </div>
      <div>
        <div class="metric-row"><span id="lbl-speech-rate">Speech Rate</span><span class="metric-val" id="val-rate">—</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar-rate"></div></div>
        <div style="text-align:right;font-family:monospace;font-size:11px;color:var(--muted);margin-top:2px" id="score-rate"></div>
      </div>
      <div>
        <div class="metric-row"><span id="lbl-volume-stability">Volume Stability</span><span class="metric-val" id="val-stab">—</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar-stab"></div></div>
        <div style="text-align:right;font-family:monospace;font-size:11px;color:var(--muted);margin-top:2px" id="score-stab"></div>
      </div>
    </div>
    <div id="result-banner">
      <div class="rb-title" id="rb-title"></div>
      <div class="rb-score" id="rb-score"></div>
      <div class="rb-sub"  id="rb-sub"></div>

const DEAD_MIC_MAX_ATTEMPT = 4;

async function recoverDeadMic() {
  deadMicAttempt++;
  DBG('☠️ DEAD MIC', `stream เงียบสนิท — กู้คืนครั้งที่ ${deadMicAttempt}/${DEAD_MIC_MAX_ATTEMPT}`);
  phase = 'IDLE'; // หยุด runLoop รอบนี้

  if (deadMicAttempt > DEAD_MIC_MAX_ATTEMPT) {
    deadMicAttempt = 0;
    await stopAll();
    $('transcript-box').style.display = 'block';
    $('transcript-box').textContent = '⚠️ ไมค์ไม่ตอบสนอง กรุณารอสักครู่แล้วกดเริ่มใหม่';

    $('action-btn').textContent = T.btnStart;

  $('transcript-box').textContent = `🔄 ไมค์ยังไม่พร้อม กำลังเชื่อมต่อใหม่ (${deadMicAttempt}/${DEAD_MIC_MAX_ATTEMPT})...`;

  await stopAll();
  // รอนานขึ้นทีละรอบ: 1.0s → 1.5s → 2.0s → 2.5s ให้ iOS reconfigure audio session
  await sleep(500 + deadMicAttempt * 500);
  DBG('🔧 RECOVERY', `เริ่มรอบใหม่หลังรอ ${500 + deadMicAttempt * 500}ms`);
  startRecording(true);
}

function DBG(tag, ...args) {
  const t = ((performance.now() - DBG_T0) / 1000).toFixed(2);

  // แสดงบนหน้าจอมือถือด้วย
  DBG_LINES.push(line);
  if (DBG_LINES.length > 120) DBG_LINES.shift();
  const p = DBG_PANEL();
  p.textContent = `═ ${DEBUG_BUILD} ═\n` + DBG_LINES.join('\n');
  p.scrollTop = p.scrollHeight;
}

/*
  SpeechRecognition.abort() และ AudioContext.close() ปล่อย resource แบบ asynchronous
  รอบ Retry จึงต้องรอให้บริการเดิม disconnect/close จริงก่อนเริ่มรอบใหม่
*/
function shutdownRecognition() {
  recognitionRunId++; // event/timer จากรอบเก่าจะถูก ignore ทันที
  clearRecognitionTimers();

  const oldRecognition = recognition;
  const wasStarted = recognitionStarted;

  recognition = null;
  recognitionStarted = false;

  if (!oldRecognition) return Promise.resolve();

  return new Promise(resolve => {
    let settled = false;

    const finish = () => {
      if (settled) return;
      settled = true;
      resolve();
    };

    // ปิด handler เดิมเพื่อไม่ให้ onend ของรอบเก่า restart ตัวเอง
    oldRecognition.onresult = null;
    oldRecognition.onerror = finish;
    oldRecognition.onend = finish;

    try {
      if (wasStarted) oldRecognition.abort();
      else finish();
    } catch (error) {
      finish();
    }

    // บาง browser ไม่ยิง end หลัง abort จึงมี timeout กันค้าง
    setTimeout(finish, 1200);
  });
}

// คงชื่อเดิมไว้สำหรับจุดเรียกเก่า แต่คืน Promise เพื่อให้ await ได้
function resetRecognitionEngine() {
  return shutdownRecognition();
}

  }
  updateSpeechLabels();
  ['word','rate','stab'].forEach(k => {
    $('bar-'+k).style.width      = '0%';
    $('bar-'+k).style.background = 'var(--blue)';
    $('val-'+k).textContent      = '—';
  });
  $('freq-canvas').getContext('2d').clearRect(0,0,120,120);
  
  resetMeasurementState();
  if ($('noise-overlay')) $('noise-overlay').style.display = 'none';
  // การปิด SpeechRecognition/AudioContext ทำใน stopAll() และรอแบบ async
  resetSpeechCards();
}

async function handleAction() {
  if (retryStarting) return;

  if (phase === 'IDLE') {
    await startRecording(false);
  }
  else if (phase === 'RECORDING') {
    // ผู้ใช้กดปุ่มหยุดบันทึกด้วยตัวเองแมนนวล
    speechEndMs = getLastSpeechSegmentEnd();
    evaluateSpeech('__manual__', 0);
  }
  else if (phase === 'DONE') {
    // รอบทดสอบซ้ำต้องขอ MediaStream ใหม่โดยตรง
    // ไม่ผ่าน FastPermissions เพราะ helper บาง browser คืน stream เก่าที่ถูก stop แล้ว
    retryStarting = true;

    const actionBtn = $('action-btn');
    actionBtn.disabled = true;
    actionBtn.textContent = T.calibrating;

    try {
      phase = 'IDLE';
      resetUI();
      actionBtn.disabled = true;
      actionBtn.textContent = T.calibrating;

      await startRecording(true);
    } finally {
      retryStarting = false;
      actionBtn.disabled = false;
    }
  }
}

function setBar(key, pct, label) {
  const p = Math.min(Math.max(pct, 0), 100);
  $('bar-'+key).style.width      = p + '%';
  $('bar-'+key).style.background = p >= 65 ? 'var(--green)' : p >= 35 ? 'var(--amber)' : 'var(--red)';
  $('val-'+key).textContent      = label;
  const scoreEl = $('score-'+key);
  if (scoreEl) scoreEl.textContent = pct > 0 ? `score: ${Math.round(p)}` : '';
  if (key === 'word') setSpeechCard('word', p >= 65 ? 'pass' : p >= 35 ? 'active' : 'fail', (T||CONFIG.th).accuracy, Math.round(p) + '%', p >= 65 ? '✅' : p >= 35 ? '⚠️' : '❌');
  if (key === 'rate') setSpeechCard('rate', p >= 65 ? 'pass' : p >= 35 ? 'active' : 'fail', (T||CONFIG.th).rate, Math.round(p) + '%', p >= 65 ? '✅' : p >= 35 ? '⚠️' : '❌');
}


// ═══════════════════════════════════════════════════
// CORE AUDIO AUDIO CAPTURE
// ═══════════════════════════════════════════════════
function hasLiveAudioTrack(stream) {
  return !!stream && stream.getAudioTracks().some(track => track.readyState === 'live');
}

async function waitForMicTrackReady(stream, timeoutMs = 1500) {
  const track = stream?.getAudioTracks?.()[0];
  if (!track || track.readyState !== 'live') return false;
  if (!track.muted) return true;

  await Promise.race([
    new Promise(resolve => track.addEventListener('unmute', resolve, { once:true })),
    sleep(timeoutMs)
  ]);

  // FIX: รายงานผลจริง ถ้ายัง muted ค้าง ให้ caller ขอ stream ใหม่แทนการปล่อยผ่าน
  return track.readyState === 'live' && !track.muted;
}

async function acquireFreshMicStream(permLang) {
  let permissionResult = null;

  // ใช้ permission helper เดิมก่อน เพื่อรักษา UX/ข้อความแจ้งเตือนของแอป
  if (window.FastPermissions && typeof FastPermissions.request === 'function') {
    try {
      permissionResult = await FastPermissions.request('mic', permLang);
    } catch (error) {
      permissionResult = null;
    }
  }

  if (permissionResult?.ok && hasLiveAudioTrack(permissionResult.stream)) {
    return permissionResult.stream;
  }

  // บาง implementation cache MediaStream เดิมไว้ แม้ track ถูก stop ไปแล้ว
  // จึงขอสตรีมใหม่จาก browser โดยตรงสำหรับรอบทดสอบซ้ำ
  if (navigator.mediaDevices?.getUserMedia) {
    return await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: false,
        autoGainControl: false
      }
    });
  }

  const err = new Error('Microphone API is not available');
  err.permissionResult = permissionResult;
  throw err;
}

async function startRecording(forceDirectMic = false) {
  DBG_T0 = performance.now();
  DBG('START', `forceDirectMic=${forceDirectMic} phase=${phase}`);
  // รอให้ ASR, MediaStream และ AudioContext รอบก่อนปล่อย resource จริงก่อน
  await stopAll();
  DBG('CLEANUP DONE', 'resource รอบก่อนถูกปล่อยแล้ว');
  resetMeasurementState();

  if ($('test-screen')) $('test-screen').classList.remove('done');

  const existingNav = document.getElementById('fast-nav-btn');
  if (existingNav) {
    existingNav.className = '';
    existingNav.style.display = 'none';
    existingNav.setAttribute('aria-hidden', 'true');
    existingNav.onclick = null;
  }

  phase = 'CALIBRATING';
  $('mic-circle').className         = 'mic-circle calibrating';
  $('mic-icon').textContent         = '🔇';
  $('action-btn').textContent       = T.calibrating;
  $('action-btn').className         = '';
  $('transcript-box').style.display = 'block';
  $('transcript-box').textContent   = T.noiseCalib;
  $('metrics-box').style.display    = 'flex';
  $('debug-toggle').style.display   = 'block';
  $('debug-box').textContent        = 'calibrating noise floor...';
  setSpeechCard('word','active',T.noiseMetric,T.calibrating.replace(/\.\.\.|…/g,'').trim() || T.pending,'🔇');
  setSpeechCard('rate','',T.rate,T.pending,'⏱️');

  try {
    const permLang = sessionStorage.getItem('fast_lang') || 'th';

    /*
      สร้างและสั่ง resume AudioContext ก่อน await getUserMedia
      เพื่อให้คำสั่งยังอยู่ใน user gesture ของปุ่ม โดยเฉพาะรอบทดสอบซ้ำ
      บน Chrome/Edge/iOS บางรุ่น การสร้าง AudioContext หลัง await อาจค้างที่ suspended
    */
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) throw new Error('Web Audio API is not available');

    audioCtx = new AudioContextClass();
    DBG('AUDIOCTX created', `state=${audioCtx.state}`);
    if (audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch (error) {}
      DBG('AUDIOCTX after resume', `state=${audioCtx.state}`);
    }

    if (forceDirectMic) {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('Microphone API is not available');
      }

      // รอบ Retry ขอ stream ใหม่จาก browser โดยตรง ไม่ใช้ stream cache ของ helper
      streamRef = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: false,
          autoGainControl: false
        }
      });
    } else {
      streamRef = await acquireFreshMicStream(permLang);
    }

    if (!hasLiveAudioTrack(streamRef)) {
      throw new Error('Microphone stream is not active');
    }
    DBG_TRACK('STREAM acquired', streamRef);

    // บางเครื่องคืน stream ก่อน hardware mic พร้อมจริง รอ unmute สั้น ๆ
    // FIX: ถ้า track ยัง muted ค้าง (พบบ่อยตอนทดสอบซ้ำทันทีบน Chrome/Android)
    // ให้ทิ้ง stream เงียบนั้น แล้วขอ stream ใหม่จาก browser โดยตรง สูงสุด 2 ครั้ง
    let micReady = await waitForMicTrackReady(streamRef);
    DBG('MIC READY?', micReady);
    for (let retry = 0; !micReady && retry < 2; retry++) {
      DBG('MIC RETRY', `รอบที่ ${retry + 1} — track ยัง muted ค้าง ขอ stream ใหม่`);
      try {
        streamRef.getTracks().forEach(track => { try { track.stop(); } catch (e) {} });
      } catch (e) {}
      streamRef = null;

      await sleep(600); // เว้นจังหวะให้ OS ปล่อย mic ก่อนขอใหม่

      streamRef = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: false,
          autoGainControl: false
        }
      });
      DBG_TRACK(`STREAM retry ${retry + 1}`, streamRef);

      if (!hasLiveAudioTrack(streamRef)) continue;
      micReady = await waitForMicTrackReady(streamRef, 2000);
      DBG('MIC READY?', micReady);
    }

    if (!streamRef || !hasLiveAudioTrack(streamRef)) {
      throw new Error('Microphone stream is not active');
    }

    // resume ซ้ำหลังได้ stream เผื่อ browser suspend ระหว่าง permission request
    if (audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch (error) {}
    }

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.2;

    source = audioCtx.createMediaStreamSource(streamRef);
    source.connect(analyser);
    DBG('PIPELINE READY', `audioCtx=${audioCtx.state} → เริ่ม calibration`);

    // เริ่มนับเวลาเฝ้าดู stream เงียบ (iOS dead-mic detection)
    pipelineReadyMs = performance.now();
    sawRealSignal   = false;

    calibStartMs = performance.now();
    runLoop();
  } catch (err) {
    DBG('❌ START ERROR', err.name, err.message);
    stopAll();
    phase = 'IDLE';

    $('transcript-box').style.display = 'block';
    $('transcript-box').textContent = '⚠️ ไม่สามารถเข้าถึงไมค์: ' + err.message;
    $('action-btn').disabled = false;
    $('action-btn').textContent = T.btnStart;
    $('action-btn').className = '';

    // แสดง permission UI เฉพาะการเริ่มครั้งแรก ไม่เรียกซ้ำใน Retry
    // เพราะ Retry ต้องไม่ย้อนกลับไปใช้ MediaStream cache เดิม
    if (!forceDirectMic) {
      const permLang = sessionStorage.getItem('fast_lang') || 'th';
      if (window.FastPermissions && typeof FastPermissions.requestWithUI === 'function') {
        try {
          FastPermissions.requestWithUI('mic', permLang, (stream) => {
            if (hasLiveAudioTrack(stream)) {
              stream.getTracks().forEach(track => track.stop());
              startRecording(false);
            }
          });
        } catch (uiError) {}
      }
    }

    return;
  }

  // Speech Recognition จะเริ่มหลังจบ calibration เท่านั้น
}

async function beginSpeechRecognition() {
  // รอให้ recognition เก่าหยุดและ disconnect จริงก่อนสร้าง session ใหม่
  await resetRecognitionEngine();
  if (phase !== 'RECORDING') return;

  const runId = ++recognitionRunId;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recognition = new SR();
    recognition.lang            = T.langCode;
    recognition.continuous      = true;   // ให้รอระหว่างคนไข้เว้นคำ ไม่ชิงจบเร็ว
    recognition.interimResults  = true;
    recognition.maxAlternatives = 5;
    DBG('ASR created', `lang=${T.langCode}`);

    // ═══ DEBUG: event ที่บอกว่า ASR "ได้ยิน" อะไรบ้าง ═══
    recognition.onstart      = () => DBG('ASR onstart', 'engine เริ่มทำงานแล้ว');
    recognition.onaudiostart = () => DBG('ASR onaudiostart', '🎤 engine เริ่มรับ audio แล้ว');
    recognition.onaudioend   = () => DBG('ASR onaudioend', 'engine หยุดรับ audio');
    recognition.onsoundstart = () => DBG('ASR onsoundstart', '🔉 ตรวจพบเสียง');
    recognition.onspeechstart= () => DBG('ASR onspeechstart', '🗣️ ตรวจพบเสียงพูด');
    recognition.onspeechend  = () => DBG('ASR onspeechend');

    let gotResult = false;
    let bestTranscript = '';
    let bestConfidence = 0;

    const isCurrentRun = () => runId === recognitionRunId && phase === 'RECORDING';

    const finishWith = (text, conf) => {
      if (!isCurrentRun()) return;
      clearRecognitionTimers();
      if (phase !== 'DONE') {
        speechEndMs = getLastSpeechSegmentEnd();
        evaluateSpeech(text, conf);
      }
    };

    recognition.onresult = (e) => {
      DBG('ASR onresult', `results=${e.results.length}`);
      if (!isCurrentRun()) return;
      gotResult = true;
      speechEndMs = getLastSpeechSegmentEnd();

      let bestLocalText = '';
      let bestLocalConf = 0;
      for (let i = 0; i < e.results.length; i++) {
        const res = e.results[i];
        for (let j = 0; j < res.length; j++) {
          const alt = res[j];
          const tx = (alt.transcript || '').trim();
          const cf = Number.isFinite(alt.confidence) && alt.confidence > 0 ? alt.confidence : 0.75;
          if (tx && (cf > bestLocalConf || !bestLocalText)) {
            bestLocalText = tx;
            bestLocalConf = cf;
          }
        }
      }

      if (bestLocalText) {
        bestTranscript = bestLocalText;
        bestConfidence = Math.max(bestConfidence, bestLocalConf);
        $('transcript-box').textContent = `"${bestTranscript}"`;
      }

      // final result จะจบทันที, interim ให้รออีกนิด
      let hasFinal = false;
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) hasFinal = true;
      }
      if (recognitionFinalTimer) clearTimeout(recognitionFinalTimer);
      recognitionFinalTimer = setTimeout(() => {
        if (isCurrentRun() && bestTranscript) finishWith(bestTranscript, bestConfidence || 0.75);
      }, hasFinal ? 450 : 1400);
    };

    recognition.onerror = (e) => {
      DBG('ASR ❌ onerror', `error="${e.error}" gotResult=${gotResult} isCurrentRun=${isCurrentRun()}`);
      if (!isCurrentRun()) return;

      // no-speech / network / audio-capture: อย่าตัดสินทันที ถ้ายังไม่มีเสียงจาก VAD
      // ให้ VAD มีเวลาตรวจเสียงก่อน แล้วค่อย fallback เป็น voice-but-no-text/no voice
      if (!gotResult) {
        if (recognitionSafetyTimer) clearTimeout(recognitionSafetyTimer);
        recognitionSafetyTimer = setTimeout(() => {
          if (isCurrentRun() && !bestTranscript) finishWith('', 0);
        }, 6000);
      }
    };

    recognition.onend = () => {
      DBG('ASR onend', `bestTranscript="${bestTranscript}" isCurrentRun=${isCurrentRun()}`);
      if (!isCurrentRun()) return;

      // Chrome/iOS ชอบ onend เอง: ถ้ายังไม่จับคำแต่ยังอยู่ RECORDING ให้ restart
      if (!bestTranscript) {
        DBG('ASR restart', 'ยังไม่มี transcript → start ใหม่');
        startRecognitionSafely(0);
        return;
      }
      finishWith(bestTranscript, bestConfidence || 0.75);
    };

    function startRecognitionSafely(attempt) {
      if (!isCurrentRun() || !recognition) return;
      try {
        recognition.start();
        recognitionStarted = true;
        DBG('ASR start() OK', `attempt=${attempt}`);
        return;
      } catch(e) {
        DBG('ASR ❌ start() FAILED', `attempt=${attempt} ${e.name}: ${e.message}`);
        // รอบสองมักเจอ InvalidStateError เพราะ engine รอบก่อนยังปิดไม่สนิท
        // จึงต้อง retry สั้น ๆ แทนที่จะ catch เงียบแล้วปล่อยให้ ASR ไม่ทำงาน
        recognitionStarted = false;
        if (attempt < 4) {
          setTimeout(() => startRecognitionSafely(attempt + 1), 250);
        } else {
          if (isCurrentRun()) {
            $('transcript-box').textContent = T.listening + ' (ASR retry failed; using voice detection)';
          }
        }
      }
    }

    startRecognitionSafely(0);

    // กันกรณี engine ไม่คืน event เลย: ให้จบหลัง 8 วิ แต่ใช้ VAD duration ได้
    recognitionSafetyTimer = setTimeout(() => {
      if (isCurrentRun()) finishWith(bestTranscript || '', bestConfidence || 0);
    }, 8000);
  } else {
    recognitionSafetyTimer = setTimeout(() => {
      if (phase !== 'DONE') {
        speechEndMs = getLastSpeechSegmentEnd();
        evaluateSpeech('__no_api__', 1.0);
      }
    }, 8000);
  }
}

async function releaseCurrentAudioResources() {
  const hadResources = !!(
    recognition || recognitionStarted || source || streamRef || audioCtx || analyser || animationFrameId
  );
  DBG('CLEANUP begin', `hadResources=${hadResources} audioCtx=${audioCtx?.state || 'null'}`);

  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }

  // เริ่มปิด ASR ก่อน และรอ end ซึ่งหมายถึงบริการ disconnect แล้ว
  const recognitionClose = shutdownRecognition();

  const oldSource = source;
  source = null;
  if (oldSource) {
    try { oldSource.disconnect(); } catch (error) {}
  }

  const oldStream = streamRef;
  streamRef = null;
  if (oldStream) {
    oldStream.getTracks().forEach(track => {
      try { track.stop(); } catch (error) {}
    });
  }

  const oldAudioCtx = audioCtx;
  audioCtx = null;
  analyser = null;

  let audioClose = Promise.resolve();
  if (oldAudioCtx && oldAudioCtx.state !== 'closed') {
    try {
      // close() คืน Promise ที่ resolve เมื่อ resource ที่ขวาง AudioContext ใหม่ถูกปล่อยแล้ว
      audioClose = Promise.race([
        oldAudioCtx.close(),
        sleep(2500)   // FIX: เพิ่มจาก 1500 → 2500ms บางเครื่องปิดช้า
      ]);
    } catch (error) {}
  }

  await Promise.allSettled([recognitionClose, audioClose]);

  // FIX: เพิ่มจาก 350 → 1000ms ให้ OS สลับ audio session เสร็จจริงก่อนรอบใหม่
  // (อาการเดิม: รอบสองขอ mic ทันทีแล้วได้ stream เงียบ ต้องรอ ~1 นาที)
  if (hadResources) await sleep(1000);
}

function stopAll() {
  cleanupPromise = cleanupPromise
    .catch(() => {})
    .then(() => releaseCurrentAudioResources());

  return cleanupPromise;
}

// ═══════════════════════════════════════════════════
// REAL-TIME ENGINE LOOP
// ═══════════════════════════════════════════════════
function runLoop() {
  if ((phase !== 'CALIBRATING' && phase !== 'RECORDING') || !analyser) return;

  const N       = analyser.frequencyBinCount;
  const freqArr = new Uint8Array(N);
  analyser.getByteFrequencyData(freqArr);

  const sr     = audioCtx.sampleRate;
  const binHz  = sr / analyser.fftSize;
  const loIdx  = Math.round(300  / binHz);
  const hiIdx  = Math.round(2000 / binHz);

  // สกัดพลังงานย่านความถี่เสียงพูดมนุษย์ (300–2000Hz)
  let eSum = 0;
  for (let i = loIdx; i <= hiIdx; i++) eSum += freqArr[i];
  const vEnergy = eSum / ((hiIdx - loIdx + 1) * 255);

  // ── Spectral Flatness: แยกเสียงพูดจากเสียงรบกวน ──
  // เสียงพูด = มี formant peak ชัด → flatness ต่ำ (~0.1-0.4)
  // เสียงพัดลม/ทีวี/แอร์ = กระจายแบนราบ → flatness สูง (~0.5-1.0)
  // flatness = geometric mean / arithmetic mean ของ power ในย่าน vowel
  let logSum = 0, arithSum = 0, nBins = 0;
  for (let i = loIdx; i <= hiIdx; i++) {
    const p = freqArr[i] + 1; // +1 กัน log(0)
    logSum   += Math.log(p);
    arithSum += p;
    nBins++;
  }
  const geoMean   = Math.exp(logSum / nBins);
  const arithMean = arithSum / nBins;
  const flatness  = arithMean > 0 ? geoMean / arithMean : 1;

  const nowMs = performance.now();

  // ═══ iOS DEAD-MIC DETECTION ═══
  if (vEnergy > DEAD_MIC_ENERGY_MIN) {
    if (!sawRealSignal) {
      sawRealSignal = true;
      deadMicAttempt = 0; // ไมค์ฟื้นแล้ว reset ตัวนับกู้คืน
      DBG('✅ MIC ALIVE', `สัญญาณมาแล้วที่ ${((nowMs - pipelineReadyMs)/1000).toFixed(2)}s หลัง pipeline พร้อม`);
    }
  } else if (!sawRealSignal && pipelineReadyMs && (nowMs - pipelineReadyMs) > DEAD_MIC_SILENCE_MS) {
    // เงียบสนิท (ศูนย์ล้วน) เกิน 2 วิหลัง pipeline พร้อม = iOS คืน stream ตาย
    recoverDeadMic();
    return; // หยุด loop รอบนี้ ให้ recovery จัดการต่อ
  }

  // ═══ DEBUG: log พลังงานไมค์ทุก ~1 วินาที เพื่อดูว่าไมค์มีสัญญาณจริง ═══
  window.__dbgFrameCount = (window.__dbgFrameCount || 0) + 1;
  if (window.__dbgFrameCount % 60 === 0) {
    DBG('VAD', `phase=${phase} vEnergy=${vEnergy.toFixed(5)} ${vEnergy < 0.0005 ? '⚠️ เงียบสนิท (ไมค์อาจตาย)' : '✓ มีสัญญาณ'}`);
  }

  // ── PHASE 1: Noise Calibration ─────────────────────
  if (phase === 'CALIBRATING') {
    // iOS: ระหว่างไมค์ยังเงียบสนิท (ยังไม่ฟื้น) อย่าเพิ่งนับ calibration
    // ไม่งั้น noiseFloor จะถูกวัดจากความเงียบปลอม = 0 → dynThreshold เพี้ยนทั้งรอบ
    if (!sawRealSignal) {
      noiseFrames.length = 0;
      calibStartMs = nowMs;
    }
    noiseFrames.push(vEnergy);
    const elapsed = nowMs - calibStartMs;

    $('debug-box').innerHTML = `calibrating noise... ${Math.round(elapsed)}ms<br>vEnergy: ${vEnergy.toFixed(5)}`;

    if (elapsed >= CALIBRATION_MS) {
      const avg = noiseFrames.reduce((a,b)=>a+b,0) / noiseFrames.length;
      const std = Math.sqrt(noiseFrames.reduce((a,b)=>a+(b-avg)**2,0) / noiseFrames.length);
      
      noiseFloor   = Math.min(avg + std, NOISE_FLOOR_CAP);
      dynThreshold = noiseFloor * NOISE_MULTIPLIER;

      // ไม่เตือนเสียงรบกวนก่อนพูด เพราะยังไม่มี signal ของเสียงพูดจริงให้เทียบ SNR
      phase = 'RECORDING';
      $('mic-circle').className       = 'mic-circle recording';
      $('mic-icon').textContent       = '👄';
      $('action-btn').textContent     = T.btnStop || '⏹ หยุด';
      $('action-btn').className       = 'red';
      $('transcript-box').textContent = T.listening || '... กำลังฟัง ...';
      // ติดธงว่าวัดในที่มี noise (สำหรับติดป้ายผลลัพธ์)
      window.MEASURED_NOISY = false;
      void beginSpeechRecognition();
    }

    drawWave(freqArr, N);
    animationFrameId = requestAnimationFrame(runLoop);
    return;
  }

  // ── PHASE 2: Recording & Stream Tracking ───────────
  // isVoice ใช้ energy เป็นหลัก (จับเสียงพูดให้ได้แน่นอน)
  // flatness ใช้แยกว่า frame นี้เป็น "เสียงพูดจริง" (tonal) หรือ "noise" (flat)
  // FLATNESS_MAX = 0.88: จากการวัดจริง เสียงพูด flatness 0.48-0.85, noise 0.9-1.0
  const isLoud  = vEnergy > dynThreshold;
  const isToner = flatness < FLATNESS_MAX;
  const isVoice = isLoud; // เริ่ม/จับเสียงด้วย energy

  // diagnostic: เก็บช่วง flatness ตอนเสียงดัง (เพื่อดูว่าเสียงพูด flatness เท่าไหร่)
  if (isLoud) {
    loudCount++;
    if (flatness < flatMin) flatMin = flatness;
    if (flatness > flatMax) flatMax = flatness;
    if (isToner) tonerCount++;
  }

  if (isVoice) {
    if (!speechStartMs) speechStartMs = nowMs;
    lastVoiceMs = nowMs;
    vowelEnergyBuf.push(vEnergy);
    if (vowelEnergyBuf.length > 500) vowelEnergyBuf.shift();

    // voiceHistory เก็บเฉพาะ frame ที่เป็นเสียงพูดจริง (tonal)
    // → getLastSpeechSegmentEnd จะหาจุดจบจากเสียงพูดจริง ไม่ใช่ noise
    if (isToner) {
      voiceHistory.push({ time: nowMs, energy: vEnergy });
    }
  }

  // ล้างข้อมูลประวัติเสียงที่เก่ากว่า 5 วินาทีทิ้งไป เพื่อป้องกันเมมโมรี่บวม
  while (voiceHistory.length && (nowMs - voiceHistory[0].time > 5000)) {
    voiceHistory.shift();
  }

  // แสดงพรีวิวสดแบบ Real-time บนบาร์กราฟหน้าจอ
  const previewEnd = lastVoiceMs ? lastVoiceMs : nowMs;
  const durSec = speechStartMs ? (previewEnd - speechStartMs) / 1000 : 0;
  if (durSec > 0.3) {
    const rate = T.syllables / durSec;
    setBar('rate', rateToScore(rate), `${rate.toFixed(1)} ${rateUnitLabel()}`);
  }
  if (vowelEnergyBuf.length > 10) {
    const s = calcStab(vowelEnergyBuf);
    setBar('stab', s, `${s}%`);
  }

  // แสดงผลค่าดิบในช่องดีบั๊กพจนานุกรม
  const ratio = noiseFloor > 0 ? (vEnergy / noiseFloor) : 0;
  const liveSpeechEnergy = calcSpeechEnergy(vowelEnergyBuf);
  const liveSnrDb = calcSnrDb(liveSpeechEnergy, noiseFloor);
  $('debug-box').innerHTML =
    `noiseFloor:&nbsp;&nbsp; ${noiseFloor.toFixed(5)}<br>` +
    `speechEnergy: ${liveSpeechEnergy.toFixed(5)}<br>` +
    `SNR:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${liveSnrDb !== null ? liveSnrDb.toFixed(1) + ' dB' : '—'}<br>` +
    `dynThreshold: ${dynThreshold.toFixed(5)}<br>` +
    `vEnergy:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${vEnergy.toFixed(5)}<br>` +
    `flatness:&nbsp;&nbsp;&nbsp; ${flatness.toFixed(3)} ${isToner ? '(tone✓)' : '(noise✗)'}<br>` +
    `→ state:&nbsp;&nbsp;&nbsp; ${isVoice ? '🔊 VOICE' : (isLoud ? '🔇 noise' : '🔇 silent')}<br>` +
    `dur (live):&nbsp;&nbsp; ${durSec.toFixed(2)}s<br>` +
    `energyFrames: ${vowelEnergyBuf.length} | hist: ${voiceHistory.length}`;

  drawWave(freqArr, N);
  animationFrameId = requestAnimationFrame(runLoop);
}

// ═══════════════════════════════════════════════════
// ALGORITHM: TRAILING SILENCE DETECTION
// ═══════════════════════════════════════════════════
function getLastSpeechSegmentEnd() {
  if (voiceHistory.length === 0) return lastVoiceMs || performance.now();

  // GAP_MS = 800ms เผื่อผู้ป่วยเว้นวรรคระหว่างคำ
  const GAP_MS = 800;

  // วิ่งจากท้าย→หน้า: หา gap แรกที่เจอแล้ว return ทันที
  // แก้ overwrite bug — ambient noise ช่วงท้ายจะไม่ทับค่าที่ถูกต้อง
  // ตัวอย่าง: [พูด][พูด][เงียบ800ms][เคาะโต๊ะ]
  //   → วิ่งจากท้าย เจอ gap ที่ [เงียบ800ms] → return timestamp [พูด] ทันที
  //   → [เคาะโต๊ะ] ถูกตัดทิ้งโดยอัตโนมัติ
  for (let i = voiceHistory.length - 1; i > 0; i--) {
    const gap = voiceHistory[i].time - voiceHistory[i - 1].time;
    if (gap > GAP_MS) {
      return voiceHistory[i - 1].time;
    }
  }

  // ไม่พบ gap เลย = พูดต่อเนื่องตลอด → end คือ frame สุดท้าย
  return voiceHistory[voiceHistory.length - 1].time;
}

// ═══════════════════════════════════════════════════
// MATH CALCULATIONS
// ═══════════════════════════════════════════════════
function rateToScore(rate) {
  if (rate <= 0) return 0;
  if (rate >= NORMAL_MIN && rate <= NORMAL_MAX) return 100;
  if (rate < NORMAL_MIN) return Math.round((rate / NORMAL_MIN) * 100);
  return Math.round(Math.max(60, 100 - (rate - NORMAL_MAX) * 10));
}

function calcStab(buf) {
  if (buf.length < 10) return 50;
  const avg = buf.reduce((a,b)=>a+b,0) / buf.length;
  if (avg === 0) return 0;
  const std = Math.sqrt(buf.reduce((a,b)=>a+(b-avg)**2,0) / buf.length);
  const cv  = std / avg;
  return Math.round(Math.max(0, Math.min(1, 1 - (cv - 0.3) / 1.2)) * 100);
}

function calcSpeechEnergy(buf) {
  // ใช้ค่าเฉลี่ยของ top 20% เพื่อลดผลจากช่วงเบา/เว้นคำ แต่ไม่ใช้ peak เดี่ยวที่อาจเป็น noise spike
  if (!buf || buf.length === 0) return 0;
  const sorted = [...buf].sort((a,b)=>b-a);
  const n = Math.max(1, Math.ceil(sorted.length * 0.20));
  return sorted.slice(0, n).reduce((a,b)=>a+b,0) / n;
}

function calcSnrDb(speechEnergy, noiseEnergy) {
  const eps = 0.0001;
  if (!speechEnergy || !noiseEnergy) return null;
  return 20 * Math.log10(Math.max(speechEnergy, eps) / Math.max(noiseEnergy, eps));
}

function drawWave(freqArr, N) {
  const ctx = $('freq-canvas').getContext('2d');
  ctx.clearRect(0, 0, 120, 120);
  ctx.strokeStyle = phase === 'CALIBRATING' ? 'rgba(245,158,11,0.5)' : 'rgba(59,130,246,0.6)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let i = 0; i < N; i += 3) {
    const angle  = (i / N) * Math.PI * 2;
    const offset = (freqArr[i] / 255) * 14;
    const x = 60 + (50 + offset) * Math.cos(angle);
    const y = 60 + (50 + offset) * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
}

// ═══════════════════════════════════════════════════
// METRICS EVALUATION
// ═══════════════════════════════════════════════════
function evaluateSpeech(text, confidence) {
  stopAll();
  phase = 'DONE';
  if ($('test-screen')) $('test-screen').classList.add('done');
  $('mic-circle').className   = 'mic-circle';
  $('mic-icon').textContent   = '📊';
  $('action-btn').textContent = T.btnRetry;
  $('action-btn').className   = 'green';

  const normalizeSpeechText = (v) => String(v || '')
    .toLowerCase()
    .replace(/[’']/g, '')
    .replace(/[.,!?。、「」"\s]/g, '')
    .replace(/良い/g, 'いい')
    .replace(/よい/g, 'いい')
    .replace(/綺麗/g, 'きれい')
    .replace(/きょう/g, '今日');

  const cleanText = normalizeSpeechText(text);
  const wordMatched = cleanText ? T.keywords.some(k => {
    const kk = normalizeSpeechText(k);
    return cleanText.includes(kk) || kk.includes(cleanText);
  }) : false;

  // VAD กับ ASR ต้องแยกกัน: ASR ไม่มี transcript ไม่ได้แปลว่าไม่มีเสียงพูด
  const hasVoice =
    vowelEnergyBuf.length >= 10 ||
    voiceHistory.length >= 3 ||
    (speechStartMs && lastVoiceMs && lastVoiceMs > speechStartMs);
  if (hasVoice && (!speechEndMs || speechEndMs < speechStartMs)) {
    speechEndMs = getLastSpeechSegmentEnd();
  }

  // 1. คะแนน Word Accuracy (40%)
  let wordScore = 0, wordLabel = '—';
  const isManual = text === '__manual__' || text === '__no_api__';
  
  if (isManual) {
    wordScore = 50; wordLabel = 'N/A';
    $('transcript-box').textContent = text === '__manual__' ? '[หยุดแมนนวล]' : '[ไม่พบ Speech API]';
  } else if (text === '') {
    wordScore = 0;
    if (hasVoice) {
      wordLabel = T.wordMismatch;
      $('transcript-box').textContent = '[' + (T.voiceButNoText || T.wordMismatch) + ']';
    } else {
      wordLabel = T.noVoice;
      $('transcript-box').textContent = '[' + T.noVoice + ']';
    }
  } else {
    wordScore = wordMatched ? Math.round(70 + confidence * 30) : Math.round(confidence * 30);
    wordLabel = wordMatched ? `✓ ${(confidence*100).toFixed(0)}%` : `✗ ${(confidence*100).toFixed(0)}%`;
    $('transcript-box').textContent = `"${text}"`;
  }

  // 2. คะแนน Speech Rate (40%) - สกัดระยะเวลาบริสุทธิ์แบบไร้เสียง Noise แทรก
  let rateScore = 0, rateLabel = '—', syllPerSec = 0, durSec = 0;

  if (speechStartMs && speechEndMs && speechEndMs >= speechStartMs) {
    durSec = (speechEndMs - speechStartMs) / 1000;
    if (durSec < 0.2) durSec = 0.4; // กันตัวหารเออเร่อ

    if (wordMatched || isManual) {
      syllPerSec = T.syllables / durSec;
      rateScore  = rateToScore(syllPerSec);
      rateLabel  = `${syllPerSec.toFixed(1)} ${rateUnitLabel()}`;
      if (isManual) rateScore = Math.round(rateScore * 0.7);
    } else {
      rateScore = 0;
      rateLabel = (text === '' && hasVoice) ? (T.voiceButNoText || T.wordMismatch) : T.wordMismatch;
    }
  } else {
    rateLabel = hasVoice ? (T.voiceButNoText || T.wordMismatch) : T.noSpeechSegment;
  }

  // 3. คะแนน Volume Stability (20%)
  const stabScore = calcStab(vowelEnergyBuf);
  const stabLabel = vowelEnergyBuf.length >= 10 ? `${stabScore}%` : 'ข้อมูลน้อยเกินไป';

  // 4. SNR หลังพูดเสร็จ: speechEnergy เทียบกับ noiseFloor จริง
  const speechEnergy = calcSpeechEnergy(vowelEnergyBuf);
  const snrDb = calcSnrDb(speechEnergy, noiseFloor);
  const snrLow = snrDb !== null && snrDb < SNR_WARN_DB;
  window.MEASURED_NOISY = snrLow;

  // คะแนนรวมถ่วงน้ำหนักรวม
  const speechScore = Math.round(wordScore*0.40 + rateScore*0.40 + stabScore*0.20);

  setBar('word', wordScore, wordLabel);
  setBar('rate', rateScore, rateLabel);
  setBar('stab', stabScore, stabLabel);

  const cv = vowelEnergyBuf.length > 10 ? (() => {
    const avg = vowelEnergyBuf.reduce((a,b)=>a+b,0)/vowelEnergyBuf.length;
    if (avg === 0) return '0.0000';
    const std = Math.sqrt(vowelEnergyBuf.reduce((a,b)=>a+(b-avg)**2,0)/vowelEnergyBuf.length);
    return (std/avg).toFixed(4);
  })() : '—';

  // แสดงผลประวัติบันทึกสถิติสรุปส่งท้าย
  $('debug-box').innerHTML =
    `── Final (V3 Trailing) ──<br>` +
    `noiseFloor:&nbsp;&nbsp; ${noiseFloor.toFixed(5)}<br>` +
    `speechEnergy: ${speechEnergy.toFixed(5)}<br>` +
    `SNR:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${snrDb !== null ? snrDb.toFixed(1) + ' dB' : '—'}<br>` +
    `dynThreshold: ${dynThreshold.toFixed(5)}<br>` +
    `transcript:&nbsp;&nbsp; "${text}"<br>` +
    `duration:&nbsp;&nbsp;&nbsp;&nbsp; ${durSec.toFixed(2)}s (Pure Word)<br>` +
    `syllPerSec:&nbsp;&nbsp; ${syllPerSec.toFixed(2)}<br>` +
    `CV:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${cv}<br>` +
    `energyFrames: ${vowelEnergyBuf.length}<br>` +
    `<b>TOTAL:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${speechScore}</b>`;

  // บรรยายผลลัพธ์แบนเนอร์ประเมินความเสี่ยงทางการแพทย์
  let cls, title, sub;
  if      (speechScore >= 70) { cls='ok';   title=T.resultOk;   sub=T.subOk; }
  else if (speechScore >= 45) { cls='warn'; title=T.resultWarn; sub=T.subWarn; }
  else                        { cls='bad';  title=T.resultBad;  sub=T.subBad; }

  const issues = [];
  if (wordScore < 50) issues.push(T.issueWord);
  if (rateScore < 40) issues.push(`${T.issueSlow} (${syllPerSec.toFixed(1)} ${rateUnitLabel()})`);
  if (stabScore < 40) issues.push(T.issueUnstable);
  if (issues.length)  sub = issues.join(' · ');

  const col = {ok:'var(--green)',warn:'var(--amber)',bad:'var(--red)'}[cls];
  const rb  = $('result-banner');
  rb.className = 'result-banner ' + cls;
  rb.style.display = 'flex';
  $('rb-title').textContent = title; $('rb-title').style.color = col;
  $('rb-score').textContent = speechScore + ' / 100'; $('rb-score').style.color = col;
  // ติดป้ายเตือนถ้าวัดในที่มีเสียงรบกวน
  $('rb-sub').textContent   = window.MEASURED_NOISY ? (sub + ` · ${T.noisyTag} (${snrDb.toFixed(1)} dB)`) : sub;

  // ── บันทึกผลลง sessionStorage สำหรับ FAST integration ──
  const result = {
    score: speechScore,
    riskLevel: cls,
    breakdown: { wordScore, rateScore, stabScore },
    raw: { transcript: text, syllablesPerSec: syllPerSec, speechUnitsPerSec: syllPerSec, rateUnit: rateUnitLabel(), durationSec: durSec, noiseFloor, speechEnergy, snrDb },
    measuredNoisy: !!window.MEASURED_NOISY
  };
  sessionStorage.setItem('fast_speech', JSON.stringify(result));
  window.SPEECH_RESULT = result;

  // แสดงปุ่มนำทางทันทีหลังบันทึกผล เพื่อไม่ให้ diagnostic error ขัด flow
  handleFastFlow(cls);

  // diagnostic ค้างไว้ให้ดูหลังพูดจบ
  $('debug-box').style.display = 'none';
  $('debug-box').innerHTML =
    `[ผลวินิจฉัย VAD]<br>` +
    `duration: ${durSec.toFixed(2)}s<br>` +
    `SNR: ${snrDb !== null ? snrDb.toFixed(1) + ' dB' : '—'}<br>` +
    `flatness ตอนเสียงดัง:<br>&nbsp;&nbsp;min ${flatMin.toFixed(3)} / max ${flatMax.toFixed(3)}<br>` +
    `frames ดัง: ${loudCount}<br>` +
    `frames tonal(พูดจริง): ${tonerCount}<br>` +
    `tonal ratio: ${loudCount>0?(tonerCount/loudCount*100).toFixed(0):0}%<br>` +
    `FLATNESS_MAX ปัจจุบัน: ${FLATNESS_MAX}`;

  // เลื่อนเฉพาะพื้นที่ผลลัพธ์หลังปุ่มถูกแสดงแล้ว
  requestAnimationFrame(() => {
    if (rb && typeof rb.scrollIntoView === 'function') {
      rb.scrollIntoView({ behavior: 'auto', block: 'nearest' });
    }
  });
}

// ═══════════════════════════════════════════════════
// FAST FLOW — จัดการ navigation หลังจบ Speech
// ═══════════════════════════════════════════════════
function handleFastFlow(riskLevel) {
  const lang = sessionStorage.getItem('fast_lang') || 'th';
  const L = CONFIG[lang] || CONFIG.th;

  // ใช้การมี key เป็นหลัก เพื่อรองรับรูปแบบข้อมูล Face/Arm รุ่นเดิมด้วย
  const allDone = ['fast_face', 'fast_arm', 'fast_speech']
    .every(key => Boolean(sessionStorage.getItem(key)));

  let btn = document.getElementById('fast-nav-btn');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'fast-nav-btn';
    btn.type = 'button';
    document.getElementById('test-screen')?.appendChild(btn);
  }
  if (!btn) return;

  btn.textContent = allDone ? L.fastResult : L.fastHome;
  btn.className = allDone ? 'show green' : 'show';
  btn.style.display = 'block';
  btn.setAttribute('aria-hidden', 'false');

  btn.onclick = () => {
    stopAll();
    window.location.href = allDone ? 'result.html' : 'index.html';
  };

  // หากพบความผิดปกติแต่ยังทำไม่ครบ ให้เตือนโดยไม่เขียนทับรายละเอียดเดิม
  if (!allDone && riskLevel !== 'ok') {
    const resultSub = document.getElementById('rb-sub');
    if (resultSub && !resultSub.textContent.includes(L.fastIncomplete)) {
      resultSub.textContent += ` · ${L.fastIncomplete}`;
    }
  }
}

  const savedLang = sessionStorage.getItem('fast_lang') || 'th';
  const code = (savedLang === 'th' || savedLang === 'en' || savedLang === 'ja') ? savedLang : 'th';
  if (typeof selectLang === 'function') selectLang(code);
})();

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("/service-worker.js")
        .then(() => {
          console.log("QuickStroke service worker registered");
        })
        .catch((err) => {
          console.error("Service worker registration failed:", err);
        });
    });
  }
</script>

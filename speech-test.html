<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAST · Speech Test</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0F6FFF">
<meta name="apple-mobile-web-app-title" content="QuickStroke">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root {
    --bg:#F4F6F8; --surface:#FFFFFF; --surface-alt:#FAFBFC; --border:#D4DEE8;
    --blue:#2B7DE9; --green:#1FA98F; --red:#E5544E; --amber:#E89B3C;
    --text:#1B2A3A; --muted:#5A6B7B; --muted2:#94A3B2;
    --shadow:0 2px 4px rgba(27,42,58,0.06), 0 8px 24px rgba(27,42,58,0.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);font-family:'IBM Plex Sans Thai','Manrope',-apple-system,sans-serif;color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-overflow-scrolling:touch}
  .num{font-family:'Manrope';font-variant-numeric:tabular-nums}

  #lang-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px 28px}
  .title-lbl{font-size:12px;font-weight:600;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
  .main-title{font-size:26px;font-weight:600;text-align:center}
  .lang-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
  .lang-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;color:var(--text);box-shadow:var(--shadow);transition:transform 0.12s}
  .lang-btn:active{transform:scale(0.98)}
  .lang-btn:active{border-color:var(--blue);background:rgba(59,130,246,.1)}
  .lang-flag{font-size:26px}.lang-text{font-size:15px;font-weight:600}

  #test-screen{flex:1;display:none;flex-direction:column;height:100%;overflow:hidden}
  #top-bar{padding:16px 22px 0;display:flex;align-items:center;justify-content:space-between}
  .nav-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:8px}
  #mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px 24px;gap:14px;overflow-y:scroll;-webkit-overflow-scrolling:touch;width:100%}

  .mic-box{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mic-circle{width:100px;height:100px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;transition:all 0.3s}
  .mic-circle.calibrating{border-color:var(--amber);background:rgba(245,158,11,0.08)}
  .mic-circle.recording{border-color:var(--red);background:rgba(239,68,68,0.08);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .mic-icon{font-size:38px}
  #freq-canvas{position:absolute;inset:0;width:120px;height:120px;border-radius:50%;pointer-events:none;transform:rotate(-90deg)}

  .word-display{font-size:36px;font-weight:800;text-align:center;letter-spacing:-0.5px;color:var(--text)}
  .hint-lbl{font-size:15px;color:var(--muted);text-align:center;max-width:290px;line-height:1.6;font-weight:500}
  #transcript-box{font-family:'Manrope',monospace;font-size:13px;color:var(--amber);background:rgba(255,255,255,0.03);padding:8px 16px;border-radius:10px;display:none;text-align:center;width:100%;max-width:280px}

  #metrics-box{width:100%;max-width:280px;display:none;flex-direction:column;gap:10px}
  .metric-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .metric-val{font-family:'Manrope',monospace;font-size:14px;font-weight:700;color:var(--text)}
  .bar-track{height:8px;background:var(--surface-alt);border:1px solid var(--border);border-radius:5px;overflow:hidden}
  .bar-fill{height:100%;width:0%;border-radius:4px;transition:width 0.3s}

  #result-banner{display:none;width:100%;max-width:280px;border-radius:14px;padding:14px 16px;flex-direction:column;gap:4px}
  #result-banner.ok{background:rgba(16,185,129,.1);border:1.5px solid rgba(16,185,129,.3)}
  #result-banner.warn{background:rgba(245,158,11,.1);border:1.5px solid rgba(245,158,11,.3)}
  #result-banner.bad{background:rgba(239,68,68,.1);border:1.5px solid rgba(239,68,68,.3)}
  .rb-title{font-size:18px;font-weight:700}
  .rb-score{font-family:'Manrope',monospace;font-size:42px;font-weight:800;text-align:center;margin:6px 0;letter-spacing:-1px}
  .rb-sub{font-size:11px;color:var(--muted);line-height:1.5}

  #debug-box{display:none;width:calc(100% - 44px);margin:0 22px 10px;background:#1B2A3A;border-radius:10px;padding:12px 14px;font-family:monospace;font-size:12px;color:#A8F5C3;line-height:2;flex-shrink:0}
  #dev-log-tools{display:none;width:100%;max-width:280px;flex-direction:column;gap:7px;flex-shrink:0}
  #dev-log-tools.show{display:flex}
  #dev-copy-log{width:100%;min-height:48px;border:1.5px solid rgba(43,125,233,.34);border-radius:15px;background:#EAF2FD;color:#0D58B8;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer}
  #dev-copy-log:active{transform:scale(.98)}
  #dev-copy-log:disabled{opacity:.65;cursor:default}
  #dev-log-status{min-height:18px;color:var(--muted);font-size:12px;font-weight:650;line-height:1.35;text-align:center}
  #manual-copy-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(15,23,42,.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  #manual-copy-card{width:min(560px,100%);max-height:88dvh;display:flex;flex-direction:column;gap:12px;padding:18px;background:#fff;border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.30)}
  #manual-copy-card h2{font-size:18px;line-height:1.3}
  #manual-copy-card p{font-size:13px;color:#5A6B7B;line-height:1.5}
  #manual-copy-text{width:100%;min-height:260px;max-height:52dvh;resize:none;border:1px solid #D4DEE8;border-radius:14px;padding:12px;font-family:monospace;font-size:11px;line-height:1.45;color:#1B2A3A;background:#F8FAFC}
  #manual-copy-actions{display:flex;gap:10px}
  #manual-copy-actions button{flex:1;min-height:46px;border-radius:14px;font-family:inherit;font-weight:800;cursor:pointer}
  #manual-select-btn{border:0;background:#2B7DE9;color:#fff}
  #manual-close-btn{border:1px solid #D4DEE8;background:#fff;color:#5A6B7B}

  #action-btn{width:calc(100% - 44px);margin:0 22px 28px;min-height:60px;border-radius:15px;border:none;font-family:'IBM Plex Sans Thai';font-size:17px;font-weight:600;cursor:pointer;color:#fff;background:var(--blue);flex-shrink:0;box-shadow:0 6px 18px rgba(43,125,233,0.28);transition:transform 0.12s}
  #action-btn:active{transform:scale(0.97)}
  #action-btn:active{opacity:.85;transform:scale(.98)}
  #action-btn.red{background:var(--red)}
  #action-btn.green{background:var(--green)}

  /* ── ปุ่มภาษา fixed มุมบนขวา ── */
  #lang-sw-fixed {
    position: fixed; top: 10px; right: 10px; z-index: 200;
    display: none; gap: 4px;
  }
  #lang-sw-fixed.show { display: flex; }
  .lsf-btn {
    background: rgba(27,42,58,0.08);
    border: 1px solid rgba(27,42,58,0.18);
    color: var(--text); border-radius: 8px;
    padding: 5px 9px; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: 'Manrope', sans-serif;
    transition: background 0.15s;
  }
  .lsf-btn:active, .lsf-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }


  /* ─────────────────────────────────────────────
     FINAL SPEECH UI — aligned with arm-test dark glass HUD
     Logic unchanged: UI/CSS + small navigation/status helpers only
     ───────────────────────────────────────────── */
  :root {
    --col-blue-glass:   rgba(15, 32, 67, 0.55);
    --col-orange-glass: rgba(214, 116, 17, 0.65);
    --col-green-glass:  rgba(20, 108, 81, 0.60);
    --col-red-glass:    rgba(186, 38, 38, 0.65);
    --col-bg:#0E1620;
    --bg:var(--col-bg);
    --surface:rgba(14,22,32,0.72);
    --surface-alt:rgba(8,12,16,0.55);
    --border:rgba(255,255,255,0.16);
    --text:#FFFFFF;
    --muted:rgba(255,255,255,0.68);
    --muted2:rgba(255,255,255,0.45);
    --shadow:0 16px 40px rgba(0,0,0,0.45);
  }
  html{background:#10141d;display:flex;justify-content:center;align-items:center;min-height:100dvh;}
  body{
    background:radial-gradient(circle at 50% 8%, rgba(43,125,233,.24), transparent 32%), #050910;
    width:390px;max-width:100vw;height:844px;max-height:100dvh;position:relative;
    box-shadow:0 0 0 1px rgba(255,255,255,.08),0 24px 60px rgba(0,0,0,.60);
  }
  @media (min-width:500px){body{border-radius:40px;height:min(844px,100dvh);}}

  #lang-screen{display:none !important;background:rgba(14,22,32,.95);color:#fff;}
  #test-screen{display:flex !important;position:relative;overflow:hidden;}

  #speech-home-btn{
    position:absolute;top:18px;left:18px;z-index:120;width:44px;height:44px;border-radius:22px;
    border:1px solid rgba(255,255,255,.20);background:rgba(255,255,255,.08);color:#fff;
    font-size:24px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,.32);
  }
  #top-bar{position:absolute;top:18px;left:78px;right:18px;height:48px;z-index:125;padding:0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;}
  .top-spacer{display:block;}
  .top-label{grid-column:2;background:transparent;border:none;padding:0;color:#fff;font-size:22px;font-weight:800;letter-spacing:.2px;text-transform:none;text-shadow:0 4px 18px rgba(0,0,0,.65);}
  .top-right{grid-column:3;display:flex;justify-content:flex-end;align-items:center;gap:5px;}
  .nav-btn{display:none!important;}

  #lang-sw-fixed{position:static;z-index:1;display:none;gap:5px;background:rgba(8,12,16,.56);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:4px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  #lang-sw-fixed.show{display:flex;}
  .lsf-btn{height:38px;min-width:46px;border-radius:15px;background:transparent;border:none;color:#fff;font-size:16px;font-weight:700;padding:0 8px;letter-spacing:.2px;}
  .lsf-btn.active{background:linear-gradient(180deg,#2388ff,#0d58b8);box-shadow:0 0 0 1px rgba(73,158,255,.60),0 0 18px rgba(43,125,233,.55);}

  #speech-status-row{position:absolute;top:88px;left:18px;right:18px;z-index:106;height:72px;border-radius:22px;padding:10px 14px;background:rgba(12,18,28,.62);border:1px solid rgba(255,255,255,.12);display:flex;gap:0;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 14px 35px rgba(0,0,0,.32);}
  #speech-status-row:after{content:"";position:absolute;left:50%;top:16px;bottom:16px;width:1px;background:rgba(255,255,255,.16);}
  .s-card{flex:1;display:grid;grid-template-columns:44px 1fr;grid-template-rows:1fr 1fr;column-gap:10px;align-items:center;padding:0 8px;opacity:.86;}
  .s-card-icon{grid-row:1/3;width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);font-size:22px;}
  .s-card-main{font-size:17px;line-height:1;font-weight:800;color:#fff;align-self:end;}
  .s-card-sub{font-size:13px;line-height:1.15;font-weight:700;color:rgba(255,255,255,.76);align-self:start;}
  .s-card.active .s-card-icon{background:rgba(43,125,233,.18);box-shadow:0 0 18px rgba(43,125,233,.55);}
  .s-card.pass .s-card-icon{background:rgba(31,169,143,.20);box-shadow:0 0 18px rgba(31,169,143,.40);}
  .s-card.fail .s-card-icon{background:rgba(229,84,78,.22);box-shadow:0 0 18px rgba(229,84,78,.40);}

  #mid{padding:174px 14px 96px;justify-content:flex-start;gap:10px;overflow:hidden;}
  .mic-box{width:142px;height:142px;margin-top:0;}
  .mic-circle{width:118px;height:118px;background:rgba(14,22,32,.70);border-color:rgba(255,255,255,.18);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 14px 35px rgba(0,0,0,.35), inset 0 0 30px rgba(43,125,233,.05);}
  .mic-circle.calibrating{border-color:rgba(232,155,60,.65);background:rgba(214,116,17,.18);}
  .mic-circle.recording{border-color:rgba(229,84,78,.68);background:rgba(186,38,38,.24);box-shadow:0 0 26px rgba(229,84,78,.35),0 14px 35px rgba(0,0,0,.35);}
  .mic-icon{font-size:48px;}
  #freq-canvas{width:142px;height:142px;inset:0;}

  .hint-lbl{font-size:18px;color:#2D8CFF;max-width:100%;font-weight:800;line-height:1.35;text-shadow:0 0 14px rgba(45,140,255,.24);}
  .word-display{font-size:34px;line-height:1.15;font-weight:800;color:#fff;max-width:100%;text-shadow:0 3px 14px rgba(0,0,0,.45);}
  #transcript-box{background:rgba(8,12,16,.50);border:1px solid rgba(255,255,255,.12);color:#FFB84D;border-radius:16px;max-width:340px;padding:10px 14px;font-size:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}

  #metrics-box{width:100%;max-width:none;background:rgba(10,16,25,.52);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:14px;gap:12px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 12px 30px rgba(0,0,0,.28);}
  .metric-row{font-size:14px;text-transform:none;letter-spacing:0;color:#fff;font-weight:800;}
  .metric-val{font-size:17px;color:#fff;}
  .bar-track{height:9px;background:rgba(255,255,255,.16);border:none;border-radius:999px;}

  #result-banner{max-width:none;background:rgba(8,12,16,.52)!important;border:1px solid rgba(255,255,255,.16)!important;border-radius:22px;padding:16px;text-align:center;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 14px 35px rgba(0,0,0,.34);}
  .rb-title{font-size:22px;font-weight:800;}
  .rb-score{font-size:44px;}
  .rb-sub{font-size:15px;color:rgba(255,255,255,.72);}

  #debug-toggle{position:absolute;left:18px;right:18px;bottom:84px;z-index:111;width:auto!important;margin:0!important;background:rgba(8,12,16,.52)!important;border:1px solid rgba(255,255,255,.16)!important;color:rgba(255,255,255,.78)!important;border-radius:18px!important;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
  #debug-box{position:absolute;left:18px;right:18px;bottom:144px;z-index:112;width:auto!important;max-height:210px;overflow:auto;margin:0!important;background:rgba(8,12,16,.86);border:1px solid rgba(255,255,255,.16);border-radius:18px;color:#A8F5C3;box-shadow:0 16px 40px rgba(0,0,0,.45);}

  #action-btn{position:absolute;bottom:12px;left:12px;right:12px;z-index:110;width:auto;margin:0;min-height:64px;border-radius:24px;background:linear-gradient(180deg,#2388ff,#0d58b8);font-size:24px;font-weight:800;border:1px solid rgba(83,170,255,.60);box-shadow:0 0 24px rgba(43,125,233,.38),0 16px 40px rgba(0,0,0,.45);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);}
  #action-btn.green{background:linear-gradient(180deg,#22b99d,#126852);border-color:rgba(48,214,181,.52);}
  #action-btn.red{background:linear-gradient(180deg,#ff5a52,#aa2525);border-color:rgba(255,111,105,.52);}

  #fast-nav-btn{
    display:none;
    position:absolute;bottom:84px;left:12px;right:12px;z-index:140;
    width:auto;margin:0;min-height:58px;border-radius:22px;
    border:1px solid rgba(83,170,255,.60);
    background:linear-gradient(180deg,#2388ff,#0d58b8);
    color:#fff;font-family:'IBM Plex Sans Thai','Manrope',sans-serif;
    font-size:18px;font-weight:800;cursor:pointer;
    box-shadow:0 0 22px rgba(43,125,233,.32),0 10px 28px rgba(0,0,0,.38);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  }
  #fast-nav-btn.show{display:block!important;}
  #fast-nav-btn.green{
    background:linear-gradient(180deg,#22b99d,#126852);
    border-color:rgba(48,214,181,.52);
  }
  #fast-nav-btn:active{transform:scale(.98);}

  #noise-overlay{background:rgba(5,9,16,.78)!important;z-index:300!important;}
  #noise-overlay>div{background:rgba(12,18,28,.92)!important;border:1px solid rgba(255,255,255,.16);box-shadow:0 16px 44px rgba(0,0,0,.46)!important;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
  #noise-title{color:#fff!important;}

  /* RESULT MODE FIX: ผลลัพธ์เลื่อนได้ แต่ปุ่มหลักคงอยู่ด้านล่างเสมอ */
  #test-screen.done{
    overflow:hidden !important;
  }

  #test-screen.done #mid{
    flex:1 1 auto;
    overflow-y:auto !important;
    -webkit-overflow-scrolling:touch;
    padding-bottom:176px !important;
    scroll-padding-bottom:176px;
  }

  #test-screen.done #fast-nav-btn{
    position:absolute !important;
    left:12px !important;
    right:12px !important;
    bottom:84px !important;
    width:auto !important;
    margin:0 !important;
  }

  #test-screen.done #action-btn{
    position:absolute !important;
    left:12px !important;
    right:12px !important;
    bottom:12px !important;
    width:auto !important;
    margin:0 !important;
  }

  #test-screen.done #debug-toggle,
  #test-screen.done #debug-box{
    display:none !important;
  }

  #test-screen.done #dev-log-tools.show{
    display:flex !important;
  }

  #test-screen.done .rb-score{
    font-size:38px;
  }

  #noise-desc{color:rgba(255,255,255,.70)!important;}
  #noise-go-btn{background:rgba(255,255,255,.08)!important;color:#fff!important;border-color:rgba(255,255,255,.18)!important;}

  @media (max-height:760px){
    #mid{padding-top:158px;gap:8px;}
    .mic-box{width:116px;height:116px;}
    .mic-circle{width:100px;height:100px;}.mic-icon{font-size:40px;}
    #freq-canvas{width:116px;height:116px;}
    .word-display{font-size:28px;}.hint-lbl{font-size:15px;}
    #metrics-box{padding:11px;gap:8px;}
    #action-btn{min-height:56px;font-size:21px;}
    #fast-nav-btn{bottom:76px;min-height:52px;font-size:17px;}
    #test-screen.done #fast-nav-btn{bottom:76px !important;}
    #test-screen.done #mid{padding-bottom:156px !important;scroll-padding-bottom:156px;}
    .top-label{font-size:19px;}
    #speech-status-row{height:64px;top:82px;}
  }



  /* ═══════════════════════════════════════════════════════════════
     QUICKSTROKE INDEX THEME — stabilization pass
     Visual-only override. Screening logic and DOM contracts unchanged.
     ═══════════════════════════════════════════════════════════════ */

  :root{
    --paper:#F4F7FA;
    --surface:#FFFFFF;
    --surface-alt:#F8FAFC;
    --ink:#172536;
    --ink-soft:#5A6B7B;
    --ink-faint:#8796A6;
    --clinical:#2B7DE9;
    --clinical-deep:#0D58B8;
    --clinical-soft:#EAF2FD;
    --mint:#1FA98F;
    --mint-soft:#E6F6F2;
    --amber:#D98625;
    --amber-soft:#FCF3E6;
    --coral:#D94843;
    --coral-soft:#FCEBEA;
    --line:rgba(27,42,58,.12);
    --glass-border:rgba(255,255,255,.78);
    --shadow:0 10px 28px rgba(27,42,58,.08);

    --bg:var(--paper);
    --text:var(--ink);
    --muted:var(--ink-soft);
    --muted2:var(--ink-faint);
    --border:#D7E0E9;
    --blue:var(--clinical);
    --green:var(--mint);
    --red:var(--coral);
  }
  html{min-height:100%;display:block;background:#E8EEF5}
  body{
    width:100%;
    max-width:none;
    height:100dvh;
    max-height:none;
    margin:0;
    color:var(--ink);
    background:
      radial-gradient(circle at 50% -6%,rgba(43,125,233,.22),transparent 34%),
      radial-gradient(circle at 100% 18%,rgba(31,169,143,.10),transparent 26%),
      var(--paper);
    box-shadow:none;
    border-radius:0;
  }
  button:focus-visible{
    outline:3px solid rgba(43,125,233,.34);
    outline-offset:3px;
  }
  #test-screen{

<script>
'use strict';

// ═══════════════════════════════════════════════════
// SHARED SPEECH LOCALE
// ═══════════════════════════════════════════════════
const SPEECH_LOCALE_MAP = window.QuickStrokeLanguages?.localeMap || Object.freeze({
  th: 'th-TH',
  en: 'en-US',
  ja: 'ja-JP'
});

const SPEECH_REQUIRED_KEYS = Object.freeze([
  'langCode', 'target', 'syllables', 'rateUnit', 'keywords', 'hint',
  'btnStart', 'btnRetry', 'btnStop', 'listening',
  'fastResult', 'fastHome', 'fastNext', 'fastIncomplete',
  'noiseTitle', 'noiseDesc', 'noiseMove', 'noiseGo', 'noisyTag',
  'topTitle', 'accuracy', 'ready', 'rate', 'pending',
  'wordAccuracy', 'speechRate', 'volumeStability',
  'noiseMetric', 'snrMetric', 'calibrating', 'noiseCalib',
  'resultOk', 'resultWarn', 'resultBad', 'subOk', 'subWarn', 'subBad',
  'noVoice', 'voiceButNoText', 'noSpeechSegment', 'wordMismatch',
  'issueWord', 'issueSlow', 'issueUnstable',
  'deadMicFailed', 'micReconnecting', 'micAccessError',
  'manualStop', 'speechApiUnavailable', 'insufficientData',
  'resultInvalid', 'subInvalid', 'retryingNoVoice', 'retryingNoText',
  'micSessionReset', 'scoreLabel', 'languageUnavailable'
]);

let speechLocaleRequestId = 0;

function validateSpeechMessages(messages, locale) {
  if (!messages || typeof messages !== 'object') {
    throw new Error(`Missing speech translations for ${locale}`);
  }

  const missing = SPEECH_REQUIRED_KEYS.filter(key => messages[key] === undefined);
  if (missing.length) {
    throw new Error(`Incomplete speech translations for ${locale}: ${missing.join(', ')}`);
  }

  if (!Array.isArray(messages.keywords) || !messages.keywords.length) {
    throw new Error(`Invalid speech keywords for ${locale}`);
  }

  if (!Number.isFinite(Number(messages.syllables)) || Number(messages.syllables) <= 0) {
    throw new Error(`Invalid speech unit count for ${locale}`);
  }
}

async function readSpeechLocale(locale) {
  if (!window.QuickStrokeI18n) {
    throw new Error('QuickStrokeI18n is not available');
  }

  await window.QuickStrokeI18n.setLocale(locale, {
    persist: true,
    apply: false
  });

  const messages = window.QuickStrokeI18n.getMessages();
  const speechMessages = messages?.speech;
  validateSpeechMessages(speechMessages, locale);

  return {
    ...speechMessages,
    langCode: speechMessages.langCode || locale,
    syllables: Number(speechMessages.syllables)
  };
}

async function loadSpeechLocale(requestedCode) {
  let code = String(requestedCode || 'th').split('-')[0].toLowerCase();
  let locale = SPEECH_LOCALE_MAP[code];

  if (!locale) {
    console.warn(`Unsupported speech language: ${requestedCode}`);
    return null;
  }

  const requestId = ++speechLocaleRequestId;
  let messages;

  try {
    messages = await readSpeechLocale(locale);
  } catch (error) {
    console.error(`Could not load speech locale ${locale}.`, error);

    if (code === 'en') return null;

    try {
      code = 'en';
      locale = SPEECH_LOCALE_MAP.en;
      messages = await readSpeechLocale(locale);
    } catch (fallbackError) {
      console.error('Could not load the English speech fallback.', fallbackError);
      return null;
    }
  }

  if (requestId !== speechLocaleRequestId) return null;

  sessionStorage.setItem('fast_lang', code);
  return { code, messages };
}

async function recoverDeadMic() {
  deadMicAttempt++;
  DBG('☠️ DEAD MIC', `stream เงียบสนิท — กู้คืนครั้งที่ ${deadMicAttempt}/${DEAD_MIC_MAX_ATTEMPT}`);
  phase = 'IDLE'; // หยุด runLoop รอบนี้

  if (deadMicAttempt > DEAD_MIC_MAX_ATTEMPT) {
    deadMicAttempt = 0;
    await stopAll(true);
    finishSpeechInvalid('DEAD_MIC_RECOVERY_FAILED', {
      attempts: DEAD_MIC_MAX_ATTEMPT,
      message: T.deadMicFailed
    });
    return;
  }

  appendSpeechAttempt('technical_retry', {
    invalidReasonCode: 'DEAD_MIC_DETECTED',
    message: 'Digital silence detected; rebuilding microphone pipeline',
    qualityFlags: ['DEAD_MIC_DETECTED']
  });

  $('transcript-box').style.display = 'block';
  $('transcript-box').textContent = T.micReconnecting
    .replace('{attempt}', String(deadMicAttempt))
    .replace('{max}', String(DEAD_MIC_MAX_ATTEMPT));

  // ถึงจุดนี้ = pipeline ตายจริง ต้องปิดหมด (full release) แล้วรอนานขึ้นให้ iOS reset audio session
  await stopAll(true);
  const waitMs = 1500 + deadMicAttempt * 1500; // 3s → 4.5s → 6s → 7.5s
  await sleep(waitMs);
  DBG('🔧 RECOVERY', `เริ่มรอบใหม่หลังรอ ${waitMs}ms`);
  startRecording(true);
}

/*
  SpeechRecognition.abort() และ AudioContext.close() ปล่อย resource แบบ asynchronous
  รอบ Retry จึงต้องรอให้บริการเดิม disconnect/close จริงก่อนเริ่มรอบใหม่
*/
function shutdownRecognition() {
  recognitionRunId++; // event/timer จากรอบเก่าจะถูก ignore ทันที
  clearRecognitionTimers();

  const oldRecognition = recognition;
  const wasStarted = recognitionStarted;

  recognition = null;
  recognitionStarted = false;

  if (!oldRecognition) return Promise.resolve();

  return new Promise(resolve => {
    let settled = false;

    const finish = () => {
      if (settled) return;
      settled = true;
      resolve();
    };

    // ปิด handler เดิมเพื่อไม่ให้ onend ของรอบเก่า restart ตัวเอง
    oldRecognition.onresult = null;
    oldRecognition.onerror = finish;
    oldRecognition.onend = finish;

    try {
      if (wasStarted) oldRecognition.abort();
      else finish();
    } catch (error) {
      finish();
    }

    // บาง browser ไม่ยิง end หลัง abort จึงมี timeout กันค้าง
    setTimeout(finish, 1200);
  });
}

// คงชื่อเดิมไว้สำหรับจุดเรียกเก่า แต่คืน Promise เพื่อให้ await ได้

  return shutdownRecognition();
}

function roundSpeechMetric(value, digits = 5) {

function createSpeechResearchId(prefix = 'speech-attempt') {
  try {
    if (window.crypto?.randomUUID) return `${prefix}-${window.crypto.randomUUID()}`;
    if (window.crypto?.getRandomValues) {
      const bytes = new Uint8Array(16);
      window.crypto.getRandomValues(bytes);
      const token = Array.from(bytes, value => value.toString(16).padStart(2, '0')).join('');
      return `${prefix}-${token}`;
    }
  } catch (error) {
    console.warn('Unable to create cryptographic Speech research id; using fallback', error);
  }
  return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 12)}`;
}

function nextSpeechAttemptSequence() {
  const key = 'fast_speech_attempt_sequence';
  try {
    const current = Number.parseInt(sessionStorage.getItem(key) || '0', 10);
    const next = Number.isFinite(current) ? current + 1 : 1;
    sessionStorage.setItem(key, String(next));
    return next;
  } catch (error) {
    console.warn('Unable to update Speech attempt sequence', error);
    return null;
  }
}

  if (validityStatus === 'aborted') return 'aborted';

}

function captureSpeechPermissionRuntime(result, sourceName = 'fast_permissions') {

function captureSpeechMicrophoneRuntime(stream, acquisitionMode) {
  try {
    const track = stream?.getAudioTracks?.()[0];
    const settings = track?.getSettings?.() || {};
    const constraints = track?.getConstraints?.() || {};
    microphoneRuntime = {
      acquisitionMode: acquisitionMode || null,
      label: track?.label || null,
      readyState: track?.readyState || null,
      muted: track?.muted ?? null,
      enabled: track?.enabled ?? null,

        noiseSuppression: settings.noiseSuppression ?? null,

      },

    };
  } catch (error) {

function recordSpeechResearchFrame(data = {}) {
  if (!speechModuleStartedAtMs || phase === 'DONE') return;
  const now = Date.now();
  if (now - lastSpeechResearchFrameAtMs < RESEARCH_SAMPLE_INTERVAL_MS) return;
  lastSpeechResearchFrameAtMs = now;
  speechResearchFrames.push({
    tMs: now - speechModuleStartedAtMs,
    attemptNo: Math.max(1, speechAttemptNo),
    phase,
    ...data
  });
}

function appendAsrObservation(type, detail = {}) {
  if (!speechModuleStartedAtMs) return;
  asrObservationEvents.push({
    tMs: Date.now() - speechModuleStartedAtMs,
    attemptNo: Math.max(1, speechAttemptNo),
    type,
    ...detail
  });
  if (asrObservationEvents.length > 160) {
    asrObservationEvents = asrObservationEvents.slice(-160);
  }
}

function currentSpeechDurationSec() {
  if (speechStartMs && speechEndMs && speechEndMs >= speechStartMs) {
    return (speechEndMs - speechStartMs) / 1000;
  }
  if (speechStartMs && lastVoiceMs && lastVoiceMs >= speechStartMs) {
    return (lastVoiceMs - speechStartMs) / 1000;
  }
  return 0;
}

function currentSpeechEnergySummary() {
  const speechEnergy = calcSpeechEnergy(vowelEnergyBuf);
  const snrDb = calcSnrDb(speechEnergy, noiseFloor);
  let coefficientOfVariation = null;
  if (vowelEnergyBuf.length) {
    const avg = vowelEnergyBuf.reduce((a, b) => a + b, 0) / vowelEnergyBuf.length;
    const std = Math.sqrt(vowelEnergyBuf.reduce((sum, value) => sum + (value - avg) ** 2, 0) / vowelEnergyBuf.length);
    coefficientOfVariation = avg > 0 ? std / avg : 0;
  }
  return { speechEnergy, snrDb, coefficientOfVariation };
}

function currentSpeechQualityFlags({ confidenceImputed = confidenceWasImputed } = {}) {
  const flags = [];
  const { snrDb } = currentSpeechEnergySummary();
  if (snrDb !== null && snrDb < SNR_WARN_DB) flags.push('LOW_SNR');
  if (confidenceImputed) flags.push('ASR_CONFIDENCE_IMPUTED');
  if (lastAsrErrorCode) {
    flags.push(`ASR_ERROR_${String(lastAsrErrorCode).toUpperCase().replace(/[^A-Z0-9]+/g, '_')}`);
  }
  return [...new Set(flags)];
}

function speechRawObservations(details = {}) {
  const reportedConfidence = Number.isFinite(details.reportedConfidence) && details.reportedConfidence > 0
    ? details.reportedConfidence
    : null;
  const speechStartOffsetMs = speechStartMs && currentAttemptPerformanceStartedAt
    ? Math.max(0, speechStartMs - currentAttemptPerformanceStartedAt)
    : null;
  const speechEndOffsetMs = speechEndMs && currentAttemptPerformanceStartedAt
    ? Math.max(0, speechEndMs - currentAttemptPerformanceStartedAt)
    : null;
  return {
    transcript: String(details.transcript || ''),
    asrConfidenceReported: reportedConfidence,
    asrErrorCode: details.asrErrorCode || lastAsrErrorCode || null,
    asrEvents: asrObservationEvents
      .filter(event => event.attemptNo === speechAttemptNo)
      .map(event => ({ ...event })),
    calibrationSpeechBandEnergy: noiseFrames.map(value => roundSpeechMetric(value, 6)),
    speechBandEnergySamples: vowelEnergyBuf.map(value => roundSpeechMetric(value, 6)),
    speechStartOffsetMs: roundSpeechMetric(speechStartOffsetMs, 1),
    speechEndOffsetMs: roundSpeechMetric(speechEndOffsetMs, 1),
    energyFrameCount: vowelEnergyBuf.length,
    tonalVoiceEventCount: voiceHistory.length,
    loudFrameCount: loudCount,
    tonalFrameCount: tonerCount,
    flatnessMin: Number.isFinite(flatMin) && flatMin < 1 ? roundSpeechMetric(flatMin, 4) : null,
    flatnessMax: Number.isFinite(flatMax) && flatMax > 0 ? roundSpeechMetric(flatMax, 4) : null,
    rawAudioStored: false
  };
}

function speechDerivedMetrics(details = {}) {
  const energy = currentSpeechEnergySummary();
  const durationSec = details.durationSec ?? currentSpeechDurationSec();
  return {
    normalizedTranscript: details.normalizedTranscript ?? null,
    acceptedVariantMatched: details.acceptedVariantMatched ?? null,
    textSimilarityShadow: roundSpeechMetric(details.textSimilarityShadow, 5),
    confidenceUsedForScoring: roundSpeechMetric(details.confidenceUsedForScoring, 5),
    confidenceImputed: details.confidenceImputed ?? confidenceWasImputed,
    durationSec: roundSpeechMetric(durationSec, 4),
    speechUnitsPerSec: roundSpeechMetric(details.speechUnitsPerSec, 4),
    rateUnit: details.rateUnit || rateUnitLabel(),
    noiseFloor: roundSpeechMetric(noiseFloor, 6),
    dynamicThreshold: roundSpeechMetric(dynThreshold, 6),
    speechEnergy: roundSpeechMetric(energy.speechEnergy, 6),
    snrDb: roundSpeechMetric(energy.snrDb, 3),
    coefficientOfVariation: roundSpeechMetric(energy.coefficientOfVariation, 5),
    energyFrameCount: vowelEnergyBuf.length,
    wordScore: Number.isFinite(details.wordScore) ? details.wordScore : null,
    rateScore: Number.isFinite(details.rateScore) ? details.rateScore : null,
    stabilityScore: Number.isFinite(details.stabilityScore) ? details.stabilityScore : null,
    totalSpeechScore: Number.isFinite(details.totalSpeechScore) ? details.totalSpeechScore : null
  };
}

function persistSpeechPayload(payload, { writeLegacyResult = true } = {}) {
  if (!payload || typeof payload !== 'object') return payload;
  const json = JSON.stringify(payload);
  try {
    if (writeLegacyResult) sessionStorage.setItem('fast_speech', json);
    sessionStorage.setItem('fast_speech_research_latest', json);
    sessionStorage.setItem('fast_result_source', 'speech');

    let history = [];
    try {
      const parsed = JSON.parse(sessionStorage.getItem('fast_speech_research_history') || '[]');
      if (Array.isArray(parsed)) history = parsed;
    } catch (error) {
      console.warn('Unable to parse Speech research history; starting a new history', error);
    }
    const duplicateIndex = history.findIndex(item => item?.testAttemptId === payload.testAttemptId);
    if (duplicateIndex >= 0) history.splice(duplicateIndex, 1);
    history.push(payload);
    if (history.length > SPEECH_RESEARCH_HISTORY_LIMIT) {
      history = history.slice(history.length - SPEECH_RESEARCH_HISTORY_LIMIT);
    }
    sessionStorage.setItem('fast_speech_research_history', JSON.stringify(history));
  } catch (error) {
    console.warn('Unable to persist Speech research payload', error);
  }
  window.SPEECH_RESULT = payload;
  window.SPEECH_RESEARCH_RESULT = payload;
  // Update immediately and again after layout/paint. Mobile Safari may finish
  // the result DOM one frame later than sessionStorage persistence.
  updateDevLogTools();
  requestAnimationFrame(updateDevLogTools);
  setTimeout(updateDevLogTools, 80);
  return payload;
}

function latestSpeechResearchPayload() {
  if (window.SPEECH_RESEARCH_RESULT) return window.SPEECH_RESEARCH_RESULT;
  try {
    return JSON.parse(sessionStorage.getItem('fast_speech_research_latest') || 'null');
  } catch (error) {
    console.warn('Unable to read latest Speech research payload', error);
    return null;
  }
}

function speechResearchHistory() {
  try {
    const parsed = JSON.parse(sessionStorage.getItem('fast_speech_research_history') || '[]');
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    console.warn('Unable to read Speech research history', error);
    return [];
  }
}

function buildSpeechResearchLogBundle() {
  const latest = latestSpeechResearchPayload();
  const history = speechResearchHistory();
  const testAttempts = history.length ? history : (latest ? [latest] : []);
  if (testAttempts.length === 0) return null;

  const latestStored = latest || testAttempts[testAttempts.length - 1];
  const internalAttemptCount = testAttempts.reduce((sum, payload) => {
    return sum + (Array.isArray(payload?.attempts) ? payload.attempts.length : 0);
  }, 0);

  return {
    exportSchemaVersion: 'quickstroke-speech-log-0.1.0',
    exportedAt: new Date().toISOString(),
    source: 'speech-test-dev-copy-log',
    debugBuild: DEBUG_BUILD,
    screeningSessionId: latestStored?.screeningSessionId || null,
    latestTestAttemptId: latestStored?.testAttemptId || null,
    testAttempts,
    debugTrace: DBG_LINES.slice(),
    storageSummary: {
      testAttemptCount: testAttempts.length,
      internalAttemptCount,
      debugLineCount: DBG_LINES.length,
      rawAudioStored: false,
      recognitionMode: 'browser_default'
    }
  };
}

async function writeSpeechLogToClipboard(json) {
  if (navigator.clipboard?.writeText && window.isSecureContext) {
    await navigator.clipboard.writeText(json);
    return true;
  }

  const area = document.createElement('textarea');
  area.value = json;
  area.setAttribute('readonly', '');
  area.style.position = 'fixed';
  area.style.left = '-9999px';
  area.style.top = '0';
  document.body.appendChild(area);
  area.focus();
  area.select();
  area.setSelectionRange(0, area.value.length);
  let copied = false;
  try {
    copied = document.execCommand('copy');
  } finally {
    area.remove();
  }
  return copied;
}

async function handleAction() {
  if (retryStarting) return;

  if (phase === 'IDLE') {
    retryStarting = true;
    const actionBtn = $('action-btn');
    actionBtn.disabled = true;
    prepareSpeechModuleAttempt('initial_start');
    try {
      await ensureMicDisclosureBeforeFirstUse();
      await startRecording(false);
    } catch (error) {
      if (phase !== 'DONE') {
        finishSpeechInvalid('I18N_LOAD_FAILED', {
          message: error?.message || String(error),
          errorName: error?.name || null
        });
      }
    } finally {
      retryStarting = false;
      actionBtn.disabled = false;
    }
  }
  else if (phase === 'RECORDING') {
    // ผู้ใช้กดปุ่มหยุดบันทึกด้วยตัวเองแมนนวล
    speechEndMs = getLastSpeechSegmentEnd();
    evaluateSpeech('__manual__', 0);
  }
  else if (phase === 'DONE') {
    // User-requested module retry creates a new test_attempt in the same
    // screening_session. The previous payload remains in research history.
    retryStarting = true;
    const actionBtn = $('action-btn');
    actionBtn.disabled = true;
    actionBtn.textContent = T.calibrating;

    try {
      phase = 'IDLE';
      resetUI();
      prepareSpeechModuleAttempt('user_retry');
      actionBtn.disabled = true;
      actionBtn.textContent = T.calibrating;
      await startRecording(true);
    } finally {
      retryStarting = false;
      actionBtn.disabled = false;
    }
  }
}

function hasLiveAudioTrack(stream) {
  return !!stream && stream.getAudioTracks().some(track => track.readyState === 'live');
}

async function waitForMicTrackReady(stream, timeoutMs = 1500) {
  const track = stream?.getAudioTracks?.()[0];
  if (!track || track.readyState !== 'live') return false;
  if (!track.muted) return true;

  await Promise.race([
    new Promise(resolve => track.addEventListener('unmute', resolve, { once:true })),
    sleep(timeoutMs)
  ]);

  // FIX: รายงานผลจริง ถ้ายัง muted ค้าง ให้ caller ขอ stream ใหม่แทนการปล่อยผ่าน
  return track.readyState === 'live' && !track.muted;
}

function clearResultReleaseTimer() {
  if (resultReleaseTimer) {

}

function scheduleResultMicRelease() {
  clearResultReleaseTimer();

}

async function probeExistingAudioPipeline(durationMs = REUSE_HEALTH_PROBE_MS) {
  if (!audioCtx || audioCtx.state === 'closed' || !analyser || !hasLiveAudioTrack(streamRef)) {
    return false;
  }

  if (audioCtx.state === 'suspended') {
    try { await audioCtx.resume(); } catch (error) {}
  }
  if (audioCtx.state !== 'running') return false;

  const samples = new Uint8Array(analyser.fftSize || 1024);
  const until = performance.now() + Math.max(150, durationMs);
  let peakDeviation = 0;

  while (performance.now() < until) {
    analyser.getByteTimeDomainData(samples);
    let sum = 0;
    for (let i = 0; i < samples.length; i++) {
      sum += Math.abs(samples[i] - 128) / 128;
    }
    peakDeviation = Math.max(peakDeviation, sum / samples.length);
    if (peakDeviation > REUSE_ENERGY_MIN) return true;
    await sleep(45);
  }

  DBG('PIPELINE HEALTH FAIL', `deviation=${peakDeviation.toFixed(8)}`);
  return false;
}

function mapMicErrorReason(error) {
  const name = error?.name || error?.permissionResult?.raw?.name || '';
  const helperReason = error?.permissionResult?.reasonCode;
  if (helperReason) return helperReason;
  if (name === 'NotAllowedError' || name === 'SecurityError') return 'MICROPHONE_PERMISSION_DENIED';
  if (name === 'NotFoundError' || name === 'DevicesNotFoundError') return 'MICROPHONE_NOT_FOUND';
  if (name === 'NotReadableError' || name === 'TrackStartError') return 'MICROPHONE_IN_USE';
  if (String(error?.message || '').includes('Web Audio')) return 'WEB_AUDIO_UNAVAILABLE';
  return 'MICROPHONE_START_FAILED';
}

async function acquireFreshMicStream(permLang) {
  let permissionResult = null;

  // Use the shared helper for the browser permission request. The separate
  // privacy disclosure has already been shown before the first microphone use.
  if (window.FastPermissions && typeof FastPermissions.request === 'function') {
    try {
      permissionResult = await FastPermissions.request('mic', permLang);
      captureSpeechPermissionRuntime(permissionResult, 'fast_permissions_request');
    } catch (error) {
      permissionResult = null;
    }
  }

  if (permissionResult?.ok && hasLiveAudioTrack(permissionResult.stream)) {
    captureSpeechMicrophoneRuntime(permissionResult.stream, 'fast_permissions_stream');
    return permissionResult.stream;
  }

  // Some helper implementations may return a cached stopped stream. Request a
  // fresh browser stream while retaining the helper failure metadata.
  if (navigator.mediaDevices?.getUserMedia) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: false,
          autoGainControl: false
        }
      });
      permissionRuntime = {
        ...permissionRuntime,
        effectiveOutcome: 'stream_acquired_by_direct_fallback',
        directFallbackSucceeded: true
      };
      captureSpeechMicrophoneRuntime(stream, 'direct_get_user_media_fallback');
      return stream;
    } catch (error) {
      error.permissionResult = permissionResult;
      throw error;
    }
  }

  const err = new Error('Microphone API is not available');
  err.permissionResult = permissionResult;
  throw err;
}

async function startRecording(forceDirectMic = false) {
  const startToken = ++audioStartToken;
  clearResultReleaseTimer();
  DBG_T0 = performance.now();
  DBG('START', `forceDirectMic=${forceDirectMic} phase=${phase} token=${startToken}`);

  // On iOS keep the old pipeline temporarily so it can be health-checked.
  // Other platforms fully release before every new attempt.
  await stopAll(KEEP_MIC_ALIVE ? false : true);
  if (startToken !== audioStartToken) return;
  DBG('CLEANUP DONE', 'previous ASR/session cleanup completed');

  ensureSpeechModuleAttempt(forceDirectMic ? 'retry' : 'initial_start');
  resetMeasurementState();
  speechAttemptNo++;
  currentAttemptStartedAtMs = Date.now();
  currentAttemptStartedAt = new Date(currentAttemptStartedAtMs).toISOString();
  currentAttemptPerformanceStartedAt = performance.now();
  lastAsrErrorCode = null;
  confidenceWasImputed = false;

  if ($('test-screen')) $('test-screen').classList.remove('done');

  const existingNav = document.getElementById('fast-nav-btn');
  if (existingNav) {
    existingNav.className = '';
    existingNav.style.display = 'none';
    existingNav.setAttribute('aria-hidden', 'true');
    existingNav.onclick = null;
  }

  phase = 'CALIBRATING';
  $('mic-circle').className         = 'mic-circle calibrating';
  $('mic-icon').textContent         = '🔇';
  $('action-btn').textContent       = T.calibrating;
  $('action-btn').className         = '';
  $('transcript-box').style.display = 'block';
  $('transcript-box').textContent   = T.noiseCalib;
  $('metrics-box').style.display    = 'flex';
  $('debug-toggle').style.display   = DEBUG_ON ? 'block' : 'none';
  $('debug-box').textContent        = 'calibrating noise floor...';
  setSpeechCard('word','active',T.noiseMetric,T.calibrating.replace(/\.\.\.|…/g,'').trim() || T.pending,'🔇');
  setSpeechCard('rate','',T.rate,T.pending,'⏱️');

  try {
    const permLang = sessionStorage.getItem('fast_lang') || 'th';

    // iOS keep-alive is reused only when it produces a real non-zero signal.
    // A live/unmuted track alone is not sufficient; stale sessions can report
    // live while delivering digital silence.
    const canProbeReuse = KEEP_MIC_ALIVE &&
      audioCtx && audioCtx.state !== 'closed' &&
      analyser && source && hasLiveAudioTrack(streamRef);

    if (canProbeReuse) {
      const healthyReuse = await probeExistingAudioPipeline();
      if (startToken !== audioStartToken) return;

      if (healthyReuse) {
        DBG('♻️ REUSE PIPELINE', `health check passed (audioCtx=${audioCtx.state})`);
        pipelineReadyMs = performance.now();
        sawRealSignal   = false;
        calibStartMs    = performance.now();
        runLoop();
        return;
      }

      DBG('♻️ REUSE REJECTED', 'old session is live but not delivering signal');
      $('transcript-box').textContent = T.micSessionReset;
      await stopAll(true);
      if (startToken !== audioStartToken) return;
      await sleep(RETRY_FULL_RELEASE_WAIT_MS);
      if (startToken !== audioStartToken) return;
    }

    // An incomplete old pipeline cannot be probed safely. Release it before
    // creating a new AudioContext/MediaStream pair.
    if (KEEP_MIC_ALIVE && (audioCtx || streamRef || source || analyser)) {
      await stopAll(true);
      if (startToken !== audioStartToken) return;
      await sleep(RETRY_FULL_RELEASE_WAIT_MS);
      if (startToken !== audioStartToken) return;
    }

    /*
      สร้างและสั่ง resume AudioContext ก่อน await getUserMedia
      เพื่อให้คำสั่งยังอยู่ใน user gesture ของปุ่ม โดยเฉพาะรอบทดสอบซ้ำ
      บน Chrome/Edge/iOS บางรุ่น การสร้าง AudioContext หลัง await อาจค้างที่ suspended
    */
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) throw new Error('Web Audio API is not available');

    audioCtx = new AudioContextClass();
    DBG('AUDIOCTX created', `state=${audioCtx.state}`);
    if (audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch (error) {}
      DBG('AUDIOCTX after resume', `state=${audioCtx.state}`);
    }

    if (forceDirectMic) {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('Microphone API is not available');
      }

      // รอบ Retry ขอ stream ใหม่จาก browser โดยตรง ไม่ใช้ stream cache ของ helper
      streamRef = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: false,
          autoGainControl: false
        }
      });
      captureSpeechMicrophoneRuntime(streamRef, 'direct_get_user_media');
    } else {
      streamRef = await acquireFreshMicStream(permLang);
    }

    if (startToken !== audioStartToken) {
      try { streamRef?.getTracks?.().forEach(track => track.stop()); } catch (error) {}
      return;
    }

    if (!hasLiveAudioTrack(streamRef)) {
      throw new Error('Microphone stream is not active');
    }
    DBG_TRACK('STREAM acquired', streamRef);

    // บางเครื่องคืน stream ก่อน hardware mic พร้อมจริง รอ unmute สั้น ๆ
    // FIX: ถ้า track ยัง muted ค้าง (พบบ่อยตอนทดสอบซ้ำทันทีบน Chrome/Android)
    // ให้ทิ้ง stream เงียบนั้น แล้วขอ stream ใหม่จาก browser โดยตรง สูงสุด 2 ครั้ง
    let micReady = await waitForMicTrackReady(streamRef);
    DBG('MIC READY?', micReady);
    for (let retry = 0; !micReady && retry < 2; retry++) {
      DBG('MIC RETRY', `รอบที่ ${retry + 1} — track ยัง muted ค้าง ขอ stream ใหม่`);
      try {
        streamRef.getTracks().forEach(track => { try { track.stop(); } catch (e) {} });
      } catch (e) {}
      streamRef = null;

      await sleep(600); // เว้นจังหวะให้ OS ปล่อย mic ก่อนขอใหม่

      streamRef = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: false,
          autoGainControl: false
        }
      });
      captureSpeechMicrophoneRuntime(streamRef, `direct_get_user_media_track_retry_${retry + 1}`);
      DBG_TRACK(`STREAM retry ${retry + 1}`, streamRef);

      if (!hasLiveAudioTrack(streamRef)) continue;
      micReady = await waitForMicTrackReady(streamRef, 2000);
      DBG('MIC READY?', micReady);
    }

    if (startToken !== audioStartToken) {
      try { streamRef?.getTracks?.().forEach(track => track.stop()); } catch (error) {}
      return;
    }

    if (!streamRef || !hasLiveAudioTrack(streamRef)) {
      throw new Error('Microphone stream is not active');
    }

    // resume ซ้ำหลังได้ stream เผื่อ browser suspend ระหว่าง permission request
    if (audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch (error) {}
    }

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.2;

    source = audioCtx.createMediaStreamSource(streamRef);
    source.connect(analyser);
    DBG('PIPELINE READY', `audioCtx=${audioCtx.state} → เริ่ม calibration`);

    // เริ่มนับเวลาเฝ้าดู stream เงียบ (iOS dead-mic detection)
    pipelineReadyMs = performance.now();
    sawRealSignal   = false;

    calibStartMs = performance.now();
    runLoop();
  } catch (err) {
    DBG('❌ START ERROR', err.name, err.message);
    if (startToken !== audioStartToken) return;
    await stopAll(true);
    if (startToken !== audioStartToken) return;

    if (err?.permissionResult) {
      captureSpeechPermissionRuntime(err.permissionResult, 'fast_permissions_request');
    }
    const reasonCode = mapMicErrorReason(err);
    finishSpeechInvalid(reasonCode, {
      message: err?.message || String(err),
      errorName: err?.name || null,
      attemptNo: speechAttemptNo
    });

    // Permission recovery is a new module-level test_attempt. The technical
    // invalid payload above remains in fast_speech_research_history.
    if (!forceDirectMic) {
      const permLang = sessionStorage.getItem('fast_lang') || 'th';
      if (window.FastPermissions && typeof FastPermissions.requestWithUI === 'function') {
        try {
          FastPermissions.requestWithUI(
            'mic',
            permLang,
            async (stream, result) => {
              if (!hasLiveAudioTrack(stream)) return;
              stream.getTracks().forEach(track => track.stop());
              retryStarting = true;
              try {
                phase = 'IDLE';
                resetUI();
                prepareSpeechModuleAttempt('permission_recovery');
                captureSpeechPermissionRuntime(result, 'fast_permissions_ui');
                await startRecording(true);
              } finally {
                retryStarting = false;
                if ($('action-btn')) $('action-btn').disabled = false;
              }
            },
            (result) => captureSpeechPermissionRuntime(result, 'fast_permissions_ui')
          );
        } catch (uiError) {
          console.warn('Unable to show microphone permission recovery UI', uiError);
        }
      }
    }

    return;
  }

  // Speech Recognition จะเริ่มหลังจบ calibration เท่านั้น
}

async function beginSpeechRecognition() {
  // รอให้ recognition เก่าหยุดและ disconnect จริงก่อนสร้าง session ใหม่
  await resetRecognitionEngine();
  if (phase !== 'RECORDING') return;

  const runId = ++recognitionRunId;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recognition = new SR();
    recognition.lang            = T.langCode;
    recognition.continuous      = true;   // ให้รอระหว่างคนไข้เว้นคำ ไม่ชิงจบเร็ว
    recognition.interimResults  = true;
    recognition.maxAlternatives = 5;
    DBG('ASR created', `lang=${T.langCode}`);

    // ═══ DEBUG: event ที่บอกว่า ASR "ได้ยิน" อะไรบ้าง ═══
    recognition.onstart = () => {
      DBG('ASR onstart', 'engine เริ่มทำงานแล้ว');
      appendAsrObservation('start');
    };
    recognition.onaudiostart = () => {
      DBG('ASR onaudiostart', '🎤 engine เริ่มรับ audio แล้ว');
      appendAsrObservation('audio_start');
    };
    recognition.onaudioend = () => {
      DBG('ASR onaudioend', 'engine หยุดรับ audio');
      appendAsrObservation('audio_end');
    };
    recognition.onsoundstart = () => {
      DBG('ASR onsoundstart', '🔉 ตรวจพบเสียง');
      appendAsrObservation('sound_start');
    };
    recognition.onspeechstart = () => {
      DBG('ASR onspeechstart', '🗣️ ตรวจพบเสียงพูด');
      appendAsrObservation('speech_start');
    };
    recognition.onspeechend = () => {
      DBG('ASR onspeechend');
      appendAsrObservation('speech_end');
    };

    let gotResult = false;
    let bestTranscript = '';
    let bestConfidence = 0;
    const recognitionSegments = new Map();

    const isCurrentRun = () => runId === recognitionRunId && phase === 'RECORDING';

    const finishWith = (text, conf) => {
      if (!isCurrentRun()) return;
      clearRecognitionTimers();
      if (phase !== 'DONE') {
        speechEndMs = getLastSpeechSegmentEnd();
        evaluateSpeech(text, conf);
      }
    };

    recognition.onresult = (e) => {
      DBG('ASR onresult', `results=${e.results.length}`);
      if (!isCurrentRun()) return;
      gotResult = true;
      speechEndMs = getLastSpeechSegmentEnd();

      const startIndex = Number.isInteger(e.resultIndex) ? e.resultIndex : 0;
      for (let i = startIndex; i < e.results.length; i++) {
        const res = e.results[i];
        let chosenText = '';
        let chosenConfidence = null;

        for (let j = 0; j < res.length; j++) {
          const alt = res[j];
          const tx = (alt.transcript || '').trim();
          if (!tx) continue;
          const reported = Number.isFinite(alt.confidence) && alt.confidence > 0
            ? alt.confidence
            : null;
          if (!chosenText || (reported !== null && (chosenConfidence === null || reported > chosenConfidence))) {
            chosenText = tx;
            chosenConfidence = reported;
          }
        }

        if (chosenText) {
          recognitionSegments.set(i, {
            text: chosenText,
            confidence: chosenConfidence,
            isFinal: !!res.isFinal
          });
        }
      }

      const ordered = [...recognitionSegments.entries()]
        .sort((a, b) => a[0] - b[0])
        .map(([, value]) => value);
      bestTranscript = ordered.map(item => item.text).join(' ').trim();
      const reportedConfidences = ordered
        .map(item => item.confidence)
        .filter(value => Number.isFinite(value));
      confidenceWasImputed = reportedConfidences.length === 0;
      bestConfidence = reportedConfidences.length
        ? reportedConfidences.reduce((a, b) => a + b, 0) / reportedConfidences.length
        : 0.75; // legacy scoring fallback, explicitly recorded as imputed

      if (bestTranscript) {
        $('transcript-box').textContent = `"${bestTranscript}"`;
      }

      const hasFinal = ordered.some(item => item.isFinal);
      appendAsrObservation('result', {
        resultIndex: startIndex,
        transcript: bestTranscript,
        confidenceReported: confidenceWasImputed ? null : roundSpeechMetric(bestConfidence, 5),
        hasFinal,
        segments: ordered.map(item => ({
          text: item.text,
          confidenceReported: Number.isFinite(item.confidence) ? roundSpeechMetric(item.confidence, 5) : null,
          isFinal: item.isFinal
        }))
      });
      if (recognitionFinalTimer) clearTimeout(recognitionFinalTimer);
      recognitionFinalTimer = setTimeout(() => {
        if (isCurrentRun() && bestTranscript) finishWith(bestTranscript, bestConfidence);
      }, hasFinal ? 450 : 1400);
    };

    recognition.onerror = (e) => {
      lastAsrErrorCode = e.error || 'unknown';
      appendAsrObservation('error', { errorCode: lastAsrErrorCode, gotResult });
      DBG('ASR ❌ onerror', `error="${e.error}" gotResult=${gotResult} isCurrentRun=${isCurrentRun()}`);
      if (!isCurrentRun()) return;

      // Give VAD time to distinguish no voice from voice that ASR could not
      // transcribe. Low SNR does not force a retry or invalidate the result.
      if (!gotResult) {
        if (recognitionSafetyTimer) clearTimeout(recognitionSafetyTimer);
        recognitionSafetyTimer = setTimeout(() => {
          if (isCurrentRun() && !bestTranscript) finishWith('', 0);
        }, 6000);
      }
    };

    recognition.onend = () => {
      appendAsrObservation('end', { transcript: bestTranscript || '' });
      DBG('ASR onend', `bestTranscript="${bestTranscript}" isCurrentRun=${isCurrentRun()}`);
      if (!isCurrentRun()) return;

      // Chrome/iOS ชอบ onend เอง: ถ้ายังไม่จับคำแต่ยังอยู่ RECORDING ให้ restart
      if (!bestTranscript) {
        DBG('ASR restart', 'ยังไม่มี transcript → start ใหม่');
        startRecognitionSafely(0);
        return;
      }
      finishWith(bestTranscript, bestConfidence || 0.75);
    };

    function startRecognitionSafely(attempt) {
      if (!isCurrentRun() || !recognition) return;
      try {
        recognition.start();
        recognitionStarted = true;
        DBG('ASR start() OK', `attempt=${attempt}`);
        return;
      } catch(e) {
        DBG('ASR ❌ start() FAILED', `attempt=${attempt} ${e.name}: ${e.message}`);
        // รอบสองมักเจอ InvalidStateError เพราะ engine รอบก่อนยังปิดไม่สนิท
        // จึงต้อง retry สั้น ๆ แทนที่จะ catch เงียบแล้วปล่อยให้ ASR ไม่ทำงาน
        recognitionStarted = false;
        if (attempt < 4) {
          setTimeout(() => startRecognitionSafely(attempt + 1), 250);
        } else {
          if (isCurrentRun()) {
            $('transcript-box').textContent = T.listening + ' (ASR retry failed; using voice detection)';
          }
        }
      }
    }

    startRecognitionSafely(0);

    // กันกรณี engine ไม่คืน event เลย: ให้จบหลัง 8 วิ แต่ใช้ VAD duration ได้
    recognitionSafetyTimer = setTimeout(() => {
      if (isCurrentRun()) finishWith(bestTranscript || '', bestConfidence || 0);
    }, RECOGNITION_SAFETY_MS);
  } else {
    appendAsrObservation('unavailable');
    recognitionSafetyTimer = setTimeout(() => {
      if (phase !== 'DONE') {
        speechEndMs = getLastSpeechSegmentEnd();
        evaluateSpeech('__no_api__', 1.0);
      }
    }, RECOGNITION_SAFETY_MS);
  }
}

// ═══ iOS KEEP-ALIVE MODE ═══
// iOS: การปิด stream+AudioContext ขณะที่ SpeechRecognition เพิ่งใช้ audio session ร่วมกัน
// ทำให้ session ทั้งก้อน corrupt → getUserMedia รอบถัดไปได้ stream เงียบตายทุกครั้ง
// จนกว่า iOS จะ reset เอง (~1 นาที) → ทางแก้: บน iOS "ไม่ปล่อยไมค์เลย"
// เปิดครั้งเดียวใช้ซ้ำทุกรอบ ปิดเฉพาะ ASR ระหว่างรอบ
const IS_IOS = /iPhone|iPad|iPod/.test(navigator.userAgent) ||
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const KEEP_MIC_ALIVE = IS_IOS && (SPEECH_CFG.keepMicAliveOnIOS ?? true);

async function releaseCurrentAudioResources(fullRelease = !KEEP_MIC_ALIVE) {
  const hadResources = !!(
    recognition || recognitionStarted || source || streamRef || audioCtx || analyser || animationFrameId
  );
  DBG('CLEANUP begin', `full=${fullRelease} hadResources=${hadResources} audioCtx=${audioCtx?.state || 'null'}`);

  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }

  // เริ่มปิด ASR ก่อน และรอ end ซึ่งหมายถึงบริการ disconnect แล้ว
  const recognitionClose = shutdownRecognition();

  // ═══ KEEP-ALIVE: ปิดแค่ ASR — คง stream/AudioContext/analyser ไว้ใช้รอบถัดไป ═══
  if (!fullRelease) {
    await recognitionClose;
    await sleep(150); // เว้นจังหวะสั้น ๆ ให้ speech service ปล่อย session
    DBG('CLEANUP done (keep-alive)', `mic ยังเปิดค้างไว้ audioCtx=${audioCtx?.state || 'null'}`);
    return;
  }

  const oldSource = source;
  source = null;
  if (oldSource) {
    try { oldSource.disconnect(); } catch (error) {}
  }

  const oldStream = streamRef;
  streamRef = null;
  if (oldStream) {
    oldStream.getTracks().forEach(track => {
      try { track.stop(); } catch (error) {}
    });
  }

  const oldAudioCtx = audioCtx;
  audioCtx = null;
  analyser = null;

  let audioClose = Promise.resolve();
  if (oldAudioCtx && oldAudioCtx.state !== 'closed') {
    try {
      // close() คืน Promise ที่ resolve เมื่อ resource ที่ขวาง AudioContext ใหม่ถูกปล่อยแล้ว
      audioClose = Promise.race([
        oldAudioCtx.close(),
        sleep(2500)   // FIX: เพิ่มจาก 1500 → 2500ms บางเครื่องปิดช้า
      ]);
    } catch (error) {}
  }

  await Promise.allSettled([recognitionClose, audioClose]);

  // FIX: เพิ่มจาก 350 → 1000ms ให้ OS สลับ audio session เสร็จจริงก่อนรอบใหม่
  if (hadResources) await sleep(1000);
}

function stopAll(fullRelease) {
  cleanupPromise = cleanupPromise
    .catch(() => {})
    .then(() => releaseCurrentAudioResources(fullRelease));

  return cleanupPromise;
}

// ปล่อยไมค์จริงเมื่อออกจากหน้า (keep-alive ค้างไว้เฉพาะระหว่างอยู่ในหน้าทดสอบ)
window.addEventListener('pagehide', () => {
  audioStartToken++;
  clearResultReleaseTimer();
  try { streamRef?.getTracks().forEach(t => t.stop()); } catch (e) {}
  try { if (audioCtx && audioCtx.state !== 'closed') audioCtx.close(); } catch (e) {}
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden && phase === 'RECORDING') {
    audioStartToken++;
    finishSpeechInvalid('PAGE_HIDDEN', {
      durationSec: speechStartMs && lastVoiceMs ? (lastVoiceMs - speechStartMs) / 1000 : 0,
      energyFrames: vowelEnergyBuf.length
    });
  }
});

// ═══════════════════════════════════════════════════
// REAL-TIME ENGINE LOOP
// ═══════════════════════════════════════════════════
function runLoop() {
  if ((phase !== 'CALIBRATING' && phase !== 'RECORDING') || !analyser) return;

  const N       = analyser.frequencyBinCount;
  const freqArr = new Uint8Array(N);
  analyser.getByteFrequencyData(freqArr);

  // Time-domain deviation detects whether the hardware pipeline is producing
  // real samples. This remains non-zero in a quiet room, while a dead/stale
  // iOS stream returns digital silence (all values exactly 128).
  const timeArr = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(timeArr);
  let timeDeviationSum = 0;
  for (let i = 0; i < timeArr.length; i++) {
    timeDeviationSum += Math.abs(timeArr[i] - 128) / 128;
  }
  const micSignalEnergy = timeDeviationSum / timeArr.length;

  const sr     = audioCtx.sampleRate;
  const binHz  = sr / analyser.fftSize;
  const loIdx  = Math.round(300  / binHz);
  const hiIdx  = Math.round(2000 / binHz);

  // สกัดพลังงานย่านความถี่เสียงพูดมนุษย์ (300–2000Hz)
  let eSum = 0;
  for (let i = loIdx; i <= hiIdx; i++) eSum += freqArr[i];
  const vEnergy = eSum / ((hiIdx - loIdx + 1) * 255);

  // ── Spectral Flatness: แยกเสียงพูดจากเสียงรบกวน ──
  // เสียงพูด = มี formant peak ชัด → flatness ต่ำ (~0.1-0.4)
  // เสียงพัดลม/ทีวี/แอร์ = กระจายแบนราบ → flatness สูง (~0.5-1.0)
  // flatness = geometric mean / arithmetic mean ของ power ในย่าน vowel
  let logSum = 0, arithSum = 0, nBins = 0;
  for (let i = loIdx; i <= hiIdx; i++) {
    const p = freqArr[i] + 1; // +1 กัน log(0)
    logSum   += Math.log(p);
    arithSum += p;
    nBins++;
  }
  const geoMean   = Math.exp(logSum / nBins);
  const arithMean = arithSum / nBins;
  const flatness  = arithMean > 0 ? geoMean / arithMean : 1;

  const nowMs = performance.now();

  // ═══ iOS DEAD-MIC DETECTION ═══
  if (micSignalEnergy > DEAD_MIC_ENERGY_MIN) {
    if (!sawRealSignal) {
      sawRealSignal = true;
      deadMicAttempt = 0; // ไมค์ฟื้นแล้ว reset ตัวนับกู้คืน
      DBG('✅ MIC ALIVE', `time-domain signal=${micSignalEnergy.toFixed(8)} after ${((nowMs - pipelineReadyMs)/1000).toFixed(2)}s`);
    }
  } else if (!sawRealSignal && pipelineReadyMs && (nowMs - pipelineReadyMs) > DEAD_MIC_SILENCE_MS) {
    // เงียบสนิท (ศูนย์ล้วน) เกิน 2 วิหลัง pipeline พร้อม = iOS คืน stream ตาย
    recoverDeadMic();
    return; // หยุด loop รอบนี้ ให้ recovery จัดการต่อ
  }

  // ═══ DEBUG: log พลังงานไมค์ทุก ~1 วินาที เพื่อดูว่าไมค์มีสัญญาณจริง ═══
  window.__dbgFrameCount = (window.__dbgFrameCount || 0) + 1;
  if (window.__dbgFrameCount % 60 === 0) {
    DBG('VAD', `phase=${phase} vEnergy=${vEnergy.toFixed(5)} micSignal=${micSignalEnergy.toFixed(8)} ${micSignalEnergy <= DEAD_MIC_ENERGY_MIN ? '⚠️ digital silence' : '✓ pipeline alive'}`);
  }

  // ── PHASE 1: Noise Calibration ─────────────────────
  if (phase === 'CALIBRATING') {
    // iOS: ระหว่างไมค์ยังเงียบสนิท (ยังไม่ฟื้น) อย่าเพิ่งนับ calibration
    // ไม่งั้น noiseFloor จะถูกวัดจากความเงียบปลอม = 0 → dynThreshold เพี้ยนทั้งรอบ
    if (!sawRealSignal) {
      noiseFrames.length = 0;
      calibStartMs = nowMs;
    }
    noiseFrames.push(vEnergy);
    recordSpeechResearchFrame({
      speechBandEnergy: roundSpeechMetric(vEnergy, 6),
      micSignalEnergy: roundSpeechMetric(micSignalEnergy, 8),
      spectralFlatness: roundSpeechMetric(flatness, 4),
      noiseFloor: null,
      dynamicThreshold: null,
      isLoud: false,
      isTonal: false,
      isVoice: false
    });
    const elapsed = nowMs - calibStartMs;

    $('debug-box').innerHTML = `calibrating noise... ${Math.round(elapsed)}ms<br>vEnergy: ${vEnergy.toFixed(5)}`;

    if (elapsed >= CALIBRATION_MS) {
      const avg = noiseFrames.reduce((a,b)=>a+b,0) / noiseFrames.length;
      const std = Math.sqrt(noiseFrames.reduce((a,b)=>a+(b-avg)**2,0) / noiseFrames.length);
      
      noiseFloor   = Math.min(avg + std, NOISE_FLOOR_CAP);
      dynThreshold = noiseFloor * NOISE_MULTIPLIER;

      // ไม่เตือนเสียงรบกวนก่อนพูด เพราะยังไม่มี signal ของเสียงพูดจริงให้เทียบ SNR
      phase = 'RECORDING';
      $('mic-circle').className       = 'mic-circle recording';
      $('mic-icon').textContent       = '👄';
      $('action-btn').textContent     = T.btnStop || '⏹ หยุด';
      $('action-btn').className       = 'red';
      $('action-btn').disabled        = false;
      $('transcript-box').textContent = T.listening || '... กำลังฟัง ...';
      try { navigator.vibrate?.(60); } catch (error) {}
      // ติดธงว่าวัดในที่มี noise (สำหรับติดป้ายผลลัพธ์)
      window.MEASURED_NOISY = false;
      void beginSpeechRecognition();
    }

    drawWave(freqArr, N);
    animationFrameId = requestAnimationFrame(runLoop);
    return;
  }

  // ── PHASE 2: Recording & Stream Tracking ───────────
  // isVoice ใช้ energy เป็นหลัก (จับเสียงพูดให้ได้แน่นอน)
  // flatness ใช้แยกว่า frame นี้เป็น "เสียงพูดจริง" (tonal) หรือ "noise" (flat)
  // FLATNESS_MAX is versioned in config (currently 0.78); it is not changed by this data-instrumentation update.
  const isLoud  = vEnergy > dynThreshold;
  const isToner = flatness < FLATNESS_MAX;
  const isVoice = isLoud; // เริ่ม/จับเสียงด้วย energy

  recordSpeechResearchFrame({
    speechBandEnergy: roundSpeechMetric(vEnergy, 6),
    micSignalEnergy: roundSpeechMetric(micSignalEnergy, 8),
    spectralFlatness: roundSpeechMetric(flatness, 4),
    noiseFloor: roundSpeechMetric(noiseFloor, 6),
    dynamicThreshold: roundSpeechMetric(dynThreshold, 6),
    isLoud,
    isTonal: isToner,
    isVoice
  });

  // diagnostic: เก็บช่วง flatness ตอนเสียงดัง (เพื่อดูว่าเสียงพูด flatness เท่าไหร่)
  if (isLoud) {
    loudCount++;
    if (flatness < flatMin) flatMin = flatness;
    if (flatness > flatMax) flatMax = flatness;
    if (isToner) tonerCount++;
  }

  if (isVoice) {
    if (!speechStartMs) speechStartMs = nowMs;
    lastVoiceMs = nowMs;
    vowelEnergyBuf.push(vEnergy);
    if (vowelEnergyBuf.length > 500) vowelEnergyBuf.shift();

    // voiceHistory เก็บเฉพาะ frame ที่เป็นเสียงพูดจริง (tonal)
    // → getLastSpeechSegmentEnd จะหาจุดจบจากเสียงพูดจริง ไม่ใช่ noise
    if (isToner) {
      voiceHistory.push({ time: nowMs, energy: vEnergy });
    }
  }

  // ล้างข้อมูลประวัติเสียงที่เก่ากว่า 5 วินาทีทิ้งไป เพื่อป้องกันเมมโมรี่บวม
  while (voiceHistory.length && (nowMs - voiceHistory[0].time > 5000)) {
    voiceHistory.shift();
  }

  // แสดงพรีวิวสดแบบ Real-time บนบาร์กราฟหน้าจอ
  const previewEnd = lastVoiceMs ? lastVoiceMs : nowMs;
  const durSec = speechStartMs ? (previewEnd - speechStartMs) / 1000 : 0;
  if (durSec > 0.3) {
    const rate = T.syllables / durSec;
    setBar('rate', rateToScore(rate), `${rate.toFixed(1)} ${rateUnitLabel()}`);
  }
  if (vowelEnergyBuf.length > 10) {
    const s = calcStab(vowelEnergyBuf);
    setBar('stab', s, `${s}%`);
  }

  // แสดงผลค่าดิบในช่องดีบั๊กพจนานุกรม
  const ratio = noiseFloor > 0 ? (vEnergy / noiseFloor) : 0;
  const liveSpeechEnergy = calcSpeechEnergy(vowelEnergyBuf);
  const liveSnrDb = calcSnrDb(liveSpeechEnergy, noiseFloor);
  $('debug-box').innerHTML =
    `noiseFloor:&nbsp;&nbsp; ${noiseFloor.toFixed(5)}<br>` +
    `speechEnergy: ${liveSpeechEnergy.toFixed(5)}<br>` +
    `SNR:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${liveSnrDb !== null ? liveSnrDb.toFixed(1) + ' dB' : '—'}<br>` +
    `dynThreshold: ${dynThreshold.toFixed(5)}<br>` +
    `vEnergy:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${vEnergy.toFixed(5)}<br>` +
    `flatness:&nbsp;&nbsp;&nbsp; ${flatness.toFixed(3)} ${isToner ? '(tone✓)' : '(noise✗)'}<br>` +
    `→ state:&nbsp;&nbsp;&nbsp; ${isVoice ? '🔊 VOICE' : (isLoud ? '🔇 noise' : '🔇 silent')}<br>` +
    `dur (live):&nbsp;&nbsp; ${durSec.toFixed(2)}s<br>` +
    `energyFrames: ${vowelEnergyBuf.length} | hist: ${voiceHistory.length}`;

  drawWave(freqArr, N);
  animationFrameId = requestAnimationFrame(runLoop);
}

// ═══════════════════════════════════════════════════
// ALGORITHM: TRAILING SILENCE DETECTION
// ═══════════════════════════════════════════════════
function getLastSpeechSegmentEnd() {
  if (voiceHistory.length === 0) return lastVoiceMs || performance.now();

  // Allow brief pauses between words; value is versioned in config.
  const GAP_MS = TRAILING_GAP_MS;

  // วิ่งจากท้าย→หน้า: หา gap แรกที่เจอแล้ว return ทันที
  // แก้ overwrite bug — ambient noise ช่วงท้ายจะไม่ทับค่าที่ถูกต้อง
  // ตัวอย่าง: [พูด][พูด][เงียบ800ms][เคาะโต๊ะ]
  //   → วิ่งจากท้าย เจอ gap ที่ [เงียบ800ms] → return timestamp [พูด] ทันที
  //   → [เคาะโต๊ะ] ถูกตัดทิ้งโดยอัตโนมัติ
  for (let i = voiceHistory.length - 1; i > 0; i--) {
    const gap = voiceHistory[i].time - voiceHistory[i - 1].time;
    if (gap > GAP_MS) {
      return voiceHistory[i - 1].time;
    }
  }

  // ไม่พบ gap เลย = พูดต่อเนื่องตลอด → end คือ frame สุดท้าย
  return voiceHistory[voiceHistory.length - 1].time;
}

// ═══════════════════════════════════════════════════
// MATH CALCULATIONS
// ═══════════════════════════════════════════════════
function rateToScore(rate) {
  if (rate <= 0) return 0;

  if (rate >= NORMAL_MIN && rate <= NORMAL_MAX) {
    return 100;
  }

  if (rate < NORMAL_MIN) {
    return Math.round((rate / NORMAL_MIN) * 100);
  }

  // พูดเร็วไม่ใช่สัญญาณหลักของ dysarthria
  // จึงลดคะแนนเพียงเล็กน้อย และไม่ต่ำกว่า 80
  return Math.round(
    Math.max(80, 100 - (rate - NORMAL_MAX) * 5)
  );
}

function calcStab(buf) {
  if (buf.length < 10) return 50;
  const avg = buf.reduce((a,b)=>a+b,0) / buf.length;
  if (avg === 0) return 0;
  const std = Math.sqrt(buf.reduce((a,b)=>a+(b-avg)**2,0) / buf.length);
  const cv  = std / avg;
  return Math.round(Math.max(0, Math.min(1, 1 - (cv - 0.3) / 1.2)) * 100);
}

function calcSpeechEnergy(buf) {
  // ใช้ค่าเฉลี่ยของ top 20% เพื่อลดผลจากช่วงเบา/เว้นคำ แต่ไม่ใช้ peak เดี่ยวที่อาจเป็น noise spike
  if (!buf || buf.length === 0) return 0;
  const sorted = [...buf].sort((a,b)=>b-a);
  const n = Math.max(1, Math.ceil(sorted.length * 0.20));
  return sorted.slice(0, n).reduce((a,b)=>a+b,0) / n;
}

function calcSnrDb(speechEnergy, noiseEnergy) {
  const eps = 0.0001;
  if (!speechEnergy || !noiseEnergy) return null;
  return 20 * Math.log10(Math.max(speechEnergy, eps) / Math.max(noiseEnergy, eps));
}

function drawWave(freqArr, N) {
  const ctx = $('freq-canvas').getContext('2d');
  ctx.clearRect(0, 0, 120, 120);
  ctx.strokeStyle = phase === 'CALIBRATING' ? 'rgba(245,158,11,0.5)' : 'rgba(59,130,246,0.6)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let i = 0; i < N; i += 3) {
    const angle  = (i / N) * Math.PI * 2;
    const offset = (freqArr[i] / 255) * 14;
    const x = 60 + (50 + offset) * Math.cos(angle);
    const y = 60 + (50 + offset) * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
}

// ═══════════════════════════════════════════════════
// METRICS EVALUATION
// ═══════════════════════════════════════════════════
function normalizeSpeechText(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[’']/g, '')
    .replace(/[.,!?。、「」"\s]/g, '')
    .replace(/良い/g, 'いい')
    .replace(/よい/g, 'いい')
    .replace(/綺麗/g, 'きれい')
    .replace(/きょう/g, '今日');
}

function levenshteinDistance(a, b) {
  const left = Array.from(a || '');
  const right = Array.from(b || '');
  const prev = Array.from({ length: right.length + 1 }, (_, i) => i);
  const curr = new Array(right.length + 1);

  for (let i = 1; i <= left.length; i++) {
    curr[0] = i;
    for (let j = 1; j <= right.length; j++) {
      const cost = left[i - 1] === right[j - 1] ? 0 : 1;
      curr[j] = Math.min(curr[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
    }
    for (let j = 0; j <= right.length; j++) prev[j] = curr[j];
  }
  return prev[right.length];
}

function speechTextSimilarity(text, variants) {
  if (!text) return 0;
  let best = 0;
  for (const variant of variants) {
    const maxLen = Math.max(Array.from(text).length, Array.from(variant).length, 1);
    best = Math.max(best, 1 - levenshteinDistance(text, variant) / maxLen);
  }
  return Math.max(0, Math.min(1, best));
}

function currentSpeechVersions() {
  return {
    appVersion: window.QS_CONFIG?.version || null,
    moduleVersion: SPEECH_VERSION,
    algorithmVersion: SPEECH_ALGORITHM_VERSION,

  };

    score: validityStatus === 'valid' ? clinicalScore : null,

    },

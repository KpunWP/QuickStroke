function invalidReasonMessage(reasonCode) {
  const map = {
    NO_VOICE: T.noVoice,
    VOICE_NOT_RECOGNIZED: T.voiceButNoText,
    USER_STOPPED_EARLY: T.manualStop,
    SPEECH_RECOGNITION_UNAVAILABLE: T.speechApiUnavailable,
    INSUFFICIENT_SPEECH_DURATION: T.insufficientData,
    INSUFFICIENT_ENERGY_FRAMES: T.insufficientData,
    MICROPHONE_PERMISSION_DENIED: T.micAccessError,
    MICROPHONE_NOT_FOUND: T.micAccessError,
    MICROPHONE_NOT_AVAILABLE: T.micAccessError,
    MICROPHONE_IN_USE: T.micAccessError,
    MICROPHONE_STREAM_FAILED: T.micAccessError,
    INSECURE_CONTEXT: T.micAccessError,
    I18N_LOAD_FAILED: T.micAccessError,
    WEB_AUDIO_UNAVAILABLE: T.micAccessError,
    MICROPHONE_START_FAILED: T.micAccessError,
    DEAD_MIC_RECOVERY_FAILED: T.deadMicFailed,
    PAGE_HIDDEN: T.subInvalid
  };
  return map[reasonCode] || T.subInvalid;
}

function appendSpeechAttempt(outcome, details = {}) {
  const qualityFlags = Array.isArray(details.qualityFlags)
    ? [...new Set(details.qualityFlags)]
    : currentSpeechQualityFlags({ confidenceImputed: details.confidenceImputed });
  const rawObservations = details.rawObservations || speechRawObservations({
    transcript: details.transcript || '',
    reportedConfidence: details.reportedConfidence,
    asrErrorCode: details.asrErrorCode || lastAsrErrorCode
  });
  const derivedMetrics = details.derivedMetrics || speechDerivedMetrics({
    durationSec: details.durationSec,
    normalizedTranscript: details.normalizedTranscript,
    acceptedVariantMatched: details.acceptedVariantMatched,
    textSimilarityShadow: details.textSimilarityShadow,
    confidenceUsedForScoring: details.confidenceUsedForScoring,
    confidenceImputed: details.confidenceImputed,
    speechUnitsPerSec: details.speechUnitsPerSec,
    rateUnit: details.rateUnit,
    wordScore: details.wordScore,
    rateScore: details.rateScore,
    stabilityScore: details.stabilityScore,
    totalSpeechScore: details.totalSpeechScore
  });
  const completedAtMs = Date.now();
  const activeAttemptNo = Math.max(1, speechAttemptNo);
  const record = {
    attemptNo: activeAttemptNo,
    startedAt: currentAttemptStartedAt || (speechModuleStartedAtMs ? new Date(speechModuleStartedAtMs).toISOString() : null),
    completedAt: new Date(completedAtMs).toISOString(),
    durationMs: currentAttemptStartedAtMs ? completedAtMs - currentAttemptStartedAtMs : null,
    outcome,
    invalidReasonCode: details.invalidReasonCode || null,
    clinicalResult: details.clinicalResult || null,
    clinicalScore: Number.isFinite(details.clinicalScore) ? details.clinicalScore : null,
    qualityFlags,
    rawObservations,
    derivedMetrics
  };
  if (details.message) record.message = details.message;
  if (details.errorName) record.errorName = details.errorName;
  speechAttemptHistory.push(record);
  return record;
}

function scheduleAutomaticValidityRetry(reasonCode, details = {}) {
  const retryable = reasonCode === 'NO_VOICE' || reasonCode === 'VOICE_NOT_RECOGNIZED';
  if (!retryable || automaticValidityRetries >= AUTO_VALIDITY_RETRY_COUNT) return false;

  appendSpeechAttempt('invalid_retry', { invalidReasonCode: reasonCode, ...details });
  automaticValidityRetries++;
  phase = 'RETRYING';
  recognitionRunId++;
  clearRecognitionTimers();

  $('mic-circle').className = 'mic-circle calibrating';
  $('mic-icon').textContent = '🔄';
  $('action-btn').disabled = true;
  $('action-btn').className = '';
  $('action-btn').textContent = T.calibrating;
  $('transcript-box').style.display = 'block';
  $('transcript-box').textContent = reasonCode === 'NO_VOICE'
    ? T.retryingNoVoice
    : T.retryingNoText;
  setSpeechCard('word', 'warn', T.accuracy, T.pending, '🔄');
  setSpeechCard('rate', '', T.rate, T.pending, '⏱️');

  stopAll(KEEP_MIC_ALIVE ? false : true).finally(() => {
    setTimeout(() => {
      if (phase !== 'RETRYING') return;
      phase = 'IDLE';
      startRecording(true);
    }, AUTO_VALIDITY_RETRY_DELAY_MS);
  });
  return true;
}

function finishSpeechInvalid(reasonCode, details = {}) {
  recognitionRunId++;
  clearRecognitionTimers();
  phase = 'DONE';
  if ($('test-screen')) $('test-screen').classList.add('done');
  setTimeout(updateDevLogTools, 0);

  const activeAttemptNo = Math.max(1, speechAttemptNo);
  const alreadyRecorded = speechAttemptHistory.some(item =>
    item.attemptNo === activeAttemptNo && item.outcome === 'invalid'
  );
  if (!alreadyRecorded) {
    appendSpeechAttempt('invalid', { invalidReasonCode: reasonCode, ...details });
  }

  $('mic-circle').className = 'mic-circle';
  $('mic-icon').textContent = '⚠️';
  $('action-btn').disabled = false;
  $('action-btn').textContent = T.btnRetry;
  $('action-btn').className = '';
  $('metrics-box').style.display = 'flex';
  $('transcript-box').style.display = 'block';
  $('transcript-box').textContent = `[${invalidReasonMessage(reasonCode)}]`;

  ['word', 'rate', 'stab'].forEach(key => {
    $('bar-' + key).style.width = '0%';
    $('bar-' + key).style.background = 'var(--muted2)';
    $('val-' + key).textContent = '—';
    const scoreEl = $('score-' + key);
    if (scoreEl) scoreEl.textContent = '';
  });
  setSpeechCard('word', 'warn', T.accuracy, T.resultInvalid, '⚠️');
  setSpeechCard('rate', 'warn', T.rate, T.resultInvalid, '⚠️');

  const rb = $('result-banner');
  rb.className = 'result-banner warn';
  rb.style.display = 'flex';
  $('rb-title').textContent = T.resultInvalid;
  $('rb-title').style.color = 'var(--amber)';
  $('rb-score').textContent = '—';
  $('rb-score').style.color = 'var(--amber)';
  $('rb-sub').textContent = `${T.subInvalid} · ${invalidReasonMessage(reasonCode)}`;

  const finalAttemptRecord = speechAttemptHistory
    .slice()
    .reverse()
    .find(item => item.attemptNo === activeAttemptNo && item.outcome === 'invalid');
  const qualityFlags = finalAttemptRecord?.qualityFlags || currentSpeechQualityFlags();
  const rawObservations = finalAttemptRecord?.rawObservations || speechRawObservations({
    transcript: details.transcript || '',
    asrErrorCode: lastAsrErrorCode
  });
  const derivedMetrics = finalAttemptRecord?.derivedMetrics || speechDerivedMetrics({
    durationSec: details.durationSec
  });
  const legacyRaw = {
    transcript: details.transcript || '',
    durationSec: details.durationSec ?? null,
    energyFrames: details.energyFrames ?? vowelEnergyBuf.length,
    noiseFloor: derivedMetrics.noiseFloor,
    speechEnergy: derivedMetrics.speechEnergy,
    snrDb: derivedMetrics.snrDb,
    coefficientOfVariation: derivedMetrics.coefficientOfVariation,
    asrErrorCode: lastAsrErrorCode,
    rawAudioStored: false
  };
  const result = makeSpeechResultPayload({
    validityStatus: 'invalid',
    clinicalResult: null,
    clinicalScore: null,
    invalidReasonCode: reasonCode,
    technicalValidity: 'invalid',
    qualityFlags,
    riskLevel: 'invalid',
    passed: false,
    breakdown: {
      reasonCode,
      hasVoice: details.hasVoice ?? null,
      message: details.message || null,
      errorName: details.errorName || null
    },
    rawObservations,
    derivedMetrics,
    legacyRaw,
    measuredNoisy: qualityFlags.includes('LOW_SNR')
  });

  persistSpeechPayload(result);
  handleFastFlow('invalid');
  const mustReleaseImmediately = [
    'PAGE_HIDDEN',
    'MICROPHONE_PERMISSION_DENIED',
    'MICROPHONE_NOT_FOUND',
    'MICROPHONE_NOT_AVAILABLE',
    'MICROPHONE_IN_USE',
    'MICROPHONE_STREAM_FAILED',
    'MICROPHONE_START_FAILED',
    'WEB_AUDIO_UNAVAILABLE',
    'DEAD_MIC_RECOVERY_FAILED'
  ].includes(reasonCode);
  stopAll(mustReleaseImmediately ? true : (KEEP_MIC_ALIVE ? false : true));
  if (!mustReleaseImmediately) scheduleResultMicRelease();
}

function evaluateSpeech(text, confidence) {
  const normalizedText = normalizeSpeechText(text);
  const normalizedKeywords = (T.keywords || [])
    .map(normalizeSpeechText)
    .filter(Boolean);
  const wordMatched = !!normalizedText && normalizedKeywords.includes(normalizedText);
  const textSimilarityShadow = speechTextSimilarity(normalizedText, normalizedKeywords);

  // VAD and ASR are independent. No transcript does not mean no voice.
  const hasVoice =
    vowelEnergyBuf.length >= MIN_ENERGY_FRAMES ||
    voiceHistory.length >= 3 ||
    (speechStartMs && lastVoiceMs && lastVoiceMs > speechStartMs);
  if (hasVoice && (!speechEndMs || speechEndMs < speechStartMs)) {
    speechEndMs = getLastSpeechSegmentEnd();
  }

  let durSec = 0;
  if (speechStartMs && speechEndMs && speechEndMs >= speechStartMs) {
    durSec = (speechEndMs - speechStartMs) / 1000;
  }

  const isManual = text === '__manual__';
  const noSpeechApi = text === '__no_api__';
  let invalidReasonCode = null;
  if (isManual) invalidReasonCode = 'USER_STOPPED_EARLY';
  else if (noSpeechApi) invalidReasonCode = 'SPEECH_RECOGNITION_UNAVAILABLE';
  else if (!hasVoice) invalidReasonCode = 'NO_VOICE';
  else if (!normalizedText) invalidReasonCode = 'VOICE_NOT_RECOGNIZED';
  else if (durSec < MIN_SPEECH_DURATION_SEC) invalidReasonCode = 'INSUFFICIENT_SPEECH_DURATION';
  else if (vowelEnergyBuf.length < MIN_ENERGY_FRAMES) invalidReasonCode = 'INSUFFICIENT_ENERGY_FRAMES';

  const invalidDetails = {
    transcript: (isManual || noSpeechApi) ? '' : String(text || ''),
    durationSec: durSec,
    energyFrames: vowelEnergyBuf.length,
    hasVoice,
    asrErrorCode: lastAsrErrorCode
  };

  if (invalidReasonCode) {
    if (scheduleAutomaticValidityRetry(invalidReasonCode, invalidDetails)) return;
    finishSpeechInvalid(invalidReasonCode, invalidDetails);
    return;
  }

  recognitionRunId++;
  clearRecognitionTimers();
  phase = 'DONE';
  if ($('test-screen')) $('test-screen').classList.add('done');
  setTimeout(updateDevLogTools, 0);
  $('mic-circle').className = 'mic-circle';
  $('mic-icon').textContent = '📊';
  $('action-btn').textContent = T.btnRetry;
  $('action-btn').className = 'green';

  const usableConfidence = Number.isFinite(confidence) && confidence > 0 ? confidence : 0.75;
  if (!(Number.isFinite(confidence) && confidence > 0)) confidenceWasImputed = true;

  // 1. Word Accuracy (40%) — legacy score formula retained. Matching now
  // requires an exact accepted full/near-full phrase variant; substrings do not pass.
  const wordScore = wordMatched
    ? Math.round(70 + usableConfidence * 30)
    : Math.round(usableConfidence * 30);
  const wordLabel = wordMatched
    ? `✓ ${(usableConfidence * 100).toFixed(0)}%`
    : `✗ ${(usableConfidence * 100).toFixed(0)}%`;
  $('transcript-box').style.display = 'block';
  $('transcript-box').textContent = `"${text}"`;

  // 2. Speech Rate (40%) — legacy scoring retained.
  let rateScore = 0;
  let rateLabel = T.wordMismatch;
  let syllPerSec = 0;
  if (wordMatched) {
    syllPerSec = T.syllables / Math.max(durSec, 0.2);
    rateScore = rateToScore(syllPerSec);
    rateLabel = `${syllPerSec.toFixed(1)} ${rateUnitLabel()}`;
  }

  // 3. Volume Stability (20%). Validity gates above prevent an imputed 50
  // from being used when there are too few frames.
  const stabScore = calcStab(vowelEnergyBuf);
  const stabLabel = `${stabScore}%`;

  // 4. SNR is a quality flag only. It never causes invalid/retry in pre-pilot.
  const speechEnergy = calcSpeechEnergy(vowelEnergyBuf);
  const snrDb = calcSnrDb(speechEnergy, noiseFloor);
  const snrLow = snrDb !== null && snrDb < SNR_WARN_DB;
  window.MEASURED_NOISY = snrLow;

  const speechScore = Math.round(wordScore * 0.40 + rateScore * 0.40 + stabScore * 0.20);
  setBar('word', wordScore, wordLabel);
  setBar('rate', rateScore, rateLabel);
  setBar('stab', stabScore, stabLabel);

  const avg = vowelEnergyBuf.reduce((a, b) => a + b, 0) / vowelEnergyBuf.length;
  const std = Math.sqrt(vowelEnergyBuf.reduce((a, b) => a + (b - avg) ** 2, 0) / vowelEnergyBuf.length);
  const cvValue = avg > 0 ? std / avg : 0;

  let cls, title, sub;
  if (speechScore >= 70) { cls = 'ok'; title = T.resultOk; sub = T.subOk; }
  else if (speechScore >= 45) { cls = 'warn'; title = T.resultWarn; sub = T.subWarn; }
  else { cls = 'bad'; title = T.resultBad; sub = T.subBad; }

  const issues = [];
  if (wordScore < 50) issues.push(T.issueWord);
  if (rateScore < 40) issues.push(`${T.issueSlow} (${syllPerSec.toFixed(1)} ${rateUnitLabel()})`);
  if (stabScore < 40) issues.push(T.issueUnstable);
  if (issues.length) sub = issues.join(' · ');

  const col = { ok: 'var(--green)', warn: 'var(--amber)', bad: 'var(--red)' }[cls];
  const rb = $('result-banner');
  rb.className = 'result-banner ' + cls;
  rb.style.display = 'flex';
  $('rb-title').textContent = title;
  $('rb-title').style.color = col;
  $('rb-score').textContent = speechScore + ' / 100';
  $('rb-score').style.color = col;
  $('rb-sub').textContent = snrLow && snrDb !== null
    ? `${sub} · ${T.noisyTag} (${snrDb.toFixed(1)} dB)`
    : sub;

  const qualityFlags = [];
  if (snrLow) qualityFlags.push('LOW_SNR');
  if (confidenceWasImputed) qualityFlags.push('ASR_CONFIDENCE_IMPUTED');
  if (lastAsrErrorCode) qualityFlags.push(`ASR_ERROR_${String(lastAsrErrorCode).toUpperCase().replace(/[^A-Z0-9]+/g, '_')}`);

  const clinicalResult = cls === 'ok' ? 'normal' : cls === 'warn' ? 'warning' : 'abnormal';
  const reportedConfidence = confidenceWasImputed ? null : confidence;
  const validAttemptRecord = appendSpeechAttempt('valid', {
    clinicalResult,
    clinicalScore: speechScore,
    qualityFlags,
    transcript: String(text || ''),
    reportedConfidence,
    normalizedTranscript: normalizedText,
    acceptedVariantMatched: wordMatched,
    textSimilarityShadow,
    confidenceUsedForScoring: usableConfidence,
    confidenceImputed: confidenceWasImputed,
    speechUnitsPerSec: syllPerSec,
    rateUnit: rateUnitLabel(),
    durationSec: durSec,
    wordScore,
    rateScore,
    stabilityScore: stabScore,
    totalSpeechScore: speechScore
  });

  const legacyRaw = {
    transcript: String(text || ''),
    normalizedTranscript: normalizedText,
    acceptedVariantMatched: wordMatched,
    textSimilarityShadow,
    confidence: usableConfidence,
    confidenceImputed: confidenceWasImputed,
    syllablesPerSec: syllPerSec,
    speechUnitsPerSec: syllPerSec,
    rateUnit: rateUnitLabel(),
    durationSec: durSec,
    noiseFloor,
    speechEnergy,
    snrDb,
    energyFrames: vowelEnergyBuf.length,
    coefficientOfVariation: cvValue,
    asrErrorCode: lastAsrErrorCode,
    rawAudioStored: false
  };
  const result = makeSpeechResultPayload({
    validityStatus: 'valid',
    clinicalResult,
    clinicalScore: speechScore,
    invalidReasonCode: null,
    technicalValidity: qualityFlags.length ? 'degraded' : 'full',
    qualityFlags,
    riskLevel: cls,
    passed: cls === 'ok',
    breakdown: { wordScore, rateScore, stabScore },
    rawObservations: validAttemptRecord.rawObservations,
    derivedMetrics: validAttemptRecord.derivedMetrics,
    legacyRaw,
    measuredNoisy: snrLow
  });

  persistSpeechPayload(result);
  handleFastFlow(cls);

  $('debug-box').style.display = 'none';
  $('debug-box').textContent = [
    'Speech diagnostics',
    `duration: ${durSec.toFixed(2)}s`,
    `SNR: ${snrDb !== null ? snrDb.toFixed(1) + ' dB' : '—'}`,
    `flatness min/max: ${flatMin.toFixed(3)} / ${flatMax.toFixed(3)}`,
    `loud frames: ${loudCount}`,
    `tonal frames: ${tonerCount}`,
    `text similarity shadow: ${(textSimilarityShadow * 100).toFixed(1)}%`,
    `quality flags: ${qualityFlags.join(', ') || 'none'}`
  ].join('\n');

  stopAll(KEEP_MIC_ALIVE ? false : true);
  scheduleResultMicRelease();

  requestAnimationFrame(() => {
    if (rb && typeof rb.scrollIntoView === 'function') {
      rb.scrollIntoView({ behavior: 'auto', block: 'nearest' });
    }
  });
}


// ═══════════════════════════════════════════════════
// FAST FLOW — จัดการ navigation หลังจบ Speech
// ═══════════════════════════════════════════════════
function handleFastFlow(riskLevel) {
  const L = T;
  const mode = sessionStorage.getItem('fast_mode');

  // Keep this check for full-mode diagnostics, but Individual mode can show
  // the Speech result immediately without waiting for Face and Arm.
  const allDone = ['fast_face', 'fast_arm', 'fast_speech']
    .every(key => Boolean(sessionStorage.getItem(key)));

  let btn = document.getElementById('fast-nav-btn');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'fast-nav-btn';
    btn.type = 'button';
    document.getElementById('test-screen')?.appendChild(btn);
  }
  if (!btn) return;

  btn.textContent = L.fastResult;
  btn.className = 'show green';
  btn.style.display = 'block';
  btn.setAttribute('aria-hidden', 'false');

  btn.onclick = () => {
    stopAll(true);
    window.location.href = 'result.html';
  };

  // Only Full mode needs an incomplete-flow note here. Individual mode opens
  // the module-specific result page by design.
  if (mode === 'full' && !allDone && (riskLevel === 'warn' || riskLevel === 'bad')) {
    const resultSub = document.getElementById('rb-sub');
    if (resultSub && !resultSub.textContent.includes(L.fastIncomplete)) {
      resultSub.textContent += ` · ${L.fastIncomplete}`;
    }
  }
}


// ── No language landing page: start directly and keep TH/EN/JA at top-right ──
(async function initSpeechLanguage() {
  const savedLang = sessionStorage.getItem('fast_lang') || 'th';
  const code = SPEECH_LOCALE_MAP[savedLang] ? savedLang : 'th';

  const ready = await selectLang(code);

  if (!ready) {
    throw new Error('Speech language initialization failed');
  }
})().catch(error => {
  console.error('Speech test initialization failed.', error);

  const actionBtn = document.getElementById('action-btn');
  if (actionBtn) {
    actionBtn.disabled = true;
    actionBtn.textContent = T?.languageUnavailable || 'Language unavailable';
  }
});
</script>
